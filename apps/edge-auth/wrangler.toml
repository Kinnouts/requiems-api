name = "requiem-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for API keys, config, and rate limiting
[[kv_namespaces]]
binding = "KV"
id = "7cc847da3f3143b2ba8f7c531f416b35"

# D1 Database for usage tracking
[[d1_databases]]
binding = "DB"
database_name = "requiem-usage"
database_id = "8cc5cae5-caff-4878-80f7-94eed1931ea8"

[dev]
port = 6000
local_protocol = "http"

[vars]
ENVIRONMENT = "development"

[env.production]
name = "requiem-api-gateway-production"
vars = { ENVIRONMENT = "production" }

[[env.production.kv_namespaces]]
binding = "KV"
id = "7cc847da3f3143b2ba8f7c531f416b35"

[[env.production.d1_databases]]
binding = "DB"
database_name = "requiem-usage"
database_id = "8cc5cae5-caff-4878-80f7-94eed1931ea8"