name = "requiem-auth-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for API keys, config, and rate limiting
[[kv_namespaces]]
binding = "KV"
id = "7cc847da3f3143b2ba8f7c531f416b35"

# D1 Database for usage tracking
[[d1_databases]]
binding = "DB"
database_name = "requiem-usage"
database_id = "8cc5cae5-caff-4878-80f7-94eed1931ea8"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[dev]
port = 4455
local_protocol = "http"

[vars]
ENVIRONMENT = "development"
SENTRY_DSN = ""

[env.production]
name = "requiem-auth-gateway-production"
workers_dev = false
preview_urls = false

[env.production.vars]
ENVIRONMENT = "production"
SENTRY_DSN = "https://704bd5e0a17440608c1e0eb04c2610d8@issues.bobadilla.tech/3"

[[env.production.routes]]
pattern = "api.requiems.xyz"
custom_domain = true

[[env.production.kv_namespaces]]
binding = "KV"
id = "7cc847da3f3143b2ba8f7c531f416b35"

[[env.production.d1_databases]]
binding = "DB"
database_name = "requiem-usage"
database_id = "8cc5cae5-caff-4878-80f7-94eed1931ea8"