    glossary:
      title: "API Glossary - Requiems API"
      heading: "API Glossary"
      description: "Essential API terminology every developer should know"
      terms:
        - name: "API (Application Programming Interface)"
          definition: "A set of definitions and protocols that allows different software applications to communicate with each other. APIs define the methods and data formats that applications can use to request and exchange information."
          example: "Example: Requiems API provides a REST API for validating email addresses programmatically."
        - name: "Endpoint"
          definition: "A specific URL where an API can access the resources it needs. Each endpoint corresponds to a specific function or resource in the API."
          example: "Example: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">POST /v1/email/disposable/check</code>"
        - name: "Authentication"
          definition: "The process of verifying the identity of a user or application. APIs typically require authentication to ensure only authorized users can access the service."
          example: "Example: Including your API key in the Authorization header: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">Authorization: Bearer YOUR_API_KEY</code>"
        - name: "API Key"
          definition: "A unique identifier used to authenticate requests to an API. API keys act as both an identifier and a secret token for authentication."
          example: "Example: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">req_live_1234567890abcdef</code>"
        - name: "Rate Limiting"
          definition: "A technique used to control the number of requests a user can make to an API within a given time period. This helps prevent abuse and ensures fair usage."
          example: "Example: Free plan allows 100 requests per minute"
        - name: "Requests"
          definition: "The unit of API usage. Each API call counts as 1 request against your monthly plan allowance. Some endpoints may count as more than 1 request — this is always stated explicitly in that endpoint's documentation."
          example: "Example: Calling the email validation endpoint once uses 1 request from your monthly allowance."
        - name: "REST (Representational State Transfer)"
          definition: "An architectural style for designing networked applications. REST APIs use HTTP requests to perform CRUD (Create, Read, Update, Delete) operations on resources."
          example: "Example: Using GET to retrieve data, POST to create, PUT to update, DELETE to remove"
        - name: "JSON (JavaScript Object Notation)"
          definition: "A lightweight data interchange format that's easy for humans to read and write, and easy for machines to parse and generate. Most modern APIs use JSON for request and response bodies."
          example: "Example: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">{\"email\": \"test@example.com\", \"is_disposable\": false}</code>"
        - name: "HTTP Status Codes"
          definition: "Three-digit codes returned by web servers to indicate the result of an HTTP request. Common codes include 200 (success), 404 (not found), and 500 (server error)."
          example: "Learn more: <a href=\"/error_codes\" class=\"text-blue-600 hover:text-blue-700\">Error Codes Reference</a>"
        - name: "Webhook"
          definition: "A method for an application to provide real-time information to other applications. Instead of you making repeated API requests, the server sends data to your specified URL when an event occurs."
          example: "Example: Receive a notification when your request balance drops below a threshold"
        - name: "Query Parameters"
          definition: "Key-value pairs appended to a URL to filter, sort, or modify the API response. They appear after a question mark (?) in the URL."
          example: "Example: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">/v1/words?limit=10&min_length=5</code>"
        - name: "Headers"
          definition: "Additional information sent with HTTP requests and responses. Headers can contain authentication tokens, content types, custom metadata, and more."
          example: "Example: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">Content-Type: application/json</code>"
      help:
        heading: "Need More Help?"
        text: "Check out our comprehensive documentation or contact our support team"
        cta_docs: "Browse Documentation"
        cta_contact: "Contact Support"

    error_codes:
      title: "Error Codes Reference - Requiems API"
      heading: "Error Codes Reference"
      description: "Understanding HTTP status codes and how to handle them"
      success_heading: "Success"
      client_errors_heading: "Client Errors"
      server_errors_heading: "Server Errors"
      codes:
        success:
          - code: "200"
            name: "OK"
            description: "The request was successful and the response contains the requested data."
            note: "Common with: GET, POST, PUT requests"
          - code: "201"
            name: "Created"
            description: "A new resource was successfully created."
            note: "Common with: POST requests for creating resources"
        client_errors:
          - code: "400"
            name: "Bad Request"
            description: "The request was malformed or contains invalid parameters."
            note: "Common causes: Missing required fields, invalid JSON, incorrect data types"
          - code: "401"
            name: "Unauthorized"
            description: "Authentication is required or has failed. Your API key may be missing or invalid."
            note: "Common causes: Missing API key, invalid API key, expired key"
          - code: "403"
            name: "Forbidden"
            description: "You don't have permission to access this resource. Your API key may lack the required permissions."
            note: "Common causes: Insufficient permissions, suspended account, accessing test endpoint with live key"
          - code: "404"
            name: "Not Found"
            description: "The requested resource doesn't exist. Check your endpoint URL."
            note: "Common causes: Incorrect URL, typo in endpoint path, resource was deleted"
          - code: "422"
            name: "Unprocessable Entity"
            description: "The request was well-formed but contains semantic errors or validation failures."
            note: "Common causes: Invalid email format, out-of-range values, business logic validation failures"
          - code: "429"
            name: "Too Many Requests"
            description: "You've exceeded your rate limit. Wait before making more requests or upgrade your plan."
            note: "Common causes: Too many requests per minute, exceeded daily quota"
        server_errors:
          - code: "500"
            name: "Internal Server Error"
            description: "An unexpected error occurred on our servers. This is a temporary issue."
            note: "Action: Retry the request. If the issue persists, contact support."
          - code: "502"
            name: "Bad Gateway"
            description: "The gateway received an invalid response from the backend server."
            note: "Action: Retry the request after a brief delay."
          - code: "503"
            name: "Service Unavailable"
            description: "The service is temporarily unavailable, usually due to maintenance or overload."
            note: "Action: Check our status page and retry after a delay."
          - code: "504"
            name: "Gateway Timeout"
            description: "The gateway didn't receive a response from the backend server in time."
            note: "Action: Retry the request. Consider implementing exponential backoff."
      best_practices:
        heading: "Best Practices for Error Handling"
        items:
          - "Always check the status code before processing the response"
          - "Implement exponential backoff for retry logic on 5xx errors"
          - "Log error details for debugging but never expose sensitive data"
          - "Handle rate limits gracefully by respecting retry-after headers"
          - "Show user-friendly error messages instead of raw API responses"
        help_text: "Need help troubleshooting?"
        cta_docs: "View Documentation"
        cta_contact: "Contact Support"
        cta_status: "Check API Status"

