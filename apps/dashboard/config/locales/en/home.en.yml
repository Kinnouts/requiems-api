    faq:
      title: "FAQ - Requiems API"
      heading: "Frequently Asked Questions"
      intro: "Find answers to common questions about Requiems API"
      getting_started:
        heading: "Getting Started"
        q1: "How do I get started with Requiems API?"
        a1_html: "Getting started is easy! Sign up for a free account, generate your API key from the dashboard, and start making requests. Check out our %{docs_link} for detailed integration guides."
        docs_link: "documentation"
        q2: "Do I need a credit card to start?"
        a2: "No! Our free plan includes 500 monthly requests with no credit card required. Perfect for testing and small projects. You can upgrade anytime when you need more."
        q3: "What programming languages do you support?"
        a3: "Our REST API works with any programming language that can make HTTP requests. We provide code examples for popular languages including JavaScript/Node.js, Python, PHP, Ruby, Go, and Java."
      authentication:
        heading: "Authentication"
        q1: "How do I authenticate my requests?"
        a1: "Include your API key in the Authorization header as a Bearer token:"
        q2: "What's the difference between test and live API keys?"
        a2_html: "Test keys (starting with <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">req_test_</code>) are for development and testing. They work with all endpoints but don't count against your request quota. Live keys (<code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">req_live_</code>) are for production use and count against your monthly request quota."
        q3: "Can I regenerate my API key?"
        a3: "Yes! Go to your dashboard, click on the API key you want to regenerate, and select \"Regenerate\". Note that the old key will stop working immediately, so update all your applications."
      billing:
        heading: "Billing & Usage"
        q1: "How is billing calculated?"
        a1: "Each API call costs 1 request. Your plan includes a monthly request allowance that resets at the start of each billing period. Some endpoints may count as more than 1 request — this is always stated explicitly in that endpoint's documentation."
        q2: "What happens if I exceed my request limit?"
        a2: "When you hit 75% of your quota, we'll send you an alert. At 90%, you'll get another warning. If you hit 100%, API requests will return a 429 error until you upgrade your plan or wait for your next billing cycle."
        q3: "Can I upgrade or downgrade my plan?"
        a3: "Yes! You can change your plan anytime from your billing dashboard. Upgrades take effect immediately. Downgrades take effect at the start of your next billing period."
        q4: "Do unused requests roll over?"
        a4: "No, unused requests don't roll over to the next month. Your request allowance resets at the beginning of each billing period. We recommend choosing a plan that matches your typical monthly usage."
      rate_limits:
        heading: "Rate Limits"
        q1: "What are the rate limits?"
        a1: "Rate limits vary by plan:"
        free: "Free: 30 requests/minute"
        developer: "Developer: 5,000 requests/minute"
        business: "Business: 10,000 requests/minute"
        professional: "Professional: 50,000 requests/minute"
        q2: "How should I handle rate limit errors?"
        a2_html: "When you receive a 429 error, implement exponential backoff. Wait a few seconds and retry. Check the <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">Retry-After</code> header for the recommended wait time. Consider upgrading your plan if you consistently hit rate limits."
