      faq:
        heading: "Preguntas frecuentes"
        q1: "¿Qué pasa si supero mi cuota mensual?"
        a1: "Tus solicitudes a la API devolverán un error 429 (Demasiadas solicitudes) una vez que alcances tu límite mensual. Recomendamos actualizar a un plan superior antes de alcanzar tu cuota. Puedes monitorear tu uso en tiempo real desde tu panel."
        q2: "¿Puedo usar Requiems API para proyectos comerciales?"
        a2: "¡Sí! Todos los planes, incluido el gratuito, se pueden usar para proyectos comerciales. Nuestro servicio en la nube gestionado proporciona fiabilidad, escalabilidad y soporte de nivel empresarial para aplicaciones en producción."
        q3: "¿Ofrecen planes empresariales personalizados?"
        a3: "¡Sí! Los planes empresariales incluyen precios personalizados, infraestructura dedicada, despliegues privados, residencia de datos en la UE, SLAs personalizados y soporte dedicado. Contacta a nuestro equipo de ventas en eliaz@bobadilla.tech para hablar sobre tus requisitos."
        q4: "¿Qué centros de datos utilizan?"
        a4: "Todos los planes se ejecutan en centros de datos de la UE para el cumplimiento del GDPR."
        q5: "¿Hay una prueba gratuita para los planes de pago?"
        a5: "¡Sí! Todos los planes de pago mensuales incluyen una prueba gratuita de 7 días con acceso completo a las funciones del plan. No se requiere tarjeta de crédito para iniciar la prueba. Puedes cancelar en cualquier momento durante el período de prueba."

