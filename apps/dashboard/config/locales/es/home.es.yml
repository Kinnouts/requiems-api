    faq:
      title: "Preguntas frecuentes - Requiems API"
      heading: "Preguntas frecuentes"
      intro: "Encuentra respuestas a preguntas comunes sobre Requiems API"
      getting_started:
        heading: "Primeros pasos"
        q1: "¿Cómo empiezo con Requiems API?"
        a1_html: "¡Empezar es fácil! Crea una cuenta gratuita, genera tu clave API desde el panel y comienza a hacer solicitudes. Consulta nuestra %{docs_link} para guías detalladas de integración."
        docs_link: "documentación"
        q2: "¿Necesito una tarjeta de crédito para empezar?"
        a2: "¡No! Nuestro plan gratuito incluye 500 solicitudes mensuales sin necesidad de tarjeta de crédito. Perfecto para pruebas y proyectos pequeños. Puedes actualizar en cualquier momento cuando necesites más."
        q3: "¿Qué lenguajes de programación admiten?"
        a3: "Nuestra API REST funciona con cualquier lenguaje de programación que pueda hacer solicitudes HTTP. Proporcionamos ejemplos de código para lenguajes populares como JavaScript/Node.js, Python, PHP, Ruby, Go y Java."
      authentication:
        heading: "Autenticación"
        q1: "¿Cómo autentico mis solicitudes?"
        a1: "Incluye tu clave API en el encabezado Authorization como token Bearer:"
        q2: "¿Cuál es la diferencia entre las claves API de prueba y las de producción?"
        a2_html: "Las claves de prueba (que comienzan con <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">req_test_</code>) son para desarrollo y pruebas. Funcionan con todos los endpoints pero no cuentan para tu cuota de solicitudes. Las claves de producción (<code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">req_live_</code>) son para uso en producción y cuentan para tu cuota mensual de solicitudes."
        q3: "¿Puedo regenerar mi clave API?"
        a3: "¡Sí! Ve a tu panel, haz clic en la clave API que deseas regenerar y selecciona \"Regenerar\". Ten en cuenta que la clave antigua dejará de funcionar de inmediato, así que actualiza todas tus aplicaciones."
      billing:
        heading: "Facturación y uso"
        q1: "¿Cómo se calcula la facturación?"
        a1: "Cada llamada a la API cuesta 1 solicitud. Tu plan incluye una asignación mensual de solicitudes que se restablece al inicio de cada período de facturación. Algunos endpoints pueden contar como más de 1 solicitud — esto siempre se indica explícitamente en la documentación de ese endpoint."
        q2: "¿Qué pasa si supero mi límite de solicitudes?"
        a2: "Cuando alcances el 75% de tu cuota, te enviaremos una alerta. Al 90%, recibirás otra advertencia. Si alcanzas el 100%, las solicitudes a la API devolverán un error 429 hasta que actualices tu plan o esperes tu próximo ciclo de facturación."
        q3: "¿Puedo actualizar o reducir mi plan?"
        a3: "¡Sí! Puedes cambiar tu plan en cualquier momento desde tu panel de facturación. Las actualizaciones surten efecto de inmediato. Las reducciones surten efecto al inicio de tu próximo período de facturación."
        q4: "¿Las solicitudes no utilizadas se acumulan?"
        a4: "No, las solicitudes no utilizadas no se acumulan para el mes siguiente. Tu asignación de solicitudes se restablece al inicio de cada período de facturación. Recomendamos elegir un plan que se ajuste a tu uso mensual típico."
      rate_limits:
        heading: "Límites de tasa"
        q1: "¿Cuáles son los límites de tasa?"
        a1: "Los límites de tasa varían según el plan:"
        free: "Gratuito: 30 solicitudes/minuto"
        developer: "Desarrollador: 5.000 solicitudes/minuto"
        business: "Negocio: 10.000 solicitudes/minuto"
        professional: "Profesional: 50.000 solicitudes/minuto"
        q2: "¿Cómo debo manejar los errores de límite de tasa?"
        a2_html: "Cuando recibas un error 429, implementa retroceso exponencial. Espera unos segundos y vuelve a intentarlo. Consulta el encabezado <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">Retry-After</code> para el tiempo de espera recomendado. Considera actualizar tu plan si constantemente alcanzas los límites de tasa."
      support:
        heading: "Soporte"
        q1: "¿Cómo puedo obtener ayuda?"
        a1: "Ofrecemos múltiples canales de soporte:"
        docs_channel:
          label: "Documentación"
          description: "Guías completas y referencia de la API"
        contact_channel:
          label: "Formulario de contacto"
          description: "Soporte por correo (respuesta 24-48 horas)"
        github_channel:
          label: "Issues de GitHub"
          description: "Reporta errores o solicita funciones"
        q2: "¿Cuáles son sus tiempos de respuesta de soporte?"
        a2: "Los tiempos de respuesta varían según el plan:"
        free_dev: "Gratuito y Desarrollador: 48 horas"
        business_time: "Negocio: 24 horas"
        professional_time: "Profesional: 12 horas (soporte prioritario)"
        q3: "¿Ofrecen soporte empresarial?"
        a3_html: "¡Sí! Los clientes empresariales obtienen soporte dedicado con tiempos de respuesta garantizados, acceso directo a nuestro equipo de ingeniería y asistencia prioritaria. %{sales_link} para saber más."
        contact_sales: "Contacta con ventas"
      still_questions:
        heading: "¿Aún tienes preguntas?"
        text: "¡Estamos aquí para ayudar! Contacta a nuestro equipo de soporte o consulta nuestra documentación."
        contact: "Contactar soporte"
        docs: "Ver documentación"

