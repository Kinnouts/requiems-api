    glossary:
      title: "Glosario de API - Requiems API"
      heading: "Glosario de API"
      description: "Terminología esencial de API que todo desarrollador debe conocer"
      terms:
        - name: "API (Interfaz de programación de aplicaciones)"
          definition: "Un conjunto de definiciones y protocolos que permite que diferentes aplicaciones de software se comuniquen entre sí. Las APIs definen los métodos y formatos de datos que las aplicaciones pueden usar para solicitar e intercambiar información."
          example: "Ejemplo: Requiems API proporciona una API REST para validar direcciones de correo electrónico programáticamente."
        - name: "Endpoint"
          definition: "Una URL específica donde una API puede acceder a los recursos que necesita. Cada endpoint corresponde a una función o recurso específico en la API."
          example: "Ejemplo: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">POST /v1/email/disposable/check</code>"
        - name: "Autenticación"
          definition: "El proceso de verificar la identidad de un usuario o aplicación. Las APIs generalmente requieren autenticación para garantizar que solo los usuarios autorizados puedan acceder al servicio."
          example: "Ejemplo: Incluir tu clave API en el encabezado Authorization: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">Authorization: Bearer TU_CLAVE_API</code>"
        - name: "Clave API"
          definition: "Un identificador único utilizado para autenticar solicitudes a una API. Las claves API actúan como identificador y token secreto para la autenticación."
          example: "Ejemplo: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">req_live_1234567890abcdef</code>"
        - name: "Limitación de tasa"
          definition: "Una técnica para controlar el número de solicitudes que un usuario puede hacer a una API dentro de un período de tiempo dado. Esto ayuda a prevenir abusos y garantiza un uso justo."
          example: "Ejemplo: El plan gratuito permite 100 solicitudes por minuto"
        - name: "Solicitudes"
          definition: "La unidad de uso de la API. Cada llamada a la API cuenta como 1 solicitud contra tu cuota mensual del plan. Algunos endpoints pueden contar como más de 1 solicitud, lo cual siempre se indica explícitamente en la documentación de ese endpoint."
          example: "Ejemplo: Llamar al endpoint de validación de correo una vez usa 1 solicitud de tu cuota mensual."
        - name: "REST (Transferencia de estado representacional)"
          definition: "Un estilo arquitectónico para diseñar aplicaciones en red. Las APIs REST usan solicitudes HTTP para realizar operaciones CRUD (Crear, Leer, Actualizar, Eliminar) sobre recursos."
          example: "Ejemplo: Usar GET para recuperar datos, POST para crear, PUT para actualizar, DELETE para eliminar"
        - name: "JSON (Notación de objetos de JavaScript)"
          definition: "Un formato de intercambio de datos ligero que es fácil de leer y escribir para humanos, y fácil de analizar y generar para máquinas. La mayoría de las APIs modernas usan JSON para los cuerpos de solicitud y respuesta."
          example: "Ejemplo: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">{\"email\": \"test@example.com\", \"is_disposable\": false}</code>"
        - name: "Códigos de estado HTTP"
          definition: "Códigos de tres dígitos devueltos por los servidores web para indicar el resultado de una solicitud HTTP. Los códigos comunes incluyen 200 (éxito), 404 (no encontrado) y 500 (error del servidor)."
          example: "Más información: <a href=\"/es/error_codes\" class=\"text-blue-600 hover:text-blue-700\">Referencia de códigos de error</a>"
        - name: "Webhook"
          definition: "Un método para que una aplicación proporcione información en tiempo real a otras aplicaciones. En lugar de que hagas solicitudes repetidas a la API, el servidor envía datos a tu URL especificada cuando ocurre un evento."
          example: "Ejemplo: Recibir una notificación cuando tu saldo de solicitudes caiga por debajo de un umbral"
        - name: "Parámetros de consulta"
          definition: "Pares clave-valor añadidos a una URL para filtrar, ordenar o modificar la respuesta de la API. Aparecen después de un signo de interrogación (?) en la URL."
          example: "Ejemplo: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">/v1/words?limit=10&min_length=5</code>"
        - name: "Encabezados"
          definition: "Información adicional enviada con las solicitudes y respuestas HTTP. Los encabezados pueden contener tokens de autenticación, tipos de contenido, metadatos personalizados y más."
          example: "Ejemplo: <code class=\"bg-gray-100 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 rounded\">Content-Type: application/json</code>"
      help:
        heading: "¿Necesitas más ayuda?"
        text: "Consulta nuestra documentación completa o contacta a nuestro equipo de soporte"
        cta_docs: "Ver documentación"
        cta_contact: "Contactar soporte"

    error_codes:
      title: "Referencia de códigos de error - Requiems API"
      heading: "Referencia de códigos de error"
      description: "Comprende los códigos de estado HTTP y cómo manejarlos"
      success_heading: "Éxito"
      client_errors_heading: "Errores del cliente"
      server_errors_heading: "Errores del servidor"
      codes:
        success:
          - code: "200"
            name: "OK"
            description: "La solicitud fue exitosa y la respuesta contiene los datos solicitados."
            note: "Común con: solicitudes GET, POST, PUT"
          - code: "201"
            name: "Creado"
            description: "Se creó exitosamente un nuevo recurso."
            note: "Común con: solicitudes POST para crear recursos"
        client_errors:
          - code: "400"
            name: "Solicitud incorrecta"
            description: "La solicitud estaba mal formada o contiene parámetros inválidos."
            note: "Causas comunes: campos requeridos faltantes, JSON inválido, tipos de datos incorrectos"
          - code: "401"
            name: "No autorizado"
            description: "Se requiere autenticación o ha fallado. Tu clave API puede estar faltando o ser inválida."
            note: "Causas comunes: clave API faltante, clave API inválida, clave expirada"
          - code: "403"
            name: "Prohibido"
            description: "No tienes permiso para acceder a este recurso. Tu clave API puede carecer de los permisos requeridos."
            note: "Causas comunes: permisos insuficientes, cuenta suspendida, acceso a endpoint de prueba con clave de producción"
          - code: "404"
            name: "No encontrado"
            description: "El recurso solicitado no existe. Verifica la URL de tu endpoint."
            note: "Causas comunes: URL incorrecta, error tipográfico en la ruta del endpoint, recurso eliminado"
          - code: "422"
            name: "Entidad no procesable"
            description: "La solicitud estaba bien formada pero contiene errores semánticos o fallas de validación."
            note: "Causas comunes: formato de correo inválido, valores fuera de rango, fallas de validación de lógica de negocio"
          - code: "429"
            name: "Demasiadas solicitudes"
            description: "Has superado tu límite de tasa. Espera antes de hacer más solicitudes o actualiza tu plan."
            note: "Causas comunes: demasiadas solicitudes por minuto, cuota diaria superada"
        server_errors:
          - code: "500"
            name: "Error interno del servidor"
            description: "Ocurrió un error inesperado en nuestros servidores. Es un problema temporal."
            note: "Acción: Reintenta la solicitud. Si el problema persiste, contacta al soporte."
          - code: "502"
            name: "Puerta de enlace incorrecta"
            description: "La puerta de enlace recibió una respuesta inválida del servidor backend."
            note: "Acción: Reintenta la solicitud después de una breve pausa."
          - code: "503"
            name: "Servicio no disponible"
            description: "El servicio no está disponible temporalmente, generalmente por mantenimiento o sobrecarga."
            note: "Acción: Verifica nuestra página de estado y reintenta después de una pausa."
          - code: "504"
            name: "Tiempo de espera de la puerta de enlace"
            description: "La puerta de enlace no recibió respuesta del servidor backend a tiempo."
            note: "Acción: Reintenta la solicitud. Considera implementar retroceso exponencial."
      best_practices:
        heading: "Mejores prácticas para el manejo de errores"
        items:
          - "Siempre verifica el código de estado antes de procesar la respuesta"
          - "Implementa retroceso exponencial para la lógica de reintento en errores 5xx"
          - "Registra detalles de errores para depuración pero nunca expongas datos sensibles"
          - "Maneja los límites de tasa con elegancia respetando los encabezados retry-after"
          - "Muestra mensajes de error amigables para el usuario en lugar de respuestas API sin procesar"
        help_text: "¿Necesitas ayuda para solucionar problemas?"
        cta_docs: "Ver documentación"
        cta_contact: "Contactar soporte"
        cta_status: "Ver estado de la API"

