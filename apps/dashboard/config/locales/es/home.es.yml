        q5: "¿Hay una prueba gratuita para los planes de pago?"
        a5: "¡Sí! Todos los planes de pago mensuales incluyen una prueba gratuita de 7 días con acceso completo a las funciones del plan. No se requiere tarjeta de crédito para iniciar la prueba. Puedes cancelar en cualquier momento durante el período de prueba."

