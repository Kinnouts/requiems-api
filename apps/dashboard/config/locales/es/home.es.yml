        q3: "¿Dónde están ubicados sus servidores?"
        a3: "Todos nuestros centros de datos están ubicados en la Unión Europea, respaldados por la red global edge de Cloudflare para el cumplimiento del GDPR."
        q4: "¿Qué métodos de pago aceptan?"
        a4: "Aceptamos todas las tarjetas de crédito principales (Visa, Mastercard, American Express) y tarjetas de débito a través de Stripe."
