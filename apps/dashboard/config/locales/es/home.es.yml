    privacy:
      title: "Política de privacidad - Requiems API"
      heading: "Política de privacidad"
      last_updated: "Última actualización: %{date}"
      overview:
        heading: "Descripción general"
        text: "Requiems API (\"nosotros\", \"nuestro\" o \"nos\") se compromete a proteger tu privacidad. Esta Política de privacidad explica cómo recopilamos, usamos, divulgamos y protegemos tu información cuando utilizas nuestra plataforma y servicios de API."
      information_we_collect:
        heading: "Información que recopilamos"
        account:
          heading: "Información de la cuenta"
          text: "Cuando te registras en una cuenta, recopilamos tu dirección de correo electrónico, nombre e información de facturación."
        api_usage:
          heading: "Datos de uso de la API"
          text: "Recopilamos metadatos sobre tus solicitudes a la API, incluidas marcas de tiempo, el endpoint al que se accedió y los códigos de respuesta. NO registramos los datos reales de solicitud o respuesta enviados a través de nuestras APIs."
        technical:
          heading: "Información técnica"
          text: "Recopilamos automáticamente direcciones IP, cadenas de agente de usuario y otra información técnica con fines de seguridad y operativos."
      how_we_use:
        heading: "Cómo usamos tu información"
        items:
          - "Proporcionar, mantener y mejorar nuestros servicios"
          - "Procesar tus transacciones y enviar información relacionada"
          - "Enviarte avisos técnicos, actualizaciones y mensajes de soporte"
          - "Monitorear y analizar patrones y tendencias de uso"
          - "Detectar, prevenir y abordar problemas técnicos y fraudes"
          - "Cumplir con las obligaciones legales"
      data_storage:
        heading: "Almacenamiento y seguridad de datos"
        text: "Todos los datos se almacenan en servidores ubicados en la Unión Europea. Implementamos medidas de seguridad estándar de la industria que incluyen:"
        items:
          - "Cifrado TLS 1.3 para datos en tránsito"
          - "Cifrado AES-256 para datos en reposo"
          - "Auditorías de seguridad y monitoreo regulares"
          - "Controles de acceso y mecanismos de autenticación"
