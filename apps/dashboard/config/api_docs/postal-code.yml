api_id: postal-code
api_name: Postal Code
description: Look up city, state, and geographic coordinates for any postal code worldwide. Covers 100+ countries using the GeoNames postal code dataset.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Auto-fill city and state fields from a zip/postal code
    - Validate postal codes during checkout or registration
    - Geocode postal codes to display on a map
    - Calculate distances between postal code areas

  features:
    - 100+ countries supported (US, CA, GB, DE, AU, and more)
    - Returns city, state/province, country, latitude, and longitude
    - "Default country: US (omit the country param for US lookups)"
    - ISO 3166-1 alpha-2 country codes

endpoints:
  - name: Lookup Postal Code
    method: GET
    path: /v1/places/postal/{code}
    description: Returns city, state, country, and coordinates for the given postal code.

    parameters:
      - name: code
        location: path
        type: string
        required: true
        description: The postal code to look up (e.g. 10001 for New York, SW1A 1AA for London)
        example: "10001"
      - name: country
        location: query
        type: string
        required: false
        description: "ISO 3166-1 alpha-2 country code (default: US)"
        example: US

    response_example: |
      {
        "data": {
          "postal_code": "10001",
          "city": "New York City",
          "state": "New York",
          "country": "US",
          "lat": 40.7484,
          "lon": -73.9967
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: postal_code
        type: string
        description: The postal code as stored in the dataset
      - name: city
        type: string
        description: Primary city or place name for the postal code
      - name: state
        type: string
        description: State, province, or administrative region name
      - name: country
        type: string
        description: ISO 3166-1 alpha-2 country code (uppercase)
      - name: lat
        type: number
        description: Latitude of the postal code centroid
      - name: lon
        type: number
        description: Longitude of the postal code centroid

    errors:
      - code: not_found
        status: 404
        description: The postal code was not found for the given country.
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        # US zip code (default country)
        curl "https://api.requiems.xyz/v1/places/postal/10001" \
          -H "requiems-api-key: YOUR_API_KEY"

        # UK postcode
        curl "https://api.requiems.xyz/v1/places/postal/SW1A1AA?country=GB" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/places/postal/10001"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, params={"country": "US"}, headers=headers)
        data = response.json()
        print(data["data"]["city"])   # New York City

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/places/postal/10001?country=US',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const data = await response.json();
        console.log(data.data.city);  // New York City

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/places/postal/10001')
        uri.query = URI.encode_www_form(country: 'US')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['city']

faq:
  - question: Which countries are supported?
    answer: The API covers 100+ countries via the GeoNames postal code dataset, including US, CA, GB, DE, FR, AU, JP, BR, and many more.

  - question: What format should the postal code be in?
    answer: Use the format native to the country. For the US that is the 5-digit ZIP code (10001). For the UK use the postcode without spaces (SW1A1AA). The API normalises case automatically.

  - question: What if a postal code maps to multiple cities?
    answer: Some postal codes span multiple places. The API returns the primary administrative entry from the GeoNames dataset, which is typically the most populous place.

  - question: How do I specify the country?
    answer: Pass an ISO 3166-1 alpha-2 code as the country query parameter (e.g. country=DE for Germany). If omitted the default is US.
