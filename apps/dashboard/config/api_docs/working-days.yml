faq:
  - question: What defines a working day?
    answer: By default, working days are Monday through Friday, excluding weekends (Saturday and Sunday). When a country is specified, public holidays for that country are also excluded.

  - question: Which countries are supported for holiday calculations?
    answer: The API supports holiday calendars for most countries worldwide using ISO 3166-1 alpha-2 country codes. If a country is not recognized, the API returns only weekend-excluding calculations.

  - question: How are holidays determined?
    answer: The API uses the business-days-calculator library which includes comprehensive holiday calendars for each country, including federal/national holidays and optional state/regional holidays when a subdivision is specified.

  - question: What if the to date is before the from date?
    answer: The API will return a 400 Bad Request error. The to date must be greater than or equal to the from date.

  - question: Are partial days counted?
    answer: No. The calculation counts full calendar days between the from and to dates (inclusive), then excludes weekends and holidays as appropriate.
