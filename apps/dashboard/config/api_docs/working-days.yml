# Working Days Calculator API Documentation

api_id: working-days
api_name: Working Days Calculator
description: Calculate the number of working days (business days) between two dates, with optional support for country-specific holidays. Useful for project planning, delivery estimates, and scheduling.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Project deadline calculations
    - Delivery time estimates
    - Payroll and billing calculations
    - Service level agreement (SLA) tracking
    - Vacation and leave planning

  features:
    - Calculate business days (Monday-Friday)
    - Optional country-specific holiday adjustments
    - Support for state/region-level holidays
    - ISO date format (YYYY-MM-DD)

endpoints:
  - name: Calculate Working Days
    method: GET
    path: /v1/places/working-days
    description: Calculate the number of working days between two dates, optionally accounting for country-specific holidays

    parameters:
      - name: from
        type: string
        required: true
        location: query
        description: Start date in YYYY-MM-DD format (ISO 8601)
        example: "2024-02-23"

      - name: to
        type: string
        required: true
        location: query
        description: End date in YYYY-MM-DD format (ISO 8601). Must be >= from date.
        example: "2024-02-28"

      - name: country
        type: string
        required: false
        location: query
        description: ISO 3166-1 alpha-2 country code (e.g., "US", "GB", "FR"). When provided, country-specific holidays are excluded from working days count.
        example: "US"

      - name: subdivision
        type: string
        required: false
        location: query
        description: ISO 3166-2 subdivision code for state/region within the country (e.g., "NY" for New York, "CA" for California). Only used when country is provided.
        example: "NY"

    response_example: |
      {
        "data": {
          "working_days": 4,
          "from": "2024-02-23",
          "to": "2024-02-28",
          "country": "US",
          "subdivision": "NY"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: working_days
        type: integer
        description: Number of working days between the two dates (excluding weekends and optionally holidays)
      - name: from
        type: string
        description: Start date (echoed from request)
      - name: to
        type: string
        description: End date (echoed from request)
      - name: country
        type: string
        description: Country code (echoed from request, empty string if not provided)
      - name: subdivision
        type: string
        description: Subdivision code (echoed from request, empty string if not provided)

    errors:
      - code: 400
        message: bad_request
        description: The from and to parameters are required, or to date is before from date, or invalid date format

    code_examples:
      curl: |
        # Without country (only excludes weekends)
        curl "https://api.requiems.xyz/v1/places/working-days?from=2024-02-23&to=2024-02-28" \
          -H "requiems-api-key: YOUR_API_KEY"

        # With country (excludes weekends and US federal holidays)
        curl "https://api.requiems.xyz/v1/places/working-days?from=2024-02-23&to=2024-02-28&country=US" \
          -H "requiems-api-key: YOUR_API_KEY"

        # With country and subdivision (excludes weekends and US + NY holidays)
        curl "https://api.requiems.xyz/v1/places/working-days?from=2024-02-23&to=2024-02-28&country=US&subdivision=NY" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/places/working-days"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {
            "from": "2024-02-23",
            "to": "2024-02-28",
            "country": "US",
            "subdivision": "NY"
        }

        response = requests.get(url, headers=headers, params=params)
        result = response.json()['data']
        print(f"{result['working_days']} working days")

      javascript: |
        const params = new URLSearchParams({
          from: '2024-02-23',
          to: '2024-02-28',
          country: 'US',
          subdivision: 'NY'
        });

        const response = await fetch(
          `https://api.requiems.xyz/v1/places/working-days?${params}`,
          {
            headers: {
              'requiems-api-key': 'YOUR_API_KEY'
            }
          }
        );

        const { data } = await response.json();
        console.log(`${data.working_days} working days`);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/places/working-days')
        uri.query = URI.encode_www_form(
          from: '2024-02-23',
          to: '2024-02-28',
          country: 'US',
          subdivision: 'NY'
        )

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "#{data['working_days']} working days"

