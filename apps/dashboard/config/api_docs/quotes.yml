# Random Quotes API Documentation

api_id: quotes
api_name: Random Quotes
description: Get random inspirational quotes from famous people, thinkers, and leaders. Perfect for daily motivation, content generation, or adding wisdom to your applications.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Daily motivation apps and widgets
    - Social media content generation
    - Quote of the day features
    - Inspirational dashboards
    - Content placeholders for design

  features:
    - Curated collection of inspirational quotes
    - Includes author attribution
    - Fast response times
    - No parameters required

endpoints:
  - name: Get Random Quote
    method: GET
    path: /v1/text/quotes/random
    description: Returns a random inspirational quote with author attribution

    parameters: []

    response_example: |
      {
        "data": {
          "id": 42,
          "text": "The only way to do great work is to love what you do.",
          "author": "Steve Jobs"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: id
        type: integer
        description: Unique identifier for the quote
      - name: text
        type: string
        description: The quote text
      - name: author
        type: string
        description: Name of the person who said or wrote the quote

    errors:
      - code: 503
        message: service_unavailable
        description: No quotes available in the database

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/text/quotes/random \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/text/quotes/random"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        quote = response.json()['data']
        print(f"{quote['text']} - {quote['author']}")

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/text/quotes/random', {
          headers: {
            'requiems-api-key': 'YOUR_API_KEY'
          }
        });

        const { data } = await response.json();
        console.log(`${data.text} - ${data.author}`);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/text/quotes/random')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "#{data['text']} - #{data['author']}"

pricing:
  free_tier: Included in all plans
  rate_limits:
    - plan: Free
      limit: 30 requests/minute
    - plan: Developer
      limit: 5,000 requests/minute
    - plan: Business
      limit: 10,000 requests/minute
    - plan: Professional
      limit: 50,000 requests/minute

faq:
  - question: Can I request quotes from a specific author?
    answer: Currently, the API returns random quotes from our entire collection. Author filtering is planned for a future update.

  - question: How many quotes are in the database?
    answer: Our collection contains hundreds of curated inspirational quotes from famous thinkers, leaders, and innovators, and we're constantly adding more.

  - question: Will I get the same quote if I call the endpoint multiple times?
    answer: No, quotes are selected randomly on each request, so consecutive calls will typically return different quotes.
