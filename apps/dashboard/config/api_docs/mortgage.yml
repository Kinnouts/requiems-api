api_id: mortgage
api_name: Mortgage Calculator
description: Calculate monthly mortgage payments and generate a full amortization schedule for any fixed-rate loan. Returns the monthly payment, total cost, total interest, and a month-by-month breakdown.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Mortgage calculators for real estate platforms
    - Loan comparison tools
    - Personal finance dashboards
    - Amortization schedule exports for borrowers
    - Financial planning and budgeting apps

  features:
    - Standard fixed-rate amortization formula
    - Full month-by-month schedule (principal, interest, balance per payment)
    - Summary fields — monthly payment, total payment, total interest
    - Supports loan terms from 1 to 50 years
    - Any principal and annual interest rate

endpoints:
  - name: Calculate Mortgage
    method: GET
    path: /v1/finance/mortgage
    description: "Returns the monthly payment, total cost, and full amortization schedule for a fixed-rate mortgage."

    parameters:
      - name: principal
        type: number
        required: true
        location: query
        description: Loan amount in your chosen currency (e.g. 300000 for $300,000)
        example: 300000

      - name: rate
        type: number
        required: true
        location: query
        description: "Annual interest rate as a percentage (e.g. 6.5 for 6.5%). Must be greater than 0."
        example: 6.5

      - name: years
        type: integer
        required: true
        location: query
        description: "Loan term in years (1–50)"
        example: 30

    response_example: |
      {
        "data": {
          "principal": 300000,
          "rate": 6.5,
          "years": 30,
          "monthly_payment": 1896.2,
          "total_payment": 682632.0,
          "total_interest": 382632.0,
          "schedule": [
            {
              "month": 1,
              "payment": 1896.2,
              "principal": 271.2,
              "interest": 1625.0,
              "balance": 299728.8
            },
            {
              "month": 2,
              "payment": 1896.2,
              "principal": 272.67,
              "interest": 1623.53,
              "balance": 299456.13
            }
          ]
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: principal
        type: number
        description: The original loan amount passed in the request
      - name: rate
        type: number
        description: The annual interest rate passed in the request
      - name: years
        type: integer
        description: The loan term in years passed in the request
      - name: monthly_payment
        type: number
        description: Fixed monthly payment amount (rounded to 2 decimal places)
      - name: total_payment
        type: number
        description: Total amount paid over the life of the loan
      - name: total_interest
        type: number
        description: Total interest paid (total_payment minus principal)
      - name: schedule
        type: array
        description: "Full amortization schedule — one entry per month (years × 12 entries)"
      - name: schedule[].month
        type: integer
        description: Month number (1 to years × 12)
      - name: schedule[].payment
        type: number
        description: Total payment for this month
      - name: schedule[].principal
        type: number
        description: Portion of this month's payment applied to principal
      - name: schedule[].interest
        type: number
        description: Portion of this month's payment applied to interest
      - name: schedule[].balance
        type: number
        description: Remaining loan balance after this payment

    errors:
      - code: bad_request
        status: 400
        description: "A required parameter is missing, not a valid number, or out of range (e.g. years > 50 or rate <= 0)."
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/finance/mortgage?principal=300000&rate=6.5&years=30" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/finance/mortgage"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"principal": 300000, "rate": 6.5, "years": 30}

        response = requests.get(url, headers=headers, params=params)
        data = response.json()["data"]
        print(data["monthly_payment"])  # 1896.2
        print(data["total_interest"])   # 382632.0
        print(len(data["schedule"]))    # 360

      javascript: |
        const params = new URLSearchParams({ principal: 300000, rate: 6.5, years: 30 });
        const response = await fetch(
          `https://api.requiems.xyz/v1/finance/mortgage?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const { data } = await response.json();
        console.log(data.monthly_payment);  // 1896.2
        console.log(data.total_interest);   // 382632.0
        console.log(data.schedule.length);  // 360

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/finance/mortgage')
        uri.query = URI.encode_www_form(principal: 300000, rate: 6.5, years: 30)

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts data['monthly_payment']  # 1896.2
        puts data['total_interest']   # 382632.0

faq:
  - question: What formula is used?
    answer: "Standard fixed-rate amortization: M = P × (r(1+r)^n) / ((1+r)^n − 1), where P is the principal, r is the monthly rate (annual rate / 12 / 100), and n is the total number of payments (years × 12)."

  - question: Are the monetary values rounded?
    answer: "Yes — all monetary values in the response (monthly_payment, total_payment, total_interest, and each schedule entry) are rounded to 2 decimal places."

  - question: Why does the final balance show a small rounding difference?
    answer: "Due to floating-point rounding on each monthly payment, the final balance may show $0.00–$0.99 rather than exactly $0. This is expected behaviour for fixed-payment amortization schedules."

  - question: What currency does the API use?
    answer: "The API is currency-agnostic. Pass your principal in any unit and interpret the results in that same unit. There is no currency conversion."

  - question: Does the API support variable or adjustable-rate mortgages?
    answer: "Not currently. Only fixed-rate mortgages are supported. The rate is applied uniformly over the entire loan term."
