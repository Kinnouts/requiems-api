# Available Conversion Units API Documentation

api_id: convert-units-list
api_name: Available Conversion Units
description: Retrieve a complete list of all available unit conversion types and their codes. Use this endpoint to discover which units can be converted using the Unit Conversion API.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Build unit selection dropdowns in UIs
    - Discover available conversion types
    - Validate user input for unit conversions
    - Display available options to users

  features:
    - Complete list of 39 supported units
    - Units grouped by category (length, weight, volume, etc.)
    - Alphabetically sorted within each category
    - No parameters required

endpoints:
  - name: List Available Units
    method: GET
    path: /v1/misc/convert/units
    description: Returns all available unit conversion types grouped by measurement category

    parameters: []

    response_example: |
      {
        "data": {
          "length": ["cm", "ft", "in", "km", "m", "miles", "mm", "nmi", "yd"],
          "weight": ["g", "kg", "lb", "mg", "oz", "stone", "t"],
          "volume": ["cup", "fl_oz", "gal", "l", "ml", "pt", "qt", "tbsp", "tsp"],
          "temperature": ["c", "f", "k"],
          "area": ["acre", "cm2", "ft2", "ha", "in2", "km2", "m2", "mm2", "yd2"],
          "speed": ["km_h", "knots", "m_s", "mph"]
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: length
        type: array of strings
        description: "Available length units: millimeter (mm), centimeter (cm), meter (m), kilometer (km), inch (in), foot (ft), yard (yd), mile (miles), nautical mile (nmi)"
      - name: weight
        type: array of strings
        description: "Available weight units: milligram (mg), gram (g), kilogram (kg), metric ton (t), ounce (oz), pound (lb), stone (stone)"
      - name: volume
        type: array of strings
        description: "Available volume units: milliliter (ml), liter (l), teaspoon (tsp), tablespoon (tbsp), fluid ounce (fl_oz), cup (cup), pint (pt), quart (qt), gallon (gal)"
      - name: temperature
        type: array of strings
        description: "Available temperature units: celsius (c), fahrenheit (f), kelvin (k)"
      - name: area
        type: array of strings
        description: "Available area units: square millimeter (mm2), square centimeter (cm2), square meter (m2), square kilometer (km2), square inch (in2), square foot (ft2), square yard (yd2), acre (acre), hectare (ha)"
      - name: speed
        type: array of strings
        description: "Available speed units: meters per second (m_s), kilometers per hour (km_h), miles per hour (mph), knots (knots)"

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/misc/convert/units \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/misc/convert/units"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        units = response.json()['data']

        # Print all length units
        print("Length units:", units['length'])

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/misc/convert/units', {
          headers: {
            'requiems-api-key': 'YOUR_API_KEY'
          }
        });

        const { data } = await response.json();

        // Build a dropdown with length units
        data.length.forEach(unit => {
          console.log(`<option value="${unit}">${unit}</option>`);
        });

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/misc/convert/units')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        units = JSON.parse(response.body)['data']
        puts "Temperature units: #{units['temperature'].join(', ')}"

faq:
  - question: Do I need to call this endpoint every time I want to convert units?
    answer: No. This endpoint is meant to be called once to discover available units. You can cache the response and use it to build your UI or validate user input. The list of available units changes very infrequently.

  - question: Can I convert between different categories (e.g., length to weight)?
    answer: No. You can only convert between units within the same category. For example, you can convert meters to feet (both length), but not meters to kilograms (length to weight). The conversion API will return a 400 error if you try to convert incompatible units.

  - question: What do the unit codes mean?
    answer: Each unit has a short code (e.g., "km" for kilometer, "lb" for pound). These codes are used as parameters in the conversion API. The codes are standardized and case-sensitive (always lowercase).

  - question: Will new units be added in the future?
    answer: Yes, we periodically add new units based on user requests. If you need a specific unit that's not currently available, please contact support@requiems.xyz.
