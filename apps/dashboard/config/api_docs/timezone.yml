# Timezone API Documentation

api_id: timezone
api_name: Timezone
description: Get timezone information for any location by geographic coordinates or city name. Returns the IANA timezone identifier, UTC offset, current time, and DST status.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Display local time for a given location
    - Scheduling and calendar applications
    - Travel and logistics platforms
    - Location-aware notifications

  features:
    - Lookup by latitude/longitude or city name
    - IANA timezone identifiers (e.g. "America/New_York")
    - DST detection for the current date
    - UTC offset in standard +HH:MM format
    - 150+ major cities supported for city-based lookup

endpoints:
  - name: Get Timezone
    method: GET
    path: /v1/places/timezone
    description: Returns timezone information for the given coordinates or city name. Provide either `city` or both `lat` and `lon`.

    parameters:
      - name: lat
        in: query
        type: float
        required: false
        description: "Latitude of the location (-90 to 90). Required when using coordinate-based lookup."
      - name: lon
        in: query
        type: float
        required: false
        description: "Longitude of the location (-180 to 180). Required when using coordinate-based lookup."
      - name: city
        in: query
        type: string
        required: false
        description: "City name for city-based lookup (e.g. 'Tokyo', 'London'). Required when not using coordinates."

    response_example: |
      {
        "timezone": "Europe/London",
        "offset": "+00:00",
        "current_time": "2024-12-15T14:30:00Z",
        "is_dst": false
      }

    response_fields:
      - name: timezone
        type: string
        description: IANA timezone identifier (e.g. "Europe/London", "Asia/Tokyo")
      - name: offset
        type: string
        description: "UTC offset in +HH:MM or -HH:MM format (e.g. '+05:30', '-05:00')"
      - name: current_time
        type: string
        description: Current time in UTC, formatted as RFC 3339 (e.g. "2024-12-15T14:30:00Z")
      - name: is_dst
        type: boolean
        description: Whether the location is currently observing daylight saving time

    code_examples:
      curl: |
        # Lookup by coordinates
        curl "https://api.requiems.xyz/v1/places/timezone?lat=51.5&lon=-0.1" \
          -H "requiems-api-key: YOUR_API_KEY"

        # Lookup by city
        curl "https://api.requiems.xyz/v1/places/timezone?city=Tokyo" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        # Lookup by coordinates
        url = "https://api.requiems.xyz/v1/places/timezone"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, params={"lat": 51.5, "lon": -0.1}, headers=headers)
        print(response.json())

        # Lookup by city
        response = requests.get(url, params={"city": "Tokyo"}, headers=headers)
        print(response.json())

      javascript: |
        // Lookup by coordinates
        const response = await fetch(
          'https://api.requiems.xyz/v1/places/timezone?lat=51.5&lon=-0.1',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const data = await response.json();
        console.log(data.data.timezone);

        // Lookup by city
        const cityResponse = await fetch(
          'https://api.requiems.xyz/v1/places/timezone?city=Tokyo',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const cityData = await cityResponse.json();
        console.log(cityData.data.timezone);

      ruby: |
        require 'net/http'
        require 'json'

        # Lookup by coordinates
        uri = URI('https://api.requiems.xyz/v1/places/timezone')
        uri.query = URI.encode_www_form(lat: 51.5, lon: -0.1)

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['timezone']

pricing:
  free_tier: Included in all plans
  rate_limits:
    - plan: Free
      limit: 30 requests/minute
    - plan: Developer
      limit: 5,000 requests/minute
    - plan: Business
      limit: 10,000 requests/minute

faq:
  - question: Which lookup method should I use — coordinates or city name?
    answer: Use coordinates (lat/lon) for precise lookups anywhere in the world. Use the city name for a quick lookup when you have a well-known city name. Coordinate-based lookup works for any point on Earth, while city-based lookup is limited to the ~150+ cities in our database.

  - question: Is the city parameter case-sensitive?
    answer: No. City names are normalised to lowercase before lookup, so "Tokyo", "TOKYO", and "tokyo" all work.

  - question: What does is_dst mean?
    answer: "is_dst indicates whether the location is currently observing Daylight Saving Time. For locations that do not use DST (e.g. Japan, most of Africa), this is always false."

  - question: What format is the UTC offset returned in?
    answer: "The offset field uses the format +HH:MM or -HH:MM (e.g. '+05:30' for India, '-05:00' for US Eastern Standard Time)."

  - question: What timezone identifiers does the API use?
    answer: All timezone identifiers follow the IANA Time Zone Database standard (also known as the Olson database), e.g. 'America/New_York', 'Europe/London', 'Asia/Tokyo'.
