# World Time API Documentation

api_id: world-time
api_name: World Time
description: Get the current time for any location in the world by specifying an IANA timezone identifier. Returns the timezone name, UTC offset, current time, and DST status.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - World clock widgets
    - Scheduling across multiple timezones
    - Travel and meeting planner apps
    - Display local time for remote team members

  features:
    - Full IANA timezone database support (e.g. "America/New_York", "Asia/Tokyo")
    - UTC offset in standard +HH:MM format
    - DST detection for the current date
    - Current time returned in RFC 3339 format

endpoints:
  - name: Get Current Time by Timezone
    method: GET
    path: "/v1/places/time/{timezone}"
    description: Returns the current time for the given IANA timezone identifier. The timezone is supplied as a path parameter (e.g. `America/New_York`, `Europe/London`, `UTC`).

    parameters:
      - name: timezone
        in: path
        type: string
        required: true
        description: "IANA timezone identifier (e.g. 'America/New_York', 'Europe/London', 'Asia/Kolkata')"
        example: America/New_York

    response_example: |
      {
        "data": {
          "timezone": "America/New_York",
          "offset": "-05:00",
          "current_time": "2024-12-15T14:30:00Z",
          "is_dst": false
        },
        "metadata": {
          "timestamp": "2024-12-15T14:30:00Z"
        }
      }

    response_fields:
      - name: timezone
        type: string
        description: IANA timezone identifier (e.g. "America/New_York")
      - name: offset
        type: string
        description: "UTC offset in +HH:MM or -HH:MM format (e.g. '-05:00', '+05:30')"
      - name: current_time
        type: string
        description: Current time in UTC, formatted as RFC 3339 (e.g. "2024-12-15T14:30:00Z")
      - name: is_dst
        type: boolean
        description: Whether the timezone is currently observing daylight saving time

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/places/time/America/New_York" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/places/time/America/New_York"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        print(response.json())

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/places/time/America/New_York',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const data = await response.json();
        console.log(data.data.current_time);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/places/time/America/New_York')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['current_time']

faq:
  - question: Where do I find valid timezone identifiers?
    answer: "This API uses IANA timezone identifiers from the standard Time Zone Database (also known as the Olson database). Examples: 'America/New_York', 'Europe/London', 'Asia/Tokyo', 'Pacific/Auckland', 'UTC'. A full list is available at https://en.wikipedia.org/wiki/List_of_tz_database_time_zones"

  - question: What happens if I provide an invalid timezone?
    answer: The API returns a 404 response with an error message indicating the timezone was not found.

  - question: How do I pass a timezone that contains a slash?
    answer: "Include the full IANA name as the URL path segment. For example, to look up New York time, call GET /v1/places/time/America/New_York — the slash between region and city is part of the URL path."

  - question: What does is_dst mean?
    answer: "is_dst indicates whether the timezone is currently observing Daylight Saving Time. For timezones that do not use DST (e.g. UTC, Asia/Tokyo, Africa/Nairobi), this is always false."

  - question: What format is current_time returned in?
    answer: "current_time is always returned in UTC using the RFC 3339 format (e.g. '2024-12-15T14:30:00Z'). Apply the offset field to convert to local time."
