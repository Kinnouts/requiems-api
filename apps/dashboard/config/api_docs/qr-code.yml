# QR Code Generator API Documentation

api_id: qr-code
api_name: QR Code Generator
description: Generate QR codes from any text or URL. Returns a raw PNG image or base64-encoded JSON, with configurable size and error-correction level.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Adding QR codes to print materials and invoices
    - Sharing URLs or contact information via QR scan
    - Mobile app deep-link distribution
    - Event ticketing and check-in systems
    - Marketing campaigns with trackable URLs

  features:
    - Encodes any text or URL
    - Configurable image size (50–1000 px)
    - Configurable error-correction level (low / medium / high / highest)
    - Dedicated endpoints for raw PNG and base64-encoded JSON

endpoints:
  - name: Generate QR Code (PNG)
    method: GET
    path: /v1/technology/qr
    description: Returns a raw PNG image of the QR code. Ideal for direct embedding or file download.

    parameters:
      - name: data
        type: string
        required: true
        location: query
        description: The text or URL to encode in the QR code
        example: https://example.com

      - name: size
        type: integer
        required: false
        location: query
        description: "Image size in pixels (default: 256, min: 50, max: 1000)"
        example: 200
        default: 256

      - name: recovery
        type: string
        required: false
        location: query
        description: "Error-correction level: low (7%), medium (15%), high (25%), highest (30%). Higher levels are more robust to physical damage but produce larger images. Default: medium"
        example: high
        default: medium

    response_example: |
      <binary PNG image data>

    response_fields:
      - name: (binary)
        type: bytes
        description: Raw PNG image bytes. Content-Type is image/png.

    errors:
      - code: 400
        message: bad_request
        description: "Missing or invalid parameters (e.g. data not provided, size out of range, unknown recovery level)"
      - code: 500
        message: internal_error
        description: Failed to generate QR code

    code_examples:
      curl: |
        # Save a 200px PNG with high error-correction
        curl "https://api.requiems.xyz/v1/technology/qr?data=https://example.com&size=200&recovery=high" \
          -H "requiems-api-key: YOUR_API_KEY" \
          --output qrcode.png

        # Default size (256px), medium error-correction
        curl "https://api.requiems.xyz/v1/technology/qr?data=https://example.com" \
          -H "requiems-api-key: YOUR_API_KEY" \
          --output qrcode.png

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/technology/qr"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"data": "https://example.com", "size": 200, "recovery": "high"}

        response = requests.get(url, headers=headers, params=params)
        with open("qrcode.png", "wb") as f:
            f.write(response.content)

      javascript: |
        const params = new URLSearchParams({
          data: 'https://example.com',
          size: 200,
          recovery: 'high'
        });

        const response = await fetch(
          `https://api.requiems.xyz/v1/technology/qr?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const blob = await response.blob();
        const imgUrl = URL.createObjectURL(blob);

      ruby: |
        require 'net/http'

        uri = URI('https://api.requiems.xyz/v1/technology/qr')
        uri.query = URI.encode_www_form(data: 'https://example.com', size: 200, recovery: 'high')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end
        File.write('qrcode.png', response.body, mode: 'wb')

  - name: Generate QR Code (Base64 JSON)
    method: GET
    path: /v1/technology/qr/base64
    description: Returns a JSON envelope containing the QR code as a base64-encoded PNG string, along with its dimensions.

    parameters:
      - name: data
        type: string
        required: true
        location: query
        description: The text or URL to encode in the QR code
        example: https://example.com

      - name: size
        type: integer
        required: false
        location: query
        description: "Image size in pixels (default: 256, min: 50, max: 1000)"
        example: 200
        default: 256

      - name: recovery
        type: string
        required: false
        location: query
        description: "Error-correction level: low (7%), medium (15%), high (25%), highest (30%). Default: medium"
        example: highest
        default: medium

    response_example: |
      {
        "data": {
          "image": "<base64-encoded PNG data>",
          "width": 256,
          "height": 256
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: image
        type: string
        description: Base64-encoded PNG image data
      - name: width
        type: integer
        description: Width of the generated image in pixels
      - name: height
        type: integer
        description: Height of the generated image in pixels

    errors:
      - code: 400
        message: bad_request
        description: "Missing or invalid parameters (e.g. data not provided, size out of range, unknown recovery level)"
      - code: 500
        message: internal_error
        description: Failed to generate QR code

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/technology/qr/base64?data=https://example.com&size=200&recovery=highest" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/technology/qr/base64"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"data": "https://example.com", "size": 200, "recovery": "highest"}

        response = requests.get(url, headers=headers, params=params)
        result = response.json()["data"]
        print(f"Image (base64): {result['image'][:40]}...")

      javascript: |
        const params = new URLSearchParams({
          data: 'https://example.com',
          size: 200,
          recovery: 'highest'
        });

        const response = await fetch(
          `https://api.requiems.xyz/v1/technology/qr/base64?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const { data } = await response.json();
        // Use as an <img> src
        document.getElementById('qr').src = `data:image/png;base64,${data.image}`;

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/technology/qr/base64')
        uri.query = URI.encode_www_form(data: 'https://example.com', size: 200, recovery: 'highest')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end
        data = JSON.parse(response.body)['data']
        puts data['image'][0..39] + '...'

faq:
  - question: What content can I encode in a QR code?
    answer: Any UTF-8 text — URLs, plain text, phone numbers, email addresses, vCard data, Wi-Fi credentials, etc. The library encodes whatever string you pass in the data parameter.

  - question: What is the default image size?
    answer: "256×256 pixels. You can override it with the size parameter (range: 50–1000 px)."

  - question: Which error-correction level should I choose?
    answer: "Use medium (default) for most digital use-cases. Choose high or highest for print materials where the QR code may be partially covered or damaged. Note that higher levels produce physically larger QR codes because they add more redundant data."

  - question: What is the difference between the two endpoints?
    answer: "GET /v1/technology/qr returns a raw image/png binary — ideal for direct download or embedding with an <img> tag pointing at the API. GET /v1/technology/qr/base64 returns a JSON envelope containing the base64-encoded image — useful when you need to embed the image inline in a JSON response or store the data in a database."

  - question: How do I display the PNG in an HTML page?
    answer: "Use GET /v1/technology/qr/base64 and set the <img> src to data:image/png;base64,{image}, or point the src directly at the GET /v1/technology/qr endpoint URL (the browser will fetch and display it)."
