# QR Code Generator API Documentation

api_id: qr-code
api_name: QR Code Generator
description: Generate QR codes from any text or URL. Returns a PNG image or base64-encoded JSON, with configurable size.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Adding QR codes to print materials and invoices
    - Sharing URLs or contact information via QR scan
    - Mobile app deep-link distribution
    - Event ticketing and check-in systems
    - Marketing campaigns with trackable URLs

  features:
    - Encodes any text or URL
    - Configurable image size (50–1000 px)
    - Raw PNG response or base64-encoded JSON
    - Medium error correction for reliable scanning

endpoints:
  - name: Generate QR Code
    method: GET
    path: /v1/tech/qr
    description: "Generate a QR code from the provided text or URL. Returns a PNG image by default, or base64-encoded JSON when format=base64."

    parameters:
      - name: data
        type: string
        required: true
        location: query
        description: The text or URL to encode in the QR code
        example: https://example.com

      - name: size
        type: integer
        required: false
        location: query
        description: "Image size in pixels (default: 256, min: 50, max: 1000)"
        example: 200
        default: 256

      - name: format
        type: string
        required: false
        location: query
        description: "Response format: png (raw image) or base64 (JSON with base64-encoded image)"
        example: base64
        default: png

    response_example: |
      {
        "data": {
          "image": "<base64-encoded PNG data>",
          "width": 256,
          "height": 256
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: image
        type: string
        description: "Base64-encoded PNG image data (only present when format=base64)"
      - name: width
        type: integer
        description: "Width of the generated image in pixels (only present when format=base64)"
      - name: height
        type: integer
        description: "Height of the generated image in pixels (only present when format=base64)"

    errors:
      - code: 400
        message: bad_request
        description: "Missing or invalid parameters (e.g. data not provided, size out of range, unknown format)"
      - code: 500
        message: internal_error
        description: Failed to generate QR code

    code_examples:
      curl: |
        # Fetch a 200px PNG QR code
        curl "https://api.requiems.xyz/v1/tech/qr?data=https://example.com&size=200" \
          -H "requiems-api-key: YOUR_API_KEY" \
          --output qrcode.png

        # Get base64-encoded QR code as JSON
        curl "https://api.requiems.xyz/v1/tech/qr?data=https://example.com&size=200&format=base64" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        # Download PNG directly
        url = "https://api.requiems.xyz/v1/tech/qr"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"data": "https://example.com", "size": 200}

        response = requests.get(url, headers=headers, params=params)
        with open("qrcode.png", "wb") as f:
            f.write(response.content)

        # Get base64 JSON response
        params["format"] = "base64"
        response = requests.get(url, headers=headers, params=params)
        result = response.json()["data"]
        print(f"Image (base64): {result['image'][:40]}...")

      javascript: |
        // Download PNG as a Blob
        const params = new URLSearchParams({ data: 'https://example.com', size: 200 });
        const response = await fetch(
          `https://api.requiems.xyz/v1/tech/qr?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const blob = await response.blob();
        const imgUrl = URL.createObjectURL(blob);

        // Or get base64 JSON
        params.set('format', 'base64');
        const jsonResponse = await fetch(
          `https://api.requiems.xyz/v1/tech/qr?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const { data } = await jsonResponse.json();
        console.log(data.image); // base64 string

      ruby: |
        require 'net/http'
        require 'json'

        # Download PNG
        uri = URI('https://api.requiems.xyz/v1/tech/qr')
        uri.query = URI.encode_www_form(data: 'https://example.com', size: 200)

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end
        File.write('qrcode.png', response.body, mode: 'wb')

        # Get base64 JSON
        uri.query = URI.encode_www_form(data: 'https://example.com', size: 200, format: 'base64')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end
        data = JSON.parse(response.body)['data']
        puts data['image'][0..39] + '...'

faq:
  - question: What content can I encode in a QR code?
    answer: Any UTF-8 text — URLs, plain text, phone numbers, email addresses, vCard data, Wi-Fi credentials, etc. The library encodes whatever string you pass in the data parameter.

  - question: What is the default image size?
    answer: "256×256 pixels. You can override it with the size parameter (range: 50–1000 px)."

  - question: Which error correction level is used?
    answer: Medium (M), which allows up to 15% of the QR code to be damaged while still remaining scannable. This is a good balance between data density and fault tolerance.

  - question: How do I display the PNG in an HTML page?
    answer: "Fetch the PNG response and use it as an <img> src, or request format=base64 and set the src to data:image/png;base64,{image}."
