# Unit Conversion API Documentation

api_id: unit-conversion
api_name: Unit Conversion
description: Convert between units of measurement. Supports length, weight, volume, temperature, area, and speed conversions.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Scientific and engineering calculations
    - Travel and distance planning
    - Recipe scaling and cooking conversions
    - Fitness and health tracking
    - Educational tools

  features:
    - Length, weight, volume, temperature, area, and speed conversions
    - Human-readable formula in every response
    - Results rounded to 6 decimal places
    - Fast, no-database lookups

endpoints:
  - name: Convert Units
    method: GET
    path: /v1/misc/convert
    description: Convert a value from one unit to another

    parameters:
      - name: from
        in: query
        type: string
        required: true
        description: Source unit key (e.g. miles, kg, c)
      - name: to
        in: query
        type: string
        required: true
        description: Target unit key (e.g. km, lb, f)
      - name: value
        in: query
        type: number
        required: true
        description: Numeric value to convert

    response_example: |
      {
        "data": {
          "from": "miles",
          "to": "km",
          "input": 10,
          "result": 16.09344,
          "formula": "miles × 1.609344"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: from
        type: string
        description: Source unit key
      - name: to
        type: string
        description: Target unit key
      - name: input
        type: number
        description: The original input value
      - name: result
        type: number
        description: The converted value (rounded to 6 decimal places)
      - name: formula
        type: string
        description: Human-readable conversion formula

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/misc/convert?from=miles&to=km&value=10" \
          -H "Authorization: Bearer YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/misc/convert"
        params = {"from": "miles", "to": "km", "value": 10}
        headers = {"Authorization": "Bearer YOUR_API_KEY"}

        response = requests.get(url, params=params, headers=headers)
        print(response.json())

      javascript: |
        const params = new URLSearchParams({ from: 'miles', to: 'km', value: 10 });
        const response = await fetch(`https://api.requiems.xyz/v1/misc/convert?${params}`, {
          headers: {
            'Authorization': 'Bearer YOUR_API_KEY'
          }
        });

        const data = await response.json();
        console.log(data.data.result); // 16.09344

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/misc/convert')
        uri.query = URI.encode_www_form(from: 'miles', to: 'km', value: 10)
        request = Net::HTTP::Get.new(uri)
        request['Authorization'] = 'Bearer YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['result'] # 16.09344

