faq:
  - question: What unit categories are supported?
    answer: >-
      Length, weight, volume, temperature, area, and speed. You cannot convert between different categories (e.g. miles
      to kg will return a 400 error).
  - question: How precise are the results?
    answer: Results are rounded to 6 decimal places. The formula field shows the exact conversion factor used.
  - question: Are the unit keys case-sensitive?
    answer: Yes. Unit keys must be lowercase exactly as shown in the supported units table (e.g. use "km" not "KM").
  - question: Do I need to call the units list endpoint every time I convert?
    answer: >-
      No. Call the /v1/technology/convert/units endpoint once to discover available units, then cache the response. The
      list of available units changes very infrequently.
  - question: Can I convert between different categories (e.g., length to weight)?
    answer: >-
      No. You can only convert between units within the same category. For example, you can convert meters to feet (both
      length), but not meters to kilograms. The API will return a 400 error for incompatible units.
  - question: Will new units be added in the future?
    answer: >-
      Yes, we periodically add new units based on user requests. If you need a specific unit that's not currently
      available, please contact support@requiems.xyz.
