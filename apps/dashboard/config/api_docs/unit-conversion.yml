# Unit Conversion API Documentation

title: "Unit Conversion"
description: "Convert between units of measurement — length, weight, volume, temperature, area, speed, data, and time."
version: "1.0"
base_path: "/v1/misc"

overview: |
  The Unit Conversion API converts any numeric value between compatible units of
  measurement. Pass the source unit, target unit, and value as query parameters
  and receive the converted result together with a human-readable conversion
  formula.

authentication:
  type: "API Key"
  header: "requiems-api-key"
  description: "Include your API key in the request header"

endpoints:
  - name: "Convert Units"
    path: "/v1/misc/convert"
    method: "GET"
    description: "Convert a numeric value from one unit to another"

    parameters:
      - name: "from"
        type: "string"
        required: true
        description: "The source unit (e.g. miles, kg, celsius)"
        example: "miles"

      - name: "to"
        type: "string"
        required: true
        description: "The target unit (e.g. km, lb, fahrenheit)"
        example: "km"

      - name: "value"
        type: "number"
        required: true
        description: "The numeric value to convert"
        example: 10

    responses:
      - status: 200
        description: "Successful conversion"
        example: |
          {
            "from": "miles",
            "to": "km",
            "input": 10,
            "result": 16.09344,
            "formula": "miles × 1.609344"
          }
        schema:
          type: "object"
          properties:
            - name: "from"
              type: "string"
              description: "Source unit as provided"
            - name: "to"
              type: "string"
              description: "Target unit as provided"
            - name: "input"
              type: "number"
              description: "Original input value"
            - name: "result"
              type: "number"
              description: "Converted value"
            - name: "formula"
              type: "string"
              description: "Human-readable conversion formula"

      - status: 400
        description: "Invalid or incompatible parameters"
        example: |
          {
            "error": "cannot convert miles to kg: incompatible unit types"
          }

      - status: 401
        description: "Invalid or missing API key"
        example: |
          {
            "error": "Invalid API key"
          }

      - status: 429
        description: "Rate limit exceeded"
        example: |
          {
            "error": "Rate limit exceeded. Try again in 60 seconds."
          }

code_examples:
  curl: |
    # Convert 10 miles to kilometres
    curl -H "requiems-api-key: YOUR_API_KEY" \
      "https://api.requiems.xyz/v1/misc/convert?from=miles&to=km&value=10"

    # Convert 100 °C to °F
    curl -H "requiems-api-key: YOUR_API_KEY" \
      "https://api.requiems.xyz/v1/misc/convert?from=celsius&to=fahrenheit&value=100"

    # Convert 5 kg to pounds
    curl -H "requiems-api-key: YOUR_API_KEY" \
      "https://api.requiems.xyz/v1/misc/convert?from=kg&to=lb&value=5"

  javascript: |
    const response = await fetch(
      'https://api.requiems.xyz/v1/misc/convert?from=miles&to=km&value=10',
      { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
    );
    const data = await response.json();
    console.log(`${data.input} ${data.from} = ${data.result} ${data.to}`);
    // 10 miles = 16.09344 km

  python: |
    import requests

    headers = {'requiems-api-key': 'YOUR_API_KEY'}
    params = {'from': 'miles', 'to': 'km', 'value': 10}

    response = requests.get(
        'https://api.requiems.xyz/v1/misc/convert',
        headers=headers,
        params=params
    )

    data = response.json()
    print(f"{data['input']} {data['from']} = {data['result']} {data['to']}")

  ruby: |
    require 'net/http'
    require 'uri'
    require 'json'

    uri = URI('https://api.requiems.xyz/v1/misc/convert')
    uri.query = URI.encode_www_form(from: 'miles', to: 'km', value: 10)

    request = Net::HTTP::Get.new(uri)
    request['requiems-api-key'] = 'YOUR_API_KEY'

    response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
      http.request(request)
    end

    data = JSON.parse(response.body)
    puts "#{data['input']} #{data['from']} = #{data['result']} #{data['to']}"

  go: |
    package main

    import (
        "encoding/json"
        "fmt"
        "io"
        "net/http"
    )

    func main() {
        req, _ := http.NewRequest("GET",
            "https://api.requiems.xyz/v1/misc/convert?from=miles&to=km&value=10", nil)
        req.Header.Set("requiems-api-key", "YOUR_API_KEY")

        client := &http.Client{}
        resp, _ := client.Do(req)
        defer resp.Body.Close()

        body, _ := io.ReadAll(resp.Body)

        var result map[string]interface{}
        json.Unmarshal(body, &result)

        fmt.Printf("%.0f %s = %v %s\n",
            result["input"], result["from"], result["result"], result["to"])
    }

use_cases:
  - title: "E-commerce"
    description: "Display product dimensions and weights in the customer's preferred unit system"

  - title: "Scientific Applications"
    description: "Convert measurement data between unit systems for calculations and reporting"

  - title: "Travel & Navigation"
    description: "Convert distances and speeds between metric and imperial systems"

  - title: "Cooking & Recipes"
    description: "Convert ingredient volumes and weights for international recipes"

  - title: "Health & Fitness"
    description: "Convert body weight, height, and distance metrics between systems"

faq:
  - question: "What unit categories are supported?"
    answer: "Length, weight, volume, temperature, area, speed, digital data, and time."

  - question: "Are unit names case-sensitive?"
    answer: "No. Unit names are matched case-insensitively, so 'Miles', 'MILES', and 'miles' all work."

  - question: "Can I convert between temperature scales?"
    answer: "Yes. celsius, fahrenheit, and kelvin are all supported. Use the full name or the abbreviation (c, f, k)."

  - question: "What happens if I try to convert incompatible units?"
    answer: "The API returns a 400 error explaining that the units belong to different categories (e.g. length vs weight)."

  - question: "How precise are the results?"
    answer: "Results are rounded to at most 10 decimal places using standard IEEE 754 double-precision arithmetic."

rate_limits:
  free: "500 requests/month, 30 requests/minute"
  developer: "100,000 requests/month, 5,000 requests/minute"
  business: "1,000,000 requests/month, 10,000 requests/minute"
  professional: "10,000,000 requests/month, 50,000 requests/minute"

pricing:
  note: "Included in all plans. No additional per-request fees."
