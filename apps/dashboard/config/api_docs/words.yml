api_id: random-word
api_name: Random Word
description: >-
  Get random words with definitions and parts of speech. Perfect for vocabulary builders, educational apps, word games,
  or content inspiration.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Vocabulary learning applications
    - Word-of-the-day features
    - Educational tools and flashcards
    - Writing prompts and creative inspiration
    - Word game development
  features:
    - Curated collection of English words
    - Includes dictionary definitions
    - Parts of speech classification
    - No parameters required
endpoints:
  - name: Get Random Word
    method: GET
    path: /v1/text/words/random
    description: Returns a random word with its definition and part of speech
    parameters: []
    response_example: |
      {
        "data": {
          "id": 123,
          "word": "ephemeral",
          "definition": "lasting for a very short time",
          "part_of_speech": "adjective"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: id
        type: integer
        description: Unique identifier for the word
      - name: word
        type: string
        description: The random word
      - name: definition
        type: string
        description: Dictionary definition of the word
      - name: part_of_speech
        type: string
        description: Grammatical classification (e.g., noun, verb, adjective, adverb)
    errors:
      - code: 503
        message: service_unavailable
        description: No words available in the database
    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/text/words/random \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/text/words/random"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        word_data = response.json()['data']
        print(f"{word_data['word']} ({word_data['part_of_speech']}): {word_data['definition']}")
      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/text/words/random', {
          headers: {
            'requiems-api-key': 'YOUR_API_KEY'
          }
        });

        const { data } = await response.json();
        console.log(`${data.word} (${data.part_of_speech}): ${data.definition}`);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/text/words/random')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "#{data['word']} (#{data['part_of_speech']}): #{data['definition']}"
faq:
  - question: What parts of speech are included?
    answer: >-
      The API includes all major parts of speech including nouns, verbs, adjectives, adverbs, prepositions,
      conjunctions, and more.
  - question: Can I filter by part of speech or difficulty level?
    answer: >-
      Currently, the API returns completely random words. Filtering by part of speech or difficulty level is planned for
      a future update.
  - question: How many words are in the database?
    answer: >-
      Our collection contains thousands of carefully curated English words with accurate definitions, covering a wide
      range of vocabulary levels.
  - question: Are the definitions from a specific dictionary?
    answer: >-
      The definitions are curated from reputable dictionary sources to provide clear, concise explanations suitable for
      general use.
