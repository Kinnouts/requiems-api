# Holidays API Documentation

api_id: holidays
api_name: Holidays
description: Get a list of public holidays for any country and year. Useful for building calendar apps, scheduling, and compliance tools.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Calendar applications
    - Scheduling and booking systems
    - Compliance and deadline tracking
    - Travel and logistics planning

  features:
    - Support for 190+ countries
    - National and public holidays
    - Yearly calendar data
    - Fast response times

endpoints:
  - name: Get Holidays
    method: GET
    path: /v1/places/holidays
    description: Returns a list of public holidays for the specified country and year

    parameters:
      - name: country
        type: string
        required: true
        location: query
        description: ISO 3166-1 alpha-2 country code (e.g., "US", "GB", "DE")
        example: US
      - name: year
        type: integer
        required: true
        location: query
        description: Year for which to retrieve holidays (e.g., 2025)
        example: 2025

    response_example: |
      {
        "data": {
          "country": "US",
          "year": 2025,
          "holidays": [
            {
              "date": "2025-01-01",
              "name": "New Year's Day"
            },
            {
              "date": "2025-07-04",
              "name": "Independence Day"
            }
          ],
          "total": 11
        },
        "metadata": {
          "timestamp": "2025-01-15T10:30:00Z"
        }
      }

    response_fields:
      - name: country
        type: string
        description: ISO 3166-1 alpha-2 country code
      - name: year
        type: integer
        description: Year for which holidays are returned
      - name: holidays
        type: array
        description: Array of holiday objects
      - name: holidays[].date
        type: string
        description: Holiday date in YYYY-MM-DD format
      - name: holidays[].name
        type: string
        description: Name of the holiday
      - name: total
        type: integer
        description: Total number of holidays for the country/year

    errors:
      - code: bad_request
        status: 400
        description: Missing or invalid country code or year parameter
      - code: not_found
        status: 404
        description: No holidays found for the specified country and year

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/places/holidays?country=US&year=2025" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/places/holidays"
        params = {"country": "US", "year": 2025}
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers, params=params)
        print(response.json())

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/places/holidays?country=US&year=2025', {
          headers: {
            'requiems-api-key': 'YOUR_API_KEY'
          }
        });

        const data = await response.json();
        console.log(data.data.holidays);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/places/holidays')
        uri.query = URI.encode_www_form(country: 'US', year: 2025)
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['holidays']

faq:
  - question: Which countries are supported?
    answer: The API supports holidays for over 190 countries using ISO 3166-1 alpha-2 country codes. This includes all UN member states plus many territories and dependencies.

  - question: What types of holidays are included?
    answer: The API returns national and public holidays for each country, including federal holidays, bank holidays, and widely observed holidays. Religious and regional holidays may vary by country.

  - question: Can I get holidays for multiple years?
    answer: Currently, holidays are returned for a single year per request. To get holidays across multiple years, make separate requests for each year.
