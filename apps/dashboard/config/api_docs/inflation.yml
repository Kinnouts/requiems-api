api_id: inflation
api_name: Inflation
description: >-
  Historical and current CPI inflation rates for 241 countries, sourced from the World Bank. Returns up to 30 years of
  annual data per country.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Economic dashboards and financial research tools
    - Country comparison and risk analysis
    - Inflation-adjusted financial modelling
    - Macroeconomics education platforms
    - Investment research and reporting
  features:
    - 241 countries covered
    - Up to 30 years of annual CPI data
    - Sourced from the World Bank (FP.CPI.TOTL.ZG indicator)
    - Current rate and 10 years of history in a single request
    - ISO 3166-1 alpha-2 country codes
    - Batch endpoint for up to 50 countries per request
endpoints:
  - name: Get Inflation Rate
    method: GET
    path: /v1/finance/inflation
    description: Returns the latest annual CPI inflation rate for a country plus the previous 10 years of historical data.
    parameters:
      - name: country
        type: string
        required: true
        location: query
        description: ISO 3166-1 alpha-2 country code (e.g. US, GB, DE). Case-insensitive.
        example: US
    response_example: |
      {
        "data": {
          "country": "US",
          "rate": 2.9495,
          "period": "2024",
          "historical": [
            { "period": "2023", "rate": 4.1163 },
            { "period": "2022", "rate": 8.0028 },
            { "period": "2021", "rate": 4.6979 },
            { "period": "2020", "rate": 1.2336 },
            { "period": "2019", "rate": 1.8122 },
            { "period": "2018", "rate": 2.4426 },
            { "period": "2017", "rate": 2.1301 },
            { "period": "2016", "rate": 1.2616 },
            { "period": "2015", "rate": 0.1186 },
            { "period": "2014", "rate": 1.6222 }
          ]
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: country
        type: string
        description: ISO 3166-1 alpha-2 country code, uppercased
      - name: rate
        type: number
        description: Latest annual CPI inflation rate as a percentage (e.g. 2.9495 means 2.9495%)
      - name: period
        type: string
        description: Year of the latest data point (e.g. 2024)
      - name: historical
        type: array
        description: Up to 10 previous years of inflation data, ordered newest to oldest
      - name: historical[].period
        type: string
        description: Year of the historical data point
      - name: historical[].rate
        type: number
        description: Annual CPI inflation rate for that year
    errors:
      - code: bad_request
        status: 400
        description: The country parameter is missing or is not a valid ISO 3166-1 alpha-2 code.
      - code: not_found
        status: 404
        description: No inflation data found for the given country code.
      - code: internal_error
        status: 500
        description: Unexpected server error.
    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/finance/inflation?country=US" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/finance/inflation"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"country": "US"}

        response = requests.get(url, headers=headers, params=params)
        data = response.json()["data"]
        print(data["rate"])    # 2.9495
        print(data["period"])  # "2024"
      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/finance/inflation?country=US',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const { data } = await response.json();
        console.log(data.rate);    // 2.9495
        console.log(data.period);  // "2024"
        console.log(data.historical.length); // 10
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/finance/inflation')
        uri.query = URI.encode_www_form(country: 'US')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts data['rate']    # 2.9495
        puts data['period']  # "2024"

  - name: Batch Inflation Rates
    method: POST
    path: /v1/finance/inflation/batch
    description: >-
      Returns inflation data for up to 50 countries in a single request. Results are in the same order as the input.
      Countries with no data return found: false instead of failing the whole request.
      Billing: 1 credit per country (not per HTTP request).
    parameters:
      - name: countries
        type: array
        required: true
        location: body
        description: "Array of ISO 3166-1 alpha-2 country codes. Min: 1, Max: 50."
        example: '["US", "AR", "DE"]'
    response_example: |
      {
        "data": {
          "results": [
            {
              "country": "US",
              "found": true,
              "rate": 2.9495,
              "period": "2024",
              "historical": [
                { "period": "2023", "rate": 4.1163 }
              ]
            },
            {
              "country": "AR",
              "found": true,
              "rate": 211.4,
              "period": "2024",
              "historical": []
            },
            {
              "country": "XX",
              "found": false
            }
          ],
          "total": 3
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: results
        type: array
        description: One entry per country, in the same order as the input array
      - name: results[].country
        type: string
        description: ISO 3166-1 alpha-2 country code, uppercased
      - name: results[].found
        type: boolean
        description: "false when the country has no data in the World Bank set"
      - name: results[].rate
        type: number
        description: "Latest CPI inflation rate. Omitted when found: false"
      - name: results[].period
        type: string
        description: "Year of the latest data point. Omitted when found: false"
      - name: results[].historical
        type: array
        description: "Up to 10 previous years. Omitted when found: false"
      - name: total
        type: integer
        description: Total number of results returned (equals number of countries sent)
    errors:
      - code: validation_failed
        status: 422
        description: "Body is invalid: empty array, more than 50 items, or a bad country code."
      - code: internal_error
        status: 500
        description: Unexpected server error.
    code_examples:
      curl: |
        curl -X POST "https://api.requiems.xyz/v1/finance/inflation/batch" \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"countries": ["US", "AR", "DE"]}'
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/finance/inflation/batch"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        payload = {"countries": ["US", "AR", "DE"]}

        response = requests.post(url, headers=headers, json=payload)
        results = response.json()["data"]["results"]
        for item in results:
            if item["found"]:
                print(f"{item['country']}: {item['rate']}%")
            else:
                print(f"{item['country']}: no data")
      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/finance/inflation/batch',
          {
            method: 'POST',
            headers: {
              'requiems-api-key': 'YOUR_API_KEY',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ countries: ['US', 'AR', 'DE'] })
          }
        );

        const { data } = await response.json();
        data.results.forEach(item => {
          if (item.found) {
            console.log(`${item.country}: ${item.rate}%`);
          } else {
            console.log(`${item.country}: no data`);
          }
        });
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/finance/inflation/batch')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        request['Content-Type'] = 'application/json'
        request.body = { countries: ['US', 'AR', 'DE'] }.to_json

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        results = JSON.parse(response.body)['data']['results']
        results.each do |item|
          if item['found']
            puts "#{item['country']}: #{item['rate']}%"
          else
            puts "#{item['country']}: no data"
          end
        end

faq:
  - question: How often is the data updated?
    answer: >-
      Data is sourced from the World Bank and updated annually when new figures are published (typically mid-year for
      the prior calendar year). Re-run the seed CLI to pull the latest data.
  - question: What does the rate represent?
    answer: >-
      The rate is the annual percentage change in the Consumer Price Index (CPI) — the World Bank indicator
      FP.CPI.TOTL.ZG. A rate of 8.0 means prices rose 8% on average over that year.
  - question: Why does my country return 404 (or found false in batch)?
    answer: >-
      Some territories or newly recognised states may not have CPI data in the World Bank dataset. The database is
      seeded from World Bank records and only includes countries with available data.
  - question: Are the rates in percent or decimal form?
    answer: Percent. A rate of 2.9495 means 2.9495%, not 0.029495. The value is stored with 4 decimal places of precision.
  - question: How is the batch endpoint billed?
    answer: >-
      Each country in the batch counts as 1 credit. A request with 10 countries costs 10 credits, the same as making
      10 individual requests. The batch endpoint saves on HTTP overhead but not on credit usage.
