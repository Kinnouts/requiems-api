# Dad Jokes API Documentation

api_id: dad-jokes
api_name: Dad Jokes
description: Get a random dad joke. Classic groan-worthy puns and wholesome humor, served one at a time.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Fun widgets and entertainment apps
    - Onboarding or loading screen filler
    - Daily joke bots and Slack integrations
    - Icebreaker features

  features:
    - Random joke on every request
    - Each joke includes a stable identifier
    - No parameters required

endpoints:
  - name: Get Random Dad Joke
    method: GET
    path: /v1/entertainment/jokes/dad
    description: Returns a randomly selected dad joke from the collection.

    response_example: |
      {
        "data": {
          "id": "joke_7",
          "joke": "Why don't scientists trust atoms? Because they make up everything!"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: id
        type: string
        description: Stable identifier for the joke (e.g. "joke_7")
      - name: joke
        type: string
        description: The full text of the dad joke

    errors:
      - status: 401
        code: unauthorized
        description: Missing API key
      - status: 403
        code: forbidden
        description: Invalid or revoked API key

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/entertainment/jokes/dad \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/entertainment/jokes/dad"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        print(response.json()["data"]["joke"])

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/entertainment/jokes/dad',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const { data } = await response.json();
        console.log(data.joke);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/entertainment/jokes/dad')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['joke']

faq:
  - question: Is a different joke returned every time?
    answer: Yes. Each request returns a randomly selected joke from the collection, so consecutive calls will typically return different jokes.

  - question: What does the id field represent?
    answer: The id is a stable string identifier for the joke (e.g. "joke_7"). It can be used to reference or deduplicate specific jokes.
