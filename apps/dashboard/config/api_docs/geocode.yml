api_id: geocode
api_name: Geocoding
description: Convert human-readable addresses into geographic coordinates (geocoding) and convert coordinates back into addresses (reverse geocoding). Powered by OpenStreetMap via the Nominatim API.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Place pins on a map from a user-supplied address
    - Convert GPS coordinates to a readable address for display
    - Validate and normalise addresses
    - Power location-aware search and filtering features

  features:
    - Forward geocoding (address to lat/lon)
    - Reverse geocoding (lat/lon to address)
    - Worldwide coverage via OpenStreetMap data
    - Results cached for 24 hours for fast repeated lookups

endpoints:
  - name: Geocode Address
    method: GET
    path: /v1/places/geocode
    description: Converts a free-text address into latitude and longitude coordinates.

    parameters:
      - name: address
        location: query
        type: string
        required: true
        description: The address to geocode (street, city, country, or any combination)
        example: 1600 Pennsylvania Ave NW, Washington DC

    response_example: |
      {
        "data": {
          "address": "White House, 1600, Pennsylvania Avenue Northwest, Ward 2, Washington, District of Columbia, 20500, United States",
          "city": "Washington",
          "country": "US",
          "lat": 38.8976763,
          "lon": -77.0365298
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: address
        type: string
        description: Full display name of the matched location
      - name: city
        type: string
        description: City or town of the matched location
      - name: country
        type: string
        description: ISO 3166-1 alpha-2 country code (uppercase)
      - name: lat
        type: number
        description: Latitude of the matched location
      - name: lon
        type: number
        description: Longitude of the matched location

    errors:
      - code: not_found
        status: 404
        description: No results found for the given address.
      - code: upstream_error
        status: 503
        description: The geocoding service is temporarily unavailable.
      - code: bad_request
        status: 400
        description: The address parameter is missing.

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/places/geocode?address=1600+Pennsylvania+Ave+NW" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/places/geocode"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, params={"address": "1600 Pennsylvania Ave NW"}, headers=headers)
        data = response.json()
        print(data["data"]["lat"], data["data"]["lon"])

      javascript: |
        const params = new URLSearchParams({ address: '1600 Pennsylvania Ave NW' });
        const response = await fetch(
          `https://api.requiems.xyz/v1/places/geocode?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const data = await response.json();
        console.log(data.data.lat, data.data.lon);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/places/geocode')
        uri.query = URI.encode_www_form(address: '1600 Pennsylvania Ave NW')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts "#{data['data']['lat']}, #{data['data']['lon']}"

  - name: Reverse Geocode
    method: GET
    path: /v1/places/reverse-geocode
    description: Converts geographic coordinates into a human-readable address.

    parameters:
      - name: lat
        location: query
        type: number
        required: true
        description: "Latitude of the location (-90 to 90)"
        example: 38.8977
      - name: lon
        location: query
        type: number
        required: true
        description: "Longitude of the location (-180 to 180)"
        example: -77.0365

    response_example: |
      {
        "data": {
          "lat": 38.8977,
          "lon": -77.0365,
          "address": "White House, 1600, Pennsylvania Avenue Northwest, Ward 2, Washington, District of Columbia, 20500, United States",
          "city": "Washington",
          "country": "US"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: lat
        type: number
        description: Latitude as provided in the request
      - name: lon
        type: number
        description: Longitude as provided in the request
      - name: address
        type: string
        description: Full display name of the location at the given coordinates
      - name: city
        type: string
        description: City or town at the given coordinates
      - name: country
        type: string
        description: ISO 3166-1 alpha-2 country code (uppercase)

    errors:
      - code: not_found
        status: 404
        description: No address found for the given coordinates.
      - code: upstream_error
        status: 503
        description: The geocoding service is temporarily unavailable.
      - code: bad_request
        status: 400
        description: "lat or lon is missing or out of range (lat: -90..90, lon: -180..180)."

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/places/reverse-geocode?lat=38.8977&lon=-77.0365" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/places/reverse-geocode"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, params={"lat": 38.8977, "lon": -77.0365}, headers=headers)
        data = response.json()
        print(data["data"]["address"])

      javascript: |
        const params = new URLSearchParams({ lat: 38.8977, lon: -77.0365 });
        const response = await fetch(
          `https://api.requiems.xyz/v1/places/reverse-geocode?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const data = await response.json();
        console.log(data.data.address);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/places/reverse-geocode')
        uri.query = URI.encode_www_form(lat: 38.8977, lon: -77.0365)

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['address']

faq:
  - question: What geocoding data source does this API use?
    answer: The API uses Nominatim, the official geocoder for OpenStreetMap. It provides worldwide coverage and is kept up to date with OSM community edits.

  - question: Are results cached?
    answer: Yes. Results are cached for 24 hours. Repeated calls with the same address or coordinates return instantly without hitting the upstream service.

  - question: How precise is reverse geocoding?
    answer: Precision depends on the density of OpenStreetMap data at the given coordinates. In well-mapped areas (most cities worldwide) you will get street-level accuracy. Remote areas may return only a region or country.

  - question: Can I geocode non-English addresses?
    answer: Yes. Nominatim supports addresses in most languages and scripts. Pass the address in its native language for best results.
