api_id: crypto
api_name: Crypto Prices
description: >-
  Get live cryptocurrency prices, 24-hour change, market cap, and trading volume for 20+ major coins. Prices are sourced
  from CoinGecko and cached for up to 5 minutes.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Crypto portfolio dashboards
    - Price alert systems
    - Financial apps and widgets
    - Trading bots and analytics tools
  features:
    - "20+ supported coins: BTC, ETH, SOL, BNB, XRP, ADA, DOGE, and more"
    - 24-hour price change percentage
    - Market cap and trading volume
    - Results cached for 5 minutes for low latency
endpoints:
  - name: Get Crypto Price
    method: GET
    path: /v1/finance/crypto/{symbol}
    description: Returns current price data for the given cryptocurrency symbol.
    parameters:
      - name: symbol
        type: string
        required: true
        location: path
        description: Uppercase ticker symbol (e.g. BTC, ETH, SOL)
        example: BTC
    response_example: |
      {
        "data": {
          "symbol": "BTC",
          "name": "Bitcoin",
          "price_usd": 42000.50,
          "change_24h": 2.5,
          "market_cap": 820000000000,
          "volume_24h": 25000000000
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: symbol
        type: string
        description: Uppercase ticker symbol
      - name: name
        type: string
        description: Full coin name
      - name: price_usd
        type: number
        description: Current price in USD
      - name: change_24h
        type: number
        description: Price change over the last 24 hours as a percentage
      - name: market_cap
        type: number
        description: Total market capitalisation in USD
      - name: volume_24h
        type: number
        description: Total trading volume over the last 24 hours in USD
    errors:
      - code: unknown_symbol
        status: 422
        description: The symbol is not in the supported coin list.
      - code: upstream_error
        status: 503
        description: CoinGecko is unavailable or returned an unexpected response.
    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/finance/crypto/BTC \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/finance/crypto/BTC"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        data = response.json()["data"]
        print(f"{data['name']}: ${data['price_usd']:,.2f}")
      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/finance/crypto/BTC', {
          headers: { 'requiems-api-key': 'YOUR_API_KEY' }
        });

        const { data } = await response.json();
        console.log(`${data.name}: $${data.price_usd.toLocaleString()}`);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/finance/crypto/BTC')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "#{data['name']}: $#{data['price_usd']}"
faq:
  - question: Which symbols are supported?
    answer: >-
      BTC, ETH, BNB, XRP, ADA, SOL, DOGE, DOT, MATIC, AVAX, LINK, LTC, UNI, ATOM, TRX, XLM, ALGO, NEAR, FTM, SHIB. Pass
      the symbol in uppercase or lowercase — both are accepted.
  - question: How fresh is the price data?
    answer: >-
      Prices are cached for 5 minutes to reduce latency and upstream load. For real-time trading use cases, check the
      timestamp in the metadata envelope.
  - question: Are prices in USD only?
    answer: >-
      Yes, all prices are denominated in USD. For other currency conversions use the Exchange Rate API alongside this
      endpoint.
performance:
  p50_ms: 813
  p95_ms: 1021
  p99_ms: 1214
  avg_ms: 844
  samples: 50
  measured_at: "2026-04-20"
