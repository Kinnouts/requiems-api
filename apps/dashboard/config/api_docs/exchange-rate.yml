api_id: exchange-rate
api_name: Exchange Rate
description: >-
  Get live currency exchange rates and convert amounts between currencies. Rates are sourced from the European Central
  Bank via Frankfurter and cached for up to one hour.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - E-commerce multi-currency pricing
    - Fintech apps and payment processors
    - Travel and expense management tools
    - Financial dashboards and reporting
    - Invoice generation in foreign currencies
  features:
    - 180+ currencies supported (ECB data via Frankfurter)
    - Rates cached for 1 hour — fast responses, minimal latency
    - Combined convert endpoint returns rate and converted amount in one call
    - ISO 4217 three-letter currency codes (USD, EUR, GBP, JPY, etc.)
endpoints:
  - name: Get Exchange Rate
    method: GET
    path: /v1/finance/exchange-rate
    description: Returns the current exchange rate between two currencies.
    parameters:
      - name: from
        type: string
        required: true
        location: query
        description: ISO 4217 source currency code (3 letters, e.g. USD)
        example: USD
      - name: to
        type: string
        required: true
        location: query
        description: ISO 4217 target currency code (3 letters, e.g. EUR)
        example: EUR
    response_example: |
      {
        "data": {
          "from": "USD",
          "to": "EUR",
          "rate": 0.92,
          "timestamp": "2024-12-15T00:00:00Z"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: from
        type: string
        description: Source currency code (uppercased)
      - name: to
        type: string
        description: Target currency code (uppercased)
      - name: rate
        type: number
        description: Exchange rate — how many units of `to` equal 1 unit of `from`
      - name: timestamp
        type: string
        description: Date the rate was published by the ECB (ISO 8601)
    errors:
      - code: bad_request
        status: 400
        description: A required parameter is missing or the currency code is not exactly 3 alphabetic characters.
      - code: invalid_currency
        status: 422
        description: One or both currency codes are not recognised by the upstream data source.
      - code: upstream_error
        status: 503
        description: The exchange rate data source is temporarily unavailable.
    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/finance/exchange-rate?from=USD&to=EUR" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/finance/exchange-rate"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"from": "USD", "to": "EUR"}

        response = requests.get(url, headers=headers, params=params)
        data = response.json()["data"]
        print(data["rate"])  # 0.92
      javascript: |
        const params = new URLSearchParams({ from: 'USD', to: 'EUR' });
        const response = await fetch(
          `https://api.requiems.xyz/v1/finance/exchange-rate?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const { data } = await response.json();
        console.log(data.rate);  // 0.92
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/finance/exchange-rate')
        uri.query = URI.encode_www_form(from: 'USD', to: 'EUR')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts data['rate']  # 0.92
  - name: Convert Currency
    method: GET
    path: /v1/finance/convert
    description: Converts an amount from one currency to another and returns the rate alongside the converted value.
    parameters:
      - name: from
        type: string
        required: true
        location: query
        description: ISO 4217 source currency code (3 letters, e.g. USD)
        example: USD
      - name: to
        type: string
        required: true
        location: query
        description: ISO 4217 target currency code (3 letters, e.g. EUR)
        example: EUR
      - name: amount
        type: number
        required: true
        location: query
        description: Amount to convert. Must be greater than 0.
        example: 100
    response_example: |
      {
        "data": {
          "from": "USD",
          "to": "EUR",
          "rate": 0.92,
          "amount": 100,
          "converted": 92.00,
          "timestamp": "2024-12-15T00:00:00Z"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: from
        type: string
        description: Source currency code (uppercased)
      - name: to
        type: string
        description: Target currency code (uppercased)
      - name: rate
        type: number
        description: Exchange rate used for the conversion
      - name: amount
        type: number
        description: The original amount passed in the request
      - name: converted
        type: number
        description: Result of amount × rate, rounded to 2 decimal places
      - name: timestamp
        type: string
        description: Date the rate was published by the ECB (ISO 8601)
    errors:
      - code: bad_request
        status: 400
        description: >-
          A required parameter is missing, the currency code is not 3 alphabetic characters, or the amount is 0 or
          negative.
      - code: invalid_currency
        status: 422
        description: One or both currency codes are not recognised by the upstream data source.
      - code: upstream_error
        status: 503
        description: The exchange rate data source is temporarily unavailable.
    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/finance/convert?from=USD&to=EUR&amount=100" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/finance/convert"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"from": "USD", "to": "EUR", "amount": 100}

        response = requests.get(url, headers=headers, params=params)
        data = response.json()["data"]
        print(data["converted"])  # 92.0
        print(data["rate"])       # 0.92
      javascript: |
        const params = new URLSearchParams({ from: 'USD', to: 'EUR', amount: 100 });
        const response = await fetch(
          `https://api.requiems.xyz/v1/finance/convert?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const { data } = await response.json();
        console.log(data.converted);  // 92
        console.log(data.rate);       // 0.92
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/finance/convert')
        uri.query = URI.encode_www_form(from: 'USD', to: 'EUR', amount: 100)

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts data['converted']  # 92.0
        puts data['rate']       # 0.92
faq:
  - question: How often are rates updated?
    answer: >-
      Rates come from the European Central Bank and are published on business days, typically around 16:00 CET. The API
      caches each rate pair for 1 hour, so responses are fast and the cache stays fresh.
  - question: Which currencies are supported?
    answer: >-
      All currencies supported by the ECB via Frankfurter — approximately 170 currencies. If you pass an unsupported
      code you will receive a 422 invalid_currency error.
  - question: Is the converted amount rounded?
    answer: >-
      Yes — the converted field is rounded to 2 decimal places. The rate itself is returned at full precision as
      provided by the ECB.
  - question: Can I convert between two non-USD/EUR currencies?
    answer: Yes. Any from/to combination is supported as long as both codes are in the ECB dataset.
  - question: Why did I get a 503?
    answer: >-
      The Frankfurter upstream service is temporarily unavailable. Rates are cached for 1 hour, so a 503 typically means
      the cache expired and the upstream could not be reached. Retry after a short delay.
performance:
  p50_ms: 868
  p95_ms: 1092
  p99_ms: 1168
  avg_ms: 900
  samples: 50
  measured_at: "2026-04-16"
