api_id: password-generator
api_name: Password Generator
description: >-
  Generate cryptographically secure random passwords with customizable complexity. Perfect for user registration,
  password reset flows, or security tools.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - User registration systems
    - Password reset functionality
    - Security tools and applications
    - Temporary credential generation
    - API key generation
  features:
    - Cryptographically secure random generation (crypto/rand)
    - Customizable length (8-128 characters)
    - Optional character sets (uppercase, numbers, symbols)
    - Automatic strength assessment
    - Guaranteed character distribution
endpoints:
  - name: Generate Password
    method: GET
    path: /v1/technology/password
    description: Generate a cryptographically secure random password with customizable character sets and length
    parameters:
      - name: length
        type: integer
        required: false
        location: query
        description: Password length (8-128 characters)
        example: 16
        default: 16
      - name: uppercase
        type: boolean
        required: false
        location: query
        description: Include uppercase letters (A-Z)
        example: true
        default: false
      - name: numbers
        type: boolean
        required: false
        location: query
        description: Include numbers (0-9)
        example: true
        default: false
      - name: symbols
        type: boolean
        required: false
        location: query
        description: Include special characters (!@#$%^&*()-_=+[]{}|;:,.<>?)
        example: true
        default: false
    response_example: |
      {
        "data": {
          "password": "aB3#cDeFgHiJkLmN",
          "length": 16,
          "strength": "strong"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: password
        type: string
        description: The generated password
      - name: length
        type: integer
        description: Length of the generated password
      - name: strength
        type: string
        description: Password strength assessment (weak, medium, or strong)
    errors:
      - code: 400
        message: bad_request
        description: The length parameter is out of valid range (8-128)
      - code: 500
        message: internal_error
        description: Failed to generate password (rare cryptographic failure)
    code_examples:
      curl: |
        # Generate 16-character password with all character types
        curl "https://api.requiems.xyz/v1/technology/password?length=16&uppercase=true&numbers=true&symbols=true" \
          -H "requiems-api-key: YOUR_API_KEY"

        # Generate simple 12-character password (lowercase only)
        curl "https://api.requiems.xyz/v1/technology/password?length=12" \
          -H "requiems-api-key: YOUR_API_KEY"

        # Generate 20-character alphanumeric password
        curl "https://api.requiems.xyz/v1/technology/password?length=20&uppercase=true&numbers=true" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/technology/password"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {
            "length": 16,
            "uppercase": True,
            "numbers": True,
            "symbols": True
        }

        response = requests.get(url, headers=headers, params=params)
        result = response.json()['data']
        print(f"Password: {result['password']}")
        print(f"Strength: {result['strength']}")
      javascript: |
        const params = new URLSearchParams({
          length: 16,
          uppercase: true,
          numbers: true,
          symbols: true
        });

        const response = await fetch(
          `https://api.requiems.xyz/v1/technology/password?${params}`,
          {
            headers: {
              'requiems-api-key': 'YOUR_API_KEY'
            }
          }
        );

        const { data } = await response.json();
        console.log(`Password: ${data.password}`);
        console.log(`Strength: ${data.strength}`);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/technology/password')
        uri.query = URI.encode_www_form(
          length: 16,
          uppercase: true,
          numbers: true,
          symbols: true
        )

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "Password: #{data['password']}"
        puts "Strength: #{data['strength']}"
faq:
  - question: How is password strength calculated?
    answer: >-
      Strength is based on length and character set diversity. Weak (≤1 point) - short with limited character sets.
      Medium (2-3 points) - reasonable length with some variety. Strong (≥4 points) - 16+ characters with multiple
      character sets (uppercase, numbers, symbols).
  - question: Are the passwords truly random?
    answer: >-
      Yes. The API uses Go's crypto/rand package which provides cryptographically secure random number generation
      suitable for security-sensitive applications.
  - question: Can I generate passwords with only specific character sets?
    answer: >-
      Yes. By default, lowercase letters are always included. You can add uppercase, numbers, and/or symbols by setting
      the respective parameters to true. This allows you to generate anything from simple lowercase-only passwords to
      complex passwords with all character types.
  - question: Is there a minimum length requirement?
    answer: >-
      Yes, passwords must be at least 8 characters long. The maximum length is 128 characters. This ensures a minimum
      baseline of security while allowing flexibility for various use cases.
  - question: Does the API guarantee character distribution?
    answer: >-
      Yes. When you enable a character set (uppercase, numbers, symbols), the algorithm guarantees at least one
      character from each enabled set will be included in the generated password. Characters are then shuffled using
      Fisher-Yates algorithm for randomness.
performance:
  p50_ms: 889
  p95_ms: 1063
  p99_ms: 1153
  avg_ms: 897
  samples: 51
  measured_at: "2026-04-16"
