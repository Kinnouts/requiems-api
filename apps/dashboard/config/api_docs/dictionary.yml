# Dictionary API Documentation

api_id: dictionary
api_name: Dictionary
description: Get word definitions, IPA phonetics, usage examples, and synonyms in a single request. Perfect for vocabulary tools, writing assistants, and educational applications.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Vocabulary learning and flashcard apps
    - Writing assistance and enrichment tools
    - Educational platforms and language learning
    - Word game development
    - Content creation and SEO tools

  features:
    - IPA phonetic transcriptions
    - Multiple definitions per word (noun, adjective, verb, etc.)
    - Usage examples for each definition
    - Synonyms included in every response
    - Case-insensitive lookup
    - Fast, low-latency in-memory responses

endpoints:
  - name: Dictionary Lookup
    method: GET
    path: /v1/text/dictionary/{word}
    description: Returns the definition, phonetics, examples, and synonyms for the given word.

    parameters:
      - name: word
        type: string
        required: true
        location: path
        description: The word to look up in the dictionary
        example: ephemeral

    response_example: |
      {
        "data": {
          "word": "ephemeral",
          "phonetic": "/ɪˈfɛm(ə)rəl/",
          "definitions": [
            {
              "partOfSpeech": "adjective",
              "definition": "lasting for a very short time",
              "example": "ephemeral pleasures"
            }
          ],
          "synonyms": ["transient", "fleeting", "momentary", "brief", "short-lived"]
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: word
        type: string
        description: The normalized (lowercased) word that was looked up
      - name: phonetic
        type: string
        description: IPA phonetic transcription of the word (may be omitted if unavailable)
      - name: definitions
        type: array of objects
        description: One or more definitions for the word, each with partOfSpeech, definition, and an optional example
      - name: definitions[].partOfSpeech
        type: string
        description: Grammatical category (e.g. noun, verb, adjective)
      - name: definitions[].definition
        type: string
        description: Plain-text definition of the word
      - name: definitions[].example
        type: string
        description: Example sentence using the word (may be omitted)
      - name: synonyms
        type: array of strings
        description: List of words with similar meaning

    errors:
      - code: not_found
        status: 404
        description: The word was not found in the dictionary dataset.
      - code: bad_request
        status: 400
        description: The word path parameter is missing.

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/text/dictionary/ephemeral \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/text/dictionary/ephemeral"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        data = response.json()['data']
        print(f"{data['word']} {data['phonetic']}")
        for d in data['definitions']:
            print(f"  [{d['partOfSpeech']}] {d['definition']}")
            if d.get('example'):
                print(f"  Example: {d['example']}")
        print(f"Synonyms: {', '.join(data['synonyms'])}")

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/text/dictionary/ephemeral', {
          headers: {
            'requiems-api-key': 'YOUR_API_KEY'
          }
        });

        const { data } = await response.json();
        console.log(`${data.word} ${data.phonetic}`);
        data.definitions.forEach(d => {
          console.log(`  [${d.partOfSpeech}] ${d.definition}`);
          if (d.example) console.log(`  Example: ${d.example}`);
        });
        console.log('Synonyms:', data.synonyms.join(', '));

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/text/dictionary/ephemeral')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "#{data['word']} #{data['phonetic']}"
        data['definitions'].each do |d|
          puts "  [#{d['partOfSpeech']}] #{d['definition']}"
          puts "  Example: #{d['example']}" if d['example']
        end
        puts "Synonyms: #{data['synonyms'].join(', ')}"

faq:
  - question: Is the lookup case-sensitive?
    answer: No, the lookup is case-insensitive. Searching for "Ephemeral", "EPHEMERAL", or "ephemeral" all return the same result.

  - question: What happens if a word is not found?
    answer: The API returns a 404 Not Found response with the error code "not_found" if the word is not in the dictionary dataset.

  - question: Can a word have multiple definitions?
    answer: Yes. Some words function as multiple parts of speech (e.g. both a noun and an adjective) and will have a separate definition entry for each.

  - question: How many words are in the dataset?
    answer: The dataset contains a curated set of common English words with full dictionary entries including phonetics, definitions, examples, and synonyms.

  - question: Are phonetics always included?
    answer: Phonetic transcriptions use the International Phonetic Alphabet (IPA) and are included for all words in the current dataset. The phonetic field may be absent for words added in the future if a transcription is not yet available.
