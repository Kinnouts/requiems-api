api_id: color-conversion
api_name: Color Format Conversion
description: >-
  Convert color values between HEX, RGB, HSL, and CMYK formats. Every response includes all four representations so you
  never need to call more than once.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Convert design tool color exports into CSS-ready values
    - Build color palette generators and pickers
    - Normalize color inputs from different user sources into a single format
    - Populate design system tokens from brand color values
    - Inspect color relationships between HEX codes and their HSL equivalents
  features:
    - Converts between HEX, RGB, HSL, and CMYK in a single call
    - Returns all four formats simultaneously — no need for multiple requests
    - Accepts shorthand HEX notation (e.g. "#f53" → "#ff5533")
    - Flexible input parsing — whitespace-tolerant for rgb() and hsl() strings
    - Zero external dependencies — fast, in-memory conversion
endpoints:
  - name: Convert Color
    method: GET
    path: /v1/technology/color
    description: Convert a color value from one format to another. The response always includes all four formats.
    parameters:
      - name: from
        type: string
        required: true
        location: query
        description: "Source color format: hex, rgb, hsl, or cmyk"
        example: hex
      - name: to
        type: string
        required: true
        location: query
        description: "Target color format: hex, rgb, hsl, or cmyk"
        example: hsl
      - name: value
        type: string
        required: true
        location: query
        description: "Color value in the source format (e.g. #ff5733, rgb(255,87,51), hsl(11,100%,60%), cmyk(0%,66%,80%,0%))"
        example: "#ff5733"
    response_example: |
      {
        "data": {
          "input": "#ff5733",
          "result": "hsl(11, 100%, 60%)",
          "formats": {
            "hex": "#ff5733",
            "rgb": "rgb(255, 87, 51)",
            "hsl": "hsl(11, 100%, 60%)",
            "cmyk": "cmyk(0%, 66%, 80%, 0%)"
          }
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: input
        type: string
        description: The original value passed in the value parameter
      - name: result
        type: string
        description: The color expressed in the requested to format
      - name: formats.hex
        type: string
        description: HEX representation (#rrggbb)
      - name: formats.rgb
        type: string
        description: RGB representation (rgb(r, g, b))
      - name: formats.hsl
        type: string
        description: HSL representation (hsl(h, s%, l%))
      - name: formats.cmyk
        type: string
        description: CMYK representation (cmyk(c%, m%, y%, k%))
    errors:
      - code: bad_request
        status: 400
        description: >-
          One or more of from, to, or value parameters is missing or the from/to value is not one of: hex, rgb, hsl,
          cmyk.
      - code: invalid_color
        status: 422
        description: The value cannot be parsed in the specified from format.
      - code: internal_error
        status: 500
        description: Unexpected server error.
    code_examples:
      curl: |
        # HEX to HSL
        curl "https://api.requiems.xyz/v1/technology/color?from=hex&to=hsl&value=%23ff5733" \
          -H "requiems-api-key: YOUR_API_KEY"

        # RGB to CMYK
        curl "https://api.requiems.xyz/v1/technology/color?from=rgb&to=cmyk&value=rgb(255%2C87%2C51)" \
          -H "requiems-api-key: YOUR_API_KEY"

        # HSL to HEX
        curl "https://api.requiems.xyz/v1/technology/color?from=hsl&to=hex&value=hsl(120%2C100%25%2C50%25)" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/technology/color"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"from": "hex", "to": "hsl", "value": "#ff5733"}

        response = requests.get(url, params=params, headers=headers)
        data = response.json()["data"]

        print(data["result"])          # hsl(11, 100%, 60%)
        print(data["formats"]["rgb"])  # rgb(255, 87, 51)
      javascript: |
        const params = new URLSearchParams({
          from: 'hex',
          to: 'hsl',
          value: '#ff5733'
        });

        const response = await fetch(
          `https://api.requiems.xyz/v1/technology/color?${params}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const { data } = await response.json();
        console.log(data.result);           // hsl(11, 100%, 60%)
        console.log(data.formats.cmyk);     // cmyk(0%, 66%, 80%, 0%)
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/technology/color')
        uri.query = URI.encode_www_form(from: 'hex', to: 'hsl', value: '#ff5733')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts data['result']            # hsl(11, 100%, 60%)
        puts data['formats']['hex']    # #ff5733
faq:
  - question: Does the endpoint return all formats even when I only ask for one?
    answer: >-
      Yes. The formats object always contains hex, rgb, hsl, and cmyk regardless of the to parameter. The to parameter
      only controls which format appears in the top-level result field.
  - question: What is the accepted syntax for each format?
    answer: >-
      hex accepts #rrggbb or shorthand #rgb (which is expanded to #rrggbb). rgb accepts rgb(r, g, b) with or without
      spaces. hsl accepts hsl(h, s%, l%). cmyk accepts cmyk(c%, m%, y%, k%). All percentage signs are required for hsl
      and cmyk.
  - question: Is the conversion lossless?
    answer: >-
      Conversions that go through an RGB intermediate (all conversions here do) can have minor rounding differences on
      round-trips because RGB components are integers in [0, 255]. For example, converting a HEX value to HSL and back
      may produce a HEX value that differs in the last digit due to integer rounding.
  - question: Does it support alpha / transparency?
    answer: >-
      No. The current implementation supports opaque colors only (HEX, RGB, HSL, CMYK without an alpha channel). RGBA,
      HSLA, and HEX8 are not supported.
