api_id: phone-validation
api_name: Phone Validation
description: Validate phone numbers, detect country of origin and number type, and retrieve the internationally formatted representation.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - User registration forms that require a valid phone number
    - Fraud prevention and identity verification
    - Normalising phone numbers before storing in a database
    - Displaying consistently formatted numbers in a UI

  features:
    - Validates any E.164 phone number globally
    - Detects country (ISO 3166-1 alpha-2 code)
    - Identifies number type (mobile, landline, toll-free, VoIP, etc.)
    - Returns the internationally formatted number

endpoints:
  - name: Validate Phone Number
    method: GET
    path: /v1/tech/validate/phone
    description: Validates a phone number and returns country, type, and formatted representation.

    parameters:
      - name: number
        type: string
        required: true
        location: query
        description: The phone number to validate. Must include the country calling code (e.g. +12015551234).
        example: "+12015551234"

    response_example: |
      {
        "data": {
          "number": "+12015551234",
          "valid": true,
          "country": "US",
          "type": "landline_or_mobile",
          "formatted": "+1 201-555-1234"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: number
        type: string
        description: The original number as supplied in the request
      - name: valid
        type: boolean
        description: Whether the number is a valid, dialable phone number
      - name: country
        type: string
        description: ISO 3166-1 alpha-2 country code (omitted when valid is false)
      - name: type
        type: string
        description: "Number type: mobile, landline, landline_or_mobile, toll_free, voip, premium_rate, shared_cost, personal_number, pager, uan, voicemail, or unknown (omitted when valid is false)"
      - name: formatted
        type: string
        description: International format of the number, e.g. +1 201-555-1234 (omitted when valid is false)

    errors:
      - code: bad_request
        status: 400
        description: The number query parameter is missing or malformed.

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/tech/validate/phone?number=%2B12015551234" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/tech/validate/phone"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"number": "+12015551234"}

        response = requests.get(url, headers=headers, params=params)
        print(response.json())

      javascript: |
        const number = encodeURIComponent('+12015551234');
        const response = await fetch(
          `https://api.requiems.xyz/v1/tech/validate/phone?number=${number}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const data = await response.json();
        console.log(data.data.valid, data.data.country);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/tech/validate/phone')
        uri.query = URI.encode_www_form(number: '+12015551234')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['valid']

pricing:
  free_tier: Included in all plans
  rate_limits:
    - plan: Free
      limit: 30 requests/minute
    - plan: Developer
      limit: 5,000 requests/minute
    - plan: Business
      limit: 10,000 requests/minute
    - plan: Professional
      limit: 50,000 requests/minute

faq:
  - question: What format should I use for the phone number?
    answer: Always include the country calling code prefixed with a plus sign (E.164 format), for example +12015551234 or +447400123456. Numbers without a country code cannot be validated reliably.

  - question: What does landline_or_mobile mean?
    answer: Some numbering plans (notably the United States) do not distinguish between mobile and landline numbers at the format level. When the type cannot be determined more precisely, the API returns landline_or_mobile.

  - question: What happens when the number is invalid?
    answer: The API still returns HTTP 200 with valid set to false. The country, type, and formatted fields are omitted from the response.
