api_id: phone-validation
api_name: Phone Validation
description: >-
  Validate phone numbers globally. Detect carrier, country, number type, and VOIP or virtual risk using only phone
  metadata. No external lookups.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - User registration forms that require a valid phone number
    - VOIP and virtual number screening before sending SMS or OTPs
    - Normalising phone numbers before storing in a database
    - Displaying consistently formatted numbers in a UI
  features:
    - Validates any E.164 phone number globally
    - Detects country (ISO 3166-1 alpha-2 code)
    - Identifies number type (mobile, landline, toll-free, VoIP, and more)
    - Returns the internationally formatted number
    - Detects carrier name from phone prefix metadata
    - Flags VOIP and virtual numbers for risk screening
    - Batch validation for up to 50 numbers per request
endpoints:
  - name: Validate Phone Number
    method: GET
    path: /v1/validation/phone
    description: >-
      Validates a single phone number and returns its country, type, formatted representation, carrier, and VOIP/virtual
      risk flags.
    parameters:
      - name: number
        type: string
        required: true
        location: query
        description: The phone number to validate. Must include the country calling code (e.g. +12015551234).
        example: "+447400123456"
    response_example: |
      {
        "data": {
          "number": "+447400123456",
          "valid": true,
          "country": "GB",
          "type": "mobile",
          "formatted": "+44 7400 123456",
          "carrier": {
            "name": "Three",
            "source": "metadata"
          },
          "risk": {
            "is_voip": false,
            "is_virtual": false
          }
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: number
        type: string
        description: The original number as supplied in the request
      - name: valid
        type: boolean
        description: Whether the number is a valid, dialable phone number
      - name: country
        type: string
        description: ISO 3166-1 alpha-2 country code (omitted when valid is false)
      - name: type
        type: string
        description: >-
          Number type: mobile, landline, landline_or_mobile, toll_free, voip, premium_rate, shared_cost,
          personal_number, pager, uan, voicemail, or unknown (omitted when valid is false)
      - name: formatted
        type: string
        description: International format of the number, e.g. +44 7400 123456 (omitted when valid is false)
      - name: carrier.name
        type: string
        description: Carrier name from phone prefix metadata (omitted when carrier cannot be determined)
      - name: carrier.source
        type: string
        description: How the carrier was determined. Always "metadata" when present
      - name: risk.is_voip
        type: boolean
        description: true when the number type is voip
      - name: risk.is_virtual
        type: boolean
        description: >-
          true when the number is not tied to a physical SIM or fixed line: voip, personal_number, uan, pager, or
          voicemail
    errors:
      - code: bad_request
        status: 400
        description: The number query parameter is missing.
    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/validation/phone?number=%2B447400123456" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/validation/phone"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"number": "+447400123456"}

        response = requests.get(url, headers=headers, params=params)
        print(response.json())
      javascript: |
        const number = encodeURIComponent('+447400123456');
        const response = await fetch(
          `https://api.requiems.xyz/v1/validation/phone?number=${number}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const { data } = await response.json();
        console.log(data.valid, data.carrier, data.risk);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/validation/phone')
        uri.query = URI.encode_www_form(number: '+447400123456')

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['valid']
  - name: Batch Validate Phone Numbers
    method: POST
    path: /v1/validation/phone/batch
    description: Validates up to 50 phone numbers in a single request. Results are returned in the same order as the input.
    parameters:
      - name: numbers
        type: array
        required: true
        location: body
        description: "Array of phone numbers to validate (min: 1, max: 50). Each must include the country calling code."
        example: "[\"+447400123456\", \"+12015551234\"]"
    request_example: |
      {
        "numbers": ["+447400123456", "+12015551234", "12345"]
      }
    response_example: |
      {
        "data": {
          "results": [
            {
              "number": "+447400123456",
              "valid": true,
              "country": "GB",
              "type": "mobile",
              "formatted": "+44 7400 123456",
              "carrier": { "name": "Three", "source": "metadata" },
              "risk": { "is_voip": false, "is_virtual": false }
            },
            {
              "number": "+12015551234",
              "valid": true,
              "country": "US",
              "type": "landline_or_mobile",
              "formatted": "+1 201-555-1234",
              "risk": { "is_voip": false, "is_virtual": false }
            },
            {
              "number": "12345",
              "valid": false
            }
          ],
          "total": 3
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: results
        type: array
        description: >-
          Validation result for each number in the same order as the input. Each item has the same fields as the single
          validate endpoint.
      - name: total
        type: integer
        description: Number of results returned. Matches the length of the input array.
    errors:
      - code: validation_failed
        status: 422
        description: The numbers array is missing, empty, or contains more than 50 items.
    code_examples:
      curl: |
        curl -X POST "https://api.requiems.xyz/v1/validation/phone/batch" \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"numbers":["+447400123456","+12015551234"]}'
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/validation/phone/batch"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        payload = {"numbers": ["+447400123456", "+12015551234"]}

        response = requests.post(url, headers=headers, json=payload)
        for result in response.json()["data"]["results"]:
            print(result["number"], result["valid"])
      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/validation/phone/batch',
          {
            method: 'POST',
            headers: {
              'requiems-api-key': 'YOUR_API_KEY',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ numbers: ['+447400123456', '+12015551234'] })
          }
        );

        const { data } = await response.json();
        data.results.forEach(r => console.log(r.number, r.valid));
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/validation/phone/batch')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        request['Content-Type'] = 'application/json'
        request.body = { numbers: ['+447400123456', '+12015551234'] }.to_json

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        JSON.parse(response.body)['data']['results'].each do |r|
          puts "#{r['number']}: #{r['valid']}"
        end
faq:
  - question: What format should I use for the phone number?
    answer: >-
      Always include the country calling code prefixed with a plus sign (E.164 format), for example +12015551234 or
      +447400123456. Numbers without a country code cannot be validated reliably.
  - question: What does landline_or_mobile mean?
    answer: >-
      Some numbering plans (notably the United States) do not distinguish between mobile and landline numbers at the
      format level. When the type cannot be determined more precisely, the API returns landline_or_mobile.
  - question: What happens when a number is invalid?
    answer: >-
      The API returns HTTP 200 with valid set to false. The country, type, formatted, carrier, and risk fields are all
      omitted from that result.
  - question: Will carrier always be present for valid numbers?
    answer: >-
      No. Carrier detection relies on prefix metadata and coverage varies by country. When the carrier cannot be
      determined, the carrier object is omitted entirely.
  - question: How is VOIP detection done?
    answer: >-
      VOIP and virtual flags come from the phone number type in libphonenumber metadata. No external lookups are made. A
      number is flagged as VOIP when its type is voip, and as virtual when its type is voip, personal_number, uan,
      pager, or voicemail.
