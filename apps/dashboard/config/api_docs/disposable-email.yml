api_id: disposable_email
api_name: Disposable Email Checker
description: >-
  Detect disposable and temporary email addresses to prevent fraud and improve data quality. Our comprehensive blocklist
  is continuously updated to catch the latest disposable email providers.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Prevent spam and fraudulent signups
    - Improve email deliverability rates
    - Maintain clean user databases
    - Enhance data quality for marketing campaigns
  features:
    - 90,000+ disposable domains in blocklist
    - Real-time email validation
    - Batch processing (up to 100 emails)
    - Domain-level checking
    - High-performance lookups
endpoints:
  - name: Check Single Email
    method: POST
    path: /v1/networking/disposable/check
    description: Validate whether an email address uses a disposable domain
    parameters:
      - name: email
        type: string
        required: true
        location: body
        description: The email address to check
        example: test@example.com
    request_example: |
      {
        "email": "user@tempmail.com"
      }
    response_example: |
      {
        "data": {
          "email": "user@tempmail.com",
          "is_disposable": true,
          "domain": "tempmail.com"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: email
        type: string
        description: The email address that was checked
      - name: is_disposable
        type: boolean
        description: Whether the email uses a disposable domain
      - name: domain
        type: string
        description: The domain part of the email address
    errors:
      - code: 400
        message: Invalid request body
        description: The request body is missing or malformed
      - code: 400
        message: Invalid email format
        description: The email address format is invalid
    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/networking/disposable/check \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"email": "user@tempmail.com"}'
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/networking/disposable/check"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        data = {"email": "user@tempmail.com"}

        response = requests.post(url, headers=headers, json=data)
        print(response.json())
      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/networking/disposable/check', {
          method: 'POST',
          headers: {
            'requiems-api-key': 'YOUR_API_KEY',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: 'user@tempmail.com' })
        });

        const data = await response.json();
        console.log(data);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/networking/disposable/check')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        request['Content-Type'] = 'application/json'
        request.body = { email: 'user@tempmail.com' }.to_json

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        puts JSON.parse(response.body)
  - name: Check Batch Emails
    method: POST
    path: /v1/networking/disposable/check-batch
    description: Validate multiple email addresses in a single request (max 100 emails)
    parameters:
      - name: emails
        type: array
        required: true
        location: body
        description: Array of email addresses to check (max 100)
        example:
          - user1@example.com
          - user2@tempmail.com
    request_example: |
      {
        "emails": [
          "user1@gmail.com",
          "user2@tempmail.com",
          "user3@guerrillamail.com"
        ]
      }
    response_example: |
      {
        "data": {
          "results": [
            {
              "email": "user1@gmail.com",
              "is_disposable": false,
              "domain": "gmail.com"
            },
            {
              "email": "user2@tempmail.com",
              "is_disposable": true,
              "domain": "tempmail.com"
            },
            {
              "email": "user3@guerrillamail.com",
              "is_disposable": true,
              "domain": "guerrillamail.com"
            }
          ],
          "total": 3
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: results
        type: array
        description: Array of check results for each email
      - name: total
        type: integer
        description: Total number of emails checked
    errors:
      - code: 400
        message: Invalid request body
        description: The request body is missing or malformed
      - code: 400
        message: emails array is required
        description: The emails field is missing
      - code: 400
        message: Maximum 100 emails allowed per request
        description: Too many emails in the request
    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/networking/disposable/check-batch \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "emails": ["user1@gmail.com", "user2@tempmail.com"]
          }'
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/networking/disposable/check-batch"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        data = {
            "emails": ["user1@gmail.com", "user2@tempmail.com"]
        }

        response = requests.post(url, headers=headers, json=data)
        print(response.json())
      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/networking/disposable/check-batch', {
          method: 'POST',
          headers: {
            'requiems-api-key': 'YOUR_API_KEY',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            emails: ['user1@gmail.com', 'user2@tempmail.com']
          })
        });

        const data = await response.json();
        console.log(data);
  - name: Check Domain
    method: GET
    path: /v1/networking/disposable/domain/{domain}
    description: Check if a specific domain is in the disposable blocklist
    parameters:
      - name: domain
        type: string
        required: true
        location: path
        description: The domain to check
        example: tempmail.com
    response_example: |
      {
        "data": {
          "domain": "tempmail.com",
          "is_disposable": true
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: domain
        type: string
        description: The domain that was checked
      - name: is_disposable
        type: boolean
        description: Whether the domain is in the disposable blocklist
    errors:
      - code: 400
        message: domain parameter is required
        description: The domain parameter is missing
    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/networking/disposable/domain/tempmail.com \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        domain = "tempmail.com"
        url = f"https://api.requiems.xyz/v1/networking/disposable/domain/{domain}"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        print(response.json())
      javascript: |
        const domain = 'tempmail.com';
        const response = await fetch(
          `https://api.requiems.xyz/v1/networking/disposable/domain/${domain}`,
          {
            headers: {
              'requiems-api-key': 'YOUR_API_KEY'
            }
          }
        );

        const data = await response.json();
        console.log(data);
  - name: Get Statistics
    method: GET
    path: /v1/networking/disposable/stats
    description: Get statistics about the disposable email blocklist
    parameters: []
    response_example: |
      {
        "data": {
          "total_domains": 10500
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: total_domains
        type: integer
        description: Total number of disposable domains in the blocklist
    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/networking/disposable/stats \
          -H "requiems-api-key: YOUR_API_KEY"
  - name: List Domains (Paginated)
    method: GET
    path: /v1/networking/disposable/domains
    description: Get a paginated list of all disposable domains in the blocklist
    parameters:
      - name: page
        type: integer
        required: false
        location: query
        description: "Page number (default: 1)"
        example: 1
      - name: per_page
        type: integer
        required: false
        location: query
        description: "Items per page (default: 100, max: 1000)"
        example: 100
    response_example: |
      {
        "data": {
          "domains": [
            "tempmail.com",
            "guerrillamail.com",
            "10minutemail.com"
          ],
          "total": 10500,
          "page": 1,
          "per_page": 100,
          "has_more": true
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: domains
        type: array
        description: Array of domain names
      - name: total
        type: integer
        description: Total number of domains in blocklist
      - name: page
        type: integer
        description: Current page number
      - name: per_page
        type: integer
        description: Number of items per page
      - name: has_more
        type: boolean
        description: Whether there are more pages available
    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/networking/disposable/domains?page=1&per_page=100" \
          -H "requiems-api-key: YOUR_API_KEY"
faq:
  - question: How often is the blocklist updated?
    answer: >-
      The blocklist is updated weekly with new disposable email providers. Updates are automatically reflected in the
      API with no action required on your end.
  - question: Can I suggest domains to add to the blocklist?
    answer: Yes! Please email support@requiems.xyz with domains you'd like to suggest. We review all submissions.
  - question: Does this API validate email syntax?
    answer: >-
      No, this API only checks if the domain is disposable. For full email validation (syntax, DNS, mailbox
      verification), consider our Email Validation API (coming soon).
  - question: What counts as a disposable email?
    answer: >-
      Disposable emails are temporary email addresses that users can create without registration, typically used to
      bypass signup forms or avoid spam. Examples include services like tempmail.com, guerrillamail.com, and
      10minutemail.com.
