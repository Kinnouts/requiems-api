api_id: iban
api_name: IBAN Validator
description: Validate IBAN numbers and extract the bank code and account number. Supports all countries in the official SWIFT IBAN Registry. Returns a structured response for both valid and invalid IBANs — the valid field tells you whether the IBAN passed checksum validation.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Payment form validation before submission
    - Fintech apps processing international bank transfers
    - Fraud detection pipelines verifying account details
    - Accounting software importing supplier bank details
    - KYC / AML workflows verifying customer bank accounts

  features:
    - "ISO 13616 checksum validation (mod-97 algorithm)"
    - Country-specific length validation for ~80 countries
    - Bank code extraction (Bankleitzahl, sort code, etc.)
    - Account number extraction from the BBAN
    - Accepts IBANs with or without spaces
    - Case-insensitive input
    - Always returns 200 — the valid field signals pass/fail

endpoints:
  - name: Validate IBAN
    method: GET
    path: /v1/finance/iban/{iban}
    description: "Validates an IBAN and returns the country, bank code, and account number. Spaces in the input are stripped automatically. Always returns HTTP 200 — check the valid field to determine whether the IBAN is valid."

    parameters:
      - name: iban
        type: string
        required: true
        location: path
        description: The IBAN to validate. Spaces are stripped. Case-insensitive.
        example: DE89370400440532013000

    response_example: |
      {
        "data": {
          "iban": "DE89370400440532013000",
          "valid": true,
          "country": "Germany",
          "bank_code": "37040044",
          "account": "0532013000"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: iban
        type: string
        description: "The normalised IBAN (spaces stripped, uppercased)"
      - name: valid
        type: boolean
        description: "true if the IBAN passed length and ISO 13616 checksum validation"
      - name: country
        type: string
        description: "Full country name (empty if the country code is not in the registry)"
      - name: bank_code
        type: string
        description: "Bank identifier extracted from the BBAN (empty if country not in registry or positions not defined)"
      - name: account
        type: string
        description: "Account number extracted from the BBAN (empty if country not in registry or positions not defined)"

    errors:
      - code: internal_error
        status: 500
        description: Unexpected server error (e.g. database unreachable).

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/finance/iban/DE89370400440532013000" \
          -H "requiems-api-key: YOUR_API_KEY"

        # With spaces (URL-encoded):
        curl "https://api.requiems.xyz/v1/finance/iban/DE89%203704%200044%200532%200130%2000" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        iban = "DE89370400440532013000"
        url = f"https://api.requiems.xyz/v1/finance/iban/{iban}"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        data = response.json()["data"]

        if data["valid"]:
            print(f"Country:   {data['country']}")
            print(f"Bank code: {data['bank_code']}")
            print(f"Account:   {data['account']}")
        else:
            print("Invalid IBAN")

      javascript: |
        const iban = "DE89370400440532013000";
        const response = await fetch(
          `https://api.requiems.xyz/v1/finance/iban/${iban}`,
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );

        const { data } = await response.json();

        if (data.valid) {
          console.log(`Country:   ${data.country}`);
          console.log(`Bank code: ${data.bank_code}`);
          console.log(`Account:   ${data.account}`);
        } else {
          console.log('Invalid IBAN');
        }

      ruby: |
        require 'net/http'
        require 'json'

        iban = "DE89370400440532013000"
        uri = URI("https://api.requiems.xyz/v1/finance/iban/#{iban}")

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        if data['valid']
          puts "Country:   #{data['country']}"
          puts "Bank code: #{data['bank_code']}"
          puts "Account:   #{data['account']}"
        else
          puts "Invalid IBAN"
        end

faq:
  - question: What happens if the IBAN is invalid?
    answer: "The API always returns HTTP 200. Set valid: false in the data object means the IBAN failed length or checksum validation. Check the valid field rather than the HTTP status code."

  - question: What checksum algorithm is used?
    answer: "ISO 13616 mod-97. The first 4 characters are moved to the end of the string, each letter is replaced by its numeric equivalent (A=10 … Z=35), and the resulting integer is divided by 97. A remainder of 1 means the IBAN is valid."

  - question: Which countries are supported?
    answer: "All countries in the official SWIFT IBAN Registry — approximately 80 countries. The registry data is seeded from the php-iban project, a maintained mirror of the SWIFT IBAN Registry."

  - question: "Why is bank_code or account empty for a valid IBAN?"
    answer: "bank_code and account are extracted using the bank identifier and account positions from the SWIFT IBAN Registry. If the country is not in the registry, or the registry does not define explicit positions for that country, these fields will be empty even though the IBAN is valid."

  - question: Are spaces allowed in the IBAN?
    answer: "Yes. Spaces are stripped automatically before validation. DE89 3704 0044 0532 0130 00 and DE89370400440532013000 are treated identically."
