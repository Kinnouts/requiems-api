api_id: useragent
api_name: User Agent Parser
description: Parse user agent strings to extract browser name, version, operating system, device type, and bot detection.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Analytics dashboards
    - Serving device-specific content
    - Bot filtering and traffic analysis
    - Browser compatibility reporting
  features:
    - Browser name and version detection
    - Operating system and version detection
    - Device classification (desktop, mobile, tablet, bot)
    - Bot/crawler detection
endpoints:
  - name: Parse User Agent
    method: GET
    path: /v1/technology/useragent
    description: Parses a user agent string and returns structured information about the browser, OS, device, and bot status.
    parameters:
      - name: ua
        type: string
        required: true
        location: query
        description: The user agent string to parse.
        example: >-
          Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0
          Safari/537.36
    response_example: |
      {
        "data": {
          "browser": "Chrome",
          "browser_version": "120.0",
          "os": "Windows",
          "os_version": "10/11",
          "device": "desktop",
          "is_bot": false
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: browser
        type: string
        description: Detected browser name (e.g. Chrome, Firefox, Safari, Edge, Opera, Internet Explorer, Other)
      - name: browser_version
        type: string
        description: Detected browser version (major.minor)
      - name: os
        type: string
        description: Detected operating system (e.g. Windows, macOS, Linux, Android, iOS, ChromeOS, Other)
      - name: os_version
        type: string
        description: Detected OS version (format varies by platform)
      - name: device
        type: string
        description: Device type — one of desktop, mobile, tablet, bot, or unknown
      - name: is_bot
        type: boolean
        description: True when the user agent matches a known bot or crawler pattern
    errors:
      - code: bad_request
        status: 400
        description: The ua query parameter is missing.
    code_examples:
      curl: >
        curl
        "https://api.requiems.xyz/v1/technology/useragent?ua=Mozilla%2F5.0+%28Windows+NT+10.0%29+Chrome%2F120.0.0.0" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests
        from urllib.parse import quote

        ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0"
        url = f"https://api.requiems.xyz/v1/technology/useragent?ua={quote(ua)}"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        print(response.json())
      javascript: |
        const ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0";
        const url = `https://api.requiems.xyz/v1/technology/useragent?ua=${encodeURIComponent(ua)}`;

        const response = await fetch(url, {
          headers: { 'requiems-api-key': 'YOUR_API_KEY' }
        });

        const data = await response.json();
        console.log(data.data.browser);
      ruby: |
        require 'net/http'
        require 'json'

        ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0"
        uri = URI("https://api.requiems.xyz/v1/technology/useragent?ua=#{URI.encode_www_form_component(ua)}")
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['browser']
faq:
  - question: Which browsers are detected?
    answer: Chrome, Firefox, Safari, Edge, Opera, and Internet Explorer. Anything else returns "Other".
  - question: How is bot detection handled?
    answer: >-
      The API checks for known bot/crawler keywords in the user agent string, including Googlebot, Bingbot, curl, wget,
      python-requests, and many others.
  - question: What device types are returned?
    answer: desktop, mobile, tablet, bot, or unknown. Tablets are identified by iPad or Android without 'Mobile' in the UA.
