# BIN Lookup API Documentation

api_id: bin-lookup
api_name: BIN Lookup
description: Look up card metadata for any Bank Identification Number — scheme, card type, issuing bank, country, and more.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Payment form validation and card brand display
    - Fraud detection and risk scoring
    - Checkout UX improvements (show card logo as user types)
    - Geo-filtering based on card issuing country
    - Fintech compliance and card acceptance rules

  features:
    - "6-digit and 8-digit BIN support (ISO 7812-1:2017)"
    - 500k+ BINs from multiple aggregated sources
    - Issuing bank name, URL, and phone number
    - Card scheme, type, level, and prepaid flag
    - Luhn prefix validation
    - Confidence score per record

endpoints:
  - name: BIN Lookup
    method: GET
    path: /v1/finance/bin/{bin}
    description: Returns card metadata for the given 6–8 digit BIN prefix.

    parameters:
      - name: bin
        type: string
        required: true
        location: path
        description: "6–8 digit Bank Identification Number. Dashes and spaces are stripped automatically."
        example: "424242"

    response_example: |
      {
        "data": {
          "bin": "424242",
          "scheme": "visa",
          "card_type": "credit",
          "card_level": "classic",
          "issuer_name": "Chase",
          "issuer_url": "www.chase.com",
          "issuer_phone": "+18002324000",
          "country_code": "US",
          "country_name": "United States",
          "prepaid": false,
          "luhn": true,
          "confidence": 0.92
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: bin
        type: string
        description: The normalised BIN prefix used for the lookup
      - name: scheme
        type: string
        description: "Card network: visa, mastercard, amex, discover, jcb, diners, unionpay, maestro, mir, rupay, private_label"
      - name: card_type
        type: string
        description: "credit, debit, prepaid, or charge"
      - name: card_level
        type: string
        description: "classic, gold, platinum, infinite, business, signature, or standard"
      - name: issuer_name
        type: string
        description: Name of the card-issuing bank
      - name: issuer_url
        type: string
        description: Bank website URL
      - name: issuer_phone
        type: string
        description: Bank customer service phone number
      - name: country_code
        type: string
        description: "ISO 3166-1 alpha-2 country code of the issuing bank (e.g. US, GB, DE)"
      - name: country_name
        type: string
        description: Full country name of the issuing bank
      - name: prepaid
        type: boolean
        description: Whether the card is a prepaid card
      - name: luhn
        type: boolean
        description: Whether the BIN prefix passes the Luhn algorithm check
      - name: confidence
        type: number
        description: "Data quality score (0.00–1.00). Multi-source confirmed records score higher."

    errors:
      - code: bad_request
        status: 400
        description: BIN is not 6–8 digits or contains non-digit characters.
      - code: not_found
        status: 404
        description: BIN prefix not found in the database.
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/finance/bin/424242 \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/finance/bin/424242"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        data = response.json()
        print(data["data"]["scheme"])        # "visa"
        print(data["data"]["issuer_name"])   # "Chase"

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/finance/bin/424242', {
          headers: {
            'requiems-api-key': 'YOUR_API_KEY'
          }
        });

        const { data } = await response.json();
        console.log(data.scheme);       // "visa"
        console.log(data.issuer_name);  // "Chase"
        console.log(data.country_code); // "US"

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/finance/bin/424242')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts data['scheme']       # "visa"
        puts data['issuer_name']  # "Chase"

faq:
  - question: What is a BIN?
    answer: A BIN (Bank Identification Number), also called an IIN (Issuer Identification Number), is the first 6–8 digits of a payment card. It identifies the card network (Visa, Mastercard, etc.), the issuing bank, the card type (credit/debit), and the country of issue.

  - question: "Does the API support 8-digit BINs?"
    answer: "Yes. The endpoint accepts 6–8 digit prefixes. For 8-digit inputs it tries an exact match first, then falls back to the 6-digit prefix if no 8-digit record is found."

  - question: What does the confidence score mean?
    answer: "The confidence field (0.00–1.00) reflects data quality. Records confirmed across multiple independent data sources receive a higher score. A score above 0.85 indicates high-confidence data with bank and country information verified from more than one source."

  - question: What does the luhn field mean?
    answer: "The Luhn algorithm is a checksum formula used to validate card numbers. The luhn field runs this check on the BIN prefix (6–8 digits), not a full card number. It tells you whether the prefix has a structurally valid Luhn checksum — not whether a specific card number is real."

  - question: Why is issuer_name sometimes empty?
    answer: "Not all BINs in the public dataset have associated bank name data. The confidence score will be lower for these records. Empty string fields indicate the data is not available for that BIN."
