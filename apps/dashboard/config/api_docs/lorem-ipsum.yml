# Lorem Ipsum Generator API Documentation

title: "Lorem Ipsum Generator"
description: "Generate placeholder text for design mockups, prototypes, and testing. Perfect for filling content areas during development."
version: "1.0"
base_path: "/v1/text/lorem"

overview: |
  The Lorem Ipsum Generator API provides classic placeholder text generation with flexible options for paragraphs, sentences, and words. Built on the Lorelai library for consistent, high-quality Lorem Ipsum text.

authentication:
  type: "API Key"
  header: "requiems-api-key"
  description: "Include your API key in the request header"

endpoints:
  - name: "Generate Lorem Ipsum"
    path: "/v1/text/lorem"
    method: "GET"
    description: "Generate Lorem Ipsum placeholder text with customizable length and format"

    parameters:
      - name: "type"
        type: "string"
        required: false
        default: "paragraphs"
        description: "Type of content to generate"
        enum:
          - "paragraphs"
          - "sentences"
          - "words"
        example: "paragraphs"

      - name: "amount"
        type: "integer"
        required: false
        default: 3
        description: "Number of paragraphs, sentences, or words to generate"
        minimum: 1
        maximum: 100
        example: 5

      - name: "start_with_lorem"
        type: "boolean"
        required: false
        default: true
        description: "Whether to start with 'Lorem ipsum dolor sit amet'"
        example: true

    responses:
      - status: 200
        description: "Successfully generated Lorem Ipsum text"
        example: |
          {
            "text": "Lorem ipsum dolor sit amet, consectetur adipiscing elit...",
            "type": "paragraphs",
            "amount": 3,
            "word_count": 256,
            "character_count": 1543
          }
        schema:
          type: "object"
          properties:
            - name: "text"
              type: "string"
              description: "Generated Lorem Ipsum text"
            - name: "type"
              type: "string"
              description: "Type of content generated (paragraphs/sentences/words)"
            - name: "amount"
              type: "integer"
              description: "Number of items generated"
            - name: "word_count"
              type: "integer"
              description: "Total number of words in generated text"
            - name: "character_count"
              type: "integer"
              description: "Total number of characters in generated text"

      - status: 400
        description: "Invalid parameters"
        example: |
          {
            "error": "amount must be between 1 and 100"
          }

      - status: 401
        description: "Invalid or missing API key"
        example: |
          {
            "error": "Invalid API key"
          }

      - status: 429
        description: "Rate limit exceeded"
        example: |
          {
            "error": "Rate limit exceeded. Try again in 60 seconds."
          }

code_examples:
  curl: |
    # Generate 5 paragraphs
    curl -H "requiems-api-key: YOUR_API_KEY" \
      "https://api.requiems.xyz/v1/text/lorem?type=paragraphs&amount=5"

    # Generate 10 sentences
    curl -H "requiems-api-key: YOUR_API_KEY" \
      "https://api.requiems.xyz/v1/text/lorem?type=sentences&amount=10"

    # Generate 50 words without starting with "Lorem ipsum"
    curl -H "requiems-api-key: YOUR_API_KEY" \
      "https://api.requiems.xyz/v1/text/lorem?type=words&amount=50&start_with_lorem=false"

  javascript: |
    // Using fetch API
    const response = await fetch('https://api.requiems.xyz/v1/text/lorem?type=paragraphs&amount=3', {
      headers: {
        'requiems-api-key': 'YOUR_API_KEY'
      }
    });

    const data = await response.json();
    console.log(data.text);

  python: |
    import requests

    headers = {'requiems-api-key': 'YOUR_API_KEY'}
    params = {'type': 'paragraphs', 'amount': 3}

    response = requests.get(
        'https://api.requiems.xyz/v1/text/lorem',
        headers=headers,
        params=params
    )

    data = response.json()
    print(data['text'])

  ruby: |
    require 'net/http'
    require 'uri'
    require 'json'

    uri = URI('https://api.requiems.xyz/v1/text/lorem')
    uri.query = URI.encode_www_form({type: 'paragraphs', amount: 3})

    request = Net::HTTP::Get.new(uri)
    request['requiems-api-key'] = 'YOUR_API_KEY'

    response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
      http.request(request)
    end

    data = JSON.parse(response.body)
    puts data['text']

  go: |
    package main

    import (
        "encoding/json"
        "fmt"
        "io"
        "net/http"
    )

    func main() {
        req, _ := http.NewRequest("GET", "https://api.requiems.xyz/v1/text/lorem?type=paragraphs&amount=3", nil)
        req.Header.Set("requiems-api-key", "YOUR_API_KEY")

        client := &http.Client{}
        resp, _ := client.Do(req)
        defer resp.Body.Close()

        body, _ := io.ReadAll(resp.Body)

        var result map[string]interface{}
        json.Unmarshal(body, &result)

        fmt.Println(result["text"])
    }

use_cases:
  - title: "Web Design Mockups"
    description: "Fill content areas in design prototypes and wireframes"

  - title: "Development Testing"
    description: "Generate realistic-looking text for testing layouts and typography"

  - title: "Content Placeholders"
    description: "Create temporary content while waiting for final copy"

  - title: "Typography Demos"
    description: "Showcase fonts and text styling with varied content lengths"

faq:
  - question: "What is Lorem Ipsum?"
    answer: "Lorem Ipsum is dummy text used in the printing and typesetting industry since the 1500s. It's a scrambled version of Latin text that creates natural-looking placeholder content."

  - question: "Why use Lorem Ipsum instead of 'Test test test'?"
    answer: "Lorem Ipsum has a more natural distribution of letters and word lengths, making it better for testing typography and layout. It also looks more professional in mockups."

  - question: "Does the text always start with 'Lorem ipsum'?"
    answer: "By default yes, but you can set start_with_lorem=false to generate random Lorem Ipsum text without the traditional opening."

  - question: "Is there a limit to how much text I can generate?"
    answer: "Yes, you can generate up to 100 paragraphs, sentences, or words per request to ensure fast response times."

  - question: "Is the generated text always the same?"
    answer: "No, the API generates varied Lorem Ipsum text each time, though it will always be semantically similar placeholder text."

rate_limits:
  free: "500 requests/month, 30 requests/minute"
  developer: "100,000 requests/month, 5,000 requests/minute"
  business: "1,000,000 requests/month, 10,000 requests/minute"
  professional: "10,000,000 requests/month, 50,000 requests/minute"

pricing:
  note: "Included in all plans. No additional per-request fees."
