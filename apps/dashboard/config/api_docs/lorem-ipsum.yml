api_id: lorem-ipsum
api_name: Lorem Ipsum Generator
description: >-
  Generate classic Lorem Ipsum placeholder text for design mockups, prototypes, and testing. Customize the number of
  paragraphs and sentences per paragraph.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Web design mockups and wireframes
    - Development testing with realistic-looking text
    - Content placeholders while waiting for final copy
    - Typography demonstrations
  features:
    - Customizable paragraphs (1-20)
    - Customizable sentences per paragraph (1-20)
    - Returns word count with each response
    - Built on the Lorelai library for consistent Lorem Ipsum text
endpoints:
  - name: Generate Lorem Ipsum
    method: GET
    path: /v1/text/lorem
    description: Generate Lorem Ipsum placeholder text with customizable length and format
    parameters:
      - name: paragraphs
        type: integer
        required: false
        location: query
        description: Number of paragraphs to generate (1-20)
        example: 3
        default: 1
      - name: sentences
        type: integer
        required: false
        location: query
        description: Number of sentences per paragraph (1-20)
        example: 5
        default: 5
    response_example: |
      {
        "data": {
          "text": "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.",
          "paragraphs": 1,
          "wordCount": 45
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: text
        type: string
        description: Generated Lorem Ipsum text
      - name: paragraphs
        type: integer
        description: Number of paragraphs generated
      - name: wordCount
        type: integer
        description: Total number of words in generated text
    errors:
      - code: 400
        message: paragraphs must be between 1 and 20
        description: The paragraphs parameter is out of valid range
      - code: 400
        message: sentences must be between 1 and 20
        description: The sentences parameter is out of valid range
    code_examples:
      curl: |
        # Generate 3 paragraphs with 5 sentences each
        curl "https://api.requiems.xyz/v1/text/lorem?paragraphs=3&sentences=5" \
          -H "requiems-api-key: YOUR_API_KEY"

        # Generate 1 paragraph with 10 sentences
        curl "https://api.requiems.xyz/v1/text/lorem?sentences=10" \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/text/lorem"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"paragraphs": 3, "sentences": 5}

        response = requests.get(url, headers=headers, params=params)
        print(response.json())
      javascript: |
        const params = new URLSearchParams({ paragraphs: 3, sentences: 5 });
        const response = await fetch(
          `https://api.requiems.xyz/v1/text/lorem?${params}`,
          {
            headers: {
              'requiems-api-key': 'YOUR_API_KEY'
            }
          }
        );

        const data = await response.json();
        console.log(data.data.text);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/text/lorem')
        uri.query = URI.encode_www_form(paragraphs: 3, sentences: 5)

        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['text']
faq:
  - question: What is Lorem Ipsum?
    answer: >-
      Lorem Ipsum is dummy text used in the printing and typesetting industry since the 1500s. It's a scrambled version
      of Latin text that creates natural-looking placeholder content.
  - question: Why use Lorem Ipsum instead of 'Test test test'?
    answer: >-
      Lorem Ipsum has a more natural distribution of letters and word lengths, making it better for testing typography
      and layout. It also looks more professional in mockups.
  - question: Can I control both paragraphs and sentences?
    answer: >-
      Yes! Use the paragraphs parameter to set how many paragraphs you want (1-20), and the sentences parameter to set
      how many sentences per paragraph (1-20). Both parameters are optional with sensible defaults.
  - question: Is the generated text always the same?
    answer: >-
      The text is generated using the Lorelai library, which creates varied Lorem Ipsum content based on the classic
      Lorem Ipsum corpus.
performance:
  p50_ms: 854
  p95_ms: 1029
  p99_ms: 1797
  avg_ms: 918
  samples: 51
  measured_at: "2026-04-16"
