api_id: vpn-detection
api_name: VPN & Proxy Detection
description: Detect if an IP address belongs to a VPN, proxy, Tor exit node, or hosting provider. Returns threat scores and fraud indicators for fraud prevention, risk assessment, and bot detection.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Fraud prevention in e-commerce and fintech
    - Risk scoring for user authentication
    - Bot and crawler detection
    - Compliance and regulatory requirements
    - Content access restrictions (geo-blocking circumvention)

  features:
    - VPN provider detection
    - Public and web proxy detection
    - Tor exit node identification
    - Data-center and hosting provider detection
    - Threat level scoring
    - Fraud score (0-100) based on IP2Proxy database
    - Autonomous System (ASN) organization lookup

endpoints:
  - name: Check IP Address
    method: GET
    path: /v1/tech/ip/vpn/{ip}
    description: Analyze an IP address to determine if it's a VPN, proxy, Tor exit node, or hosting provider. Returns detailed threat indicators and scores.

    parameters:
      - name: ip
        type: string
        required: true
        location: path
        description: The IP address to check (supports IPv4 and IPv6)
        example: 8.8.8.8

    response_example: |
      {
        "data": {
          "ip": "8.8.8.8",
          "is_vpn": false,
          "is_proxy": false,
          "is_tor": false,
          "is_hosting": true,
          "score": 1,
          "threat": 1,
          "fraud_score": 0,
          "asn_org": "GOOGLE-ASN"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: ip
        type: string
        description: The analyzed IP address
      - name: is_vpn
        type: boolean
        description: True when the IP belongs to a known VPN provider
      - name: is_proxy
        type: boolean
        description: True when the IP is a known public or web proxy
      - name: is_tor
        type: boolean
        description: True when the IP is a known Tor exit node
      - name: is_hosting
        type: boolean
        description: True when the IP belongs to a data-centre or hosting provider (DCH)
      - name: score
        type: integer
        description: Raw threat score (0-9+). Tor contributes 3, VPN or Proxy each contribute 2, Hosting contributes 1
      - name: threat
        type: integer
        description: "Threat level derived from score: 0 = None, 1 = Low, 2–3 = Medium, 4–5 = High, 6+ = Critical"
      - name: fraud_score
        type: integer
        description: Fraud risk score from 0 (no risk) to 100 (high risk). Available when using IP2Proxy PX5 or higher
      - name: asn_org
        type: string
        description: Organization name owning the Autonomous System containing the IP (e.g. "DIGITALOCEAN-ASN")

    errors:
      - code: bad_request
        status: 400
        description: The IP address is missing or invalid
      - code: internal_error
        status: 500
        description: Unexpected server error

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/tech/ip/vpn/8.8.8.8" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/tech/ip/vpn/8.8.8.8"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        print(response.json())

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/tech/ip/vpn/8.8.8.8', {
          headers: { 'requiems-api-key': 'YOUR_API_KEY' }
        });

        const data = await response.json();
        console.log(data.data.is_vpn, data.data.threat);

      ruby: |
        require 'net/http'

        uri = URI('https://api.requiems.xyz/v1/tech/ip/vpn/8.8.8.8')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        puts JSON.parse(response.body)

faq:
  - question: What databases are used for detection?
    answer: The API uses the IP2Proxy database for VPN, proxy, Tor, and hosting detection. ASN information is retrieved from a separate MaxMind ASN database.

  - question: What do the threat scores mean?
    answer: "The score is calculated as: Tor (+3), VPN (+2), Proxy (+2), Hosting (+1). The threat level is derived from this: 0=None, 1=Low, 2-3=Medium, 4-5=High, 6+=Critical."

  - question: Why is fraud_score 0 for some IPs?
    answer: The fraud_score is only available when using IP2Proxy database tier PX5 or higher. Lower tiers return 0, indicating the value is unavailable for the current database.

  - question: Does this support IPv6?
    answer: Yes, both IPv4 and IPv6 addresses are fully supported.
