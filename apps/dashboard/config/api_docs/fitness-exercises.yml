api_id: fitness-exercises
api_name: Fitness Exercises
description: Browse 1,500+ exercises with step-by-step instructions, target muscles, secondary muscles, equipment requirements, and body part filters. Supports full-text search and pagination.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Fitness and workout apps
    - Personal training platforms
    - Health and wellness dashboards
    - Exercise recommendation engines
    - Gym management software

  features:
    - "1,500+ exercises across all major muscle groups"
    - Filter by body part, equipment, or muscle name
    - Full-text search by exercise name
    - Step-by-step instructions for every exercise
    - Random exercise endpoint with optional filters
    - Metadata endpoints listing all valid filter values

endpoints:
  - name: List Exercises
    method: GET
    path: /v1/health/exercises
    description: "Returns a paginated list of exercises. All filter parameters are optional and combinable."

    parameters:
      - name: body_part
        type: string
        required: false
        location: query
        description: "Filter by body part (e.g. chest, back, upper legs). Use /v1/health/body-parts for valid values."
        example: chest
      - name: equipment
        type: string
        required: false
        location: query
        description: "Filter by equipment type (e.g. barbell, dumbbell, body weight). Use /v1/health/equipment for valid values."
        example: barbell
      - name: muscle
        type: string
        required: false
        location: query
        description: "Filter by target or secondary muscle (e.g. biceps, glutes). Use /v1/health/muscles for valid values."
        example: biceps
      - name: search
        type: string
        required: false
        location: query
        description: Full-text search on exercise name.
        example: bench press
      - name: page
        type: integer
        required: false
        location: query
        description: "Page number (default: 1)"
        example: 1
      - name: per_page
        type: integer
        required: false
        location: query
        description: "Results per page, 1–100 (default: 20)"
        example: 20

    response_example: |
      {
        "data": {
          "items": [
            {
              "id": 1,
              "name": "barbell bench press",
              "body_parts": ["chest"],
              "equipment": ["barbell"],
              "target_muscles": ["pectorals"],
              "secondary_muscles": ["triceps", "deltoids"],
              "instructions": [
                "Lie flat on a bench and grip the barbell slightly wider than shoulder-width.",
                "Lower the bar to your chest under control.",
                "Press the bar back up to full arm extension.",
                "Repeat for the desired number of repetitions."
              ]
            }
          ],
          "total": 312,
          "page": 1,
          "per_page": 20
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: items
        type: array
        description: Array of exercise objects for the current page
      - name: items[].id
        type: integer
        description: Unique exercise identifier
      - name: items[].name
        type: string
        description: Exercise name
      - name: items[].body_parts
        type: array
        description: Body part categories involved
      - name: items[].equipment
        type: array
        description: Equipment required
      - name: items[].target_muscles
        type: array
        description: Primary muscles targeted
      - name: items[].secondary_muscles
        type: array
        description: Secondary muscles engaged
      - name: items[].instructions
        type: array
        description: Ordered step-by-step instructions
      - name: total
        type: integer
        description: Total number of exercises matching the filters
      - name: page
        type: integer
        description: Current page number
      - name: per_page
        type: integer
        description: Number of results per page

    errors:
      - code: bad_request
        status: 400
        description: A query parameter has an invalid value (e.g. per_page out of range).
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/health/exercises?body_part=chest&equipment=barbell&per_page=10" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/health/exercises"
        headers = {"requiems-api-key": "YOUR_API_KEY"}
        params = {"body_part": "chest", "equipment": "barbell", "per_page": 10}

        response = requests.get(url, headers=headers, params=params)
        data = response.json()
        for exercise in data["data"]["items"]:
            print(exercise["name"])

      javascript: |
        const params = new URLSearchParams({ body_part: 'chest', equipment: 'barbell', per_page: 10 });
        const response = await fetch(`https://api.requiems.xyz/v1/health/exercises?${params}`, {
          headers: { 'requiems-api-key': 'YOUR_API_KEY' }
        });
        const { data } = await response.json();
        data.items.forEach(e => console.log(e.name));

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/health/exercises')
        uri.query = URI.encode_www_form(body_part: 'chest', equipment: 'barbell', per_page: 10)
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
        data = JSON.parse(response.body)
        data['data']['items'].each { |e| puts e['name'] }

  - name: Get Exercise by ID
    method: GET
    path: /v1/health/exercises/{id}
    description: Returns a single exercise by its numeric ID.

    parameters:
      - name: id
        type: integer
        required: true
        location: path
        description: Numeric exercise ID
        example: 1

    response_example: |
      {
        "data": {
          "id": 1,
          "name": "barbell bench press",
          "body_parts": ["chest"],
          "equipment": ["barbell"],
          "target_muscles": ["pectorals"],
          "secondary_muscles": ["triceps", "deltoids"],
          "instructions": [
            "Lie flat on a bench and grip the barbell slightly wider than shoulder-width.",
            "Lower the bar to your chest under control.",
            "Press the bar back up to full arm extension.",
            "Repeat for the desired number of repetitions."
          ]
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: id
        type: integer
        description: Unique exercise identifier
      - name: name
        type: string
        description: Exercise name
      - name: body_parts
        type: array
        description: Body part categories involved
      - name: equipment
        type: array
        description: Equipment required
      - name: target_muscles
        type: array
        description: Primary muscles targeted
      - name: secondary_muscles
        type: array
        description: Secondary muscles engaged
      - name: instructions
        type: array
        description: Ordered step-by-step instructions

    errors:
      - code: bad_request
        status: 400
        description: The id parameter is not a positive integer.
      - code: not_found
        status: 404
        description: No exercise exists with the given ID.
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/health/exercises/1 \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        response = requests.get(
            "https://api.requiems.xyz/v1/health/exercises/1",
            headers={"requiems-api-key": "YOUR_API_KEY"}
        )
        print(response.json()["data"]["name"])

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/health/exercises/1', {
          headers: { 'requiems-api-key': 'YOUR_API_KEY' }
        });
        const { data } = await response.json();
        console.log(data.name);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/health/exercises/1')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
        puts JSON.parse(response.body)['data']['name']

  - name: Random Exercise
    method: GET
    path: /v1/health/exercises/random
    description: "Returns a single randomly selected exercise. Accepts the same filter parameters as the list endpoint, so you can get a random chest exercise, a random bodyweight exercise, etc."

    parameters:
      - name: body_part
        type: string
        required: false
        location: query
        description: "Restrict random selection to this body part."
        example: back
      - name: equipment
        type: string
        required: false
        location: query
        description: Restrict random selection to this equipment type.
        example: body weight
      - name: muscle
        type: string
        required: false
        location: query
        description: Restrict random selection to exercises targeting this muscle.
        example: glutes
      - name: search
        type: string
        required: false
        location: query
        description: Restrict random selection to exercises matching this search term.
        example: curl

    response_example: |
      {
        "data": {
          "id": 42,
          "name": "dumbbell curl",
          "body_parts": ["upper arms"],
          "equipment": ["dumbbell"],
          "target_muscles": ["biceps"],
          "secondary_muscles": ["brachialis"],
          "instructions": [
            "Stand with a dumbbell in each hand, arms fully extended.",
            "Curl the weights toward your shoulders, keeping your elbows close to your torso.",
            "Squeeze at the top, then lower the weights slowly.",
            "Repeat for the desired number of repetitions."
          ]
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    errors:
      - code: not_found
        status: 404
        description: No exercises match the given filters.
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl "https://api.requiems.xyz/v1/health/exercises/random?body_part=back" \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        response = requests.get(
            "https://api.requiems.xyz/v1/health/exercises/random",
            headers={"requiems-api-key": "YOUR_API_KEY"},
            params={"body_part": "back"}
        )
        print(response.json()["data"]["name"])

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/health/exercises/random?body_part=back',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const { data } = await response.json();
        console.log(data.name, data.instructions);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/health/exercises/random')
        uri.query = URI.encode_www_form(body_part: 'back')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |http| http.request(request) }
        puts JSON.parse(response.body)['data']['name']

