faq:
  - question: How do I find valid filter values?
    answer: "Call /v1/health/body-parts, /v1/health/equipment, or /v1/health/muscles to get the exact strings accepted by the body_part, equipment, and muscle query parameters."

  - question: Are the IDs stable?
    answer: "Yes. IDs are stable database integers. You can store them to reference specific exercises later. Re-running the seeder updates existing records without changing IDs."

  - question: Can I combine filters?
    answer: "Yes. You can combine body_part, equipment, muscle, and search in a single request. All active filters are ANDed together."

  - question: Is there a GIF or image for each exercise?
    answer: "No. This API intentionally excludes media files. Only text data (names, muscles, instructions) is served."
