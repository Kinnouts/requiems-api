api_id: random-user
api_name: Random User
description: >-
  Generate random fake user profiles for testing and prototyping. Each call returns a unique name, email address, phone
  number, mailing address, and avatar URL.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Populate test databases with realistic-looking user records
    - Demo and prototype applications without real user data
    - Load testing with varied user payloads
    - UI mockups and design previews
  features:
    - Realistic names, emails, and phone numbers via jaswdr/faker
    - Full mailing address including street, city, state, zip, and country
    - Unique avatar URL per generated user (DiceBear Identicon)
    - Every call returns a different random user
endpoints:
  - name: Get Random User
    method: GET
    path: /v1/technology/random-user
    description: Returns a randomly generated fake user profile.
    response_example: |
      {
        "data": {
          "name": "Grace Lopez",
          "email": "grace.lopez@example.org",
          "phone": "555-123-4567",
          "address": {
            "street": "4821 Maple Avenue",
            "city": "North Judyton",
            "state": "California",
            "zip": "94103",
            "country": "United States of America"
          },
          "avatar": "https://api.dicebear.com/9.x/identicon/svg?seed=Grace+Lopez"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: name
        type: string
        description: Full name of the generated user
      - name: email
        type: string
        description: Email address of the generated user
      - name: phone
        type: string
        description: Phone number of the generated user
      - name: address.street
        type: string
        description: Street address
      - name: address.city
        type: string
        description: City name
      - name: address.state
        type: string
        description: State or region
      - name: address.zip
        type: string
        description: Postal / ZIP code
      - name: address.country
        type: string
        description: Country name
      - name: avatar
        type: string
        description: URL to a unique identicon avatar for the generated user (DiceBear)
    errors:
      - code: 500
        message: internal_error
        description: Internal server error
    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/technology/random-user \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/technology/random-user"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        user = response.json()['data']
        print(f"Generated user: {user['name']} <{user['email']}>")
      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/technology/random-user',
          {
            headers: {
              'requiems-api-key': 'YOUR_API_KEY'
            }
          }
        );

        const { data } = await response.json();
        console.log(`Generated user: ${data.name} <${data.email}>`);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/technology/random-user')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        user = JSON.parse(response.body)['data']
        puts "Generated user: #{user['name']} <#{user['email']}>"
faq:
  - question: Is the generated data real?
    answer: >-
      No. All data is entirely fake and randomly generated using the jaswdr/faker library. It is safe to use for testing
      and development without privacy concerns.
  - question: Will the same user appear twice?
    answer: >-
      Extremely unlikely. The generator draws from large pools of names, addresses, and other fields, so collisions are
      rare in practice.
  - question: Can I use the avatar URL in my application?
    answer: >-
      Yes. The avatar URL points to DiceBear's public identicon service, which generates a unique SVG based on the
      user's name. No API key is required.
performance:
  p50_ms: 867
  p95_ms: 1329
  p99_ms: 2189
  avg_ms: 1013
  samples: 43
  measured_at: "2026-04-16"
