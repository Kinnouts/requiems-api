faq:
  - question: What characters are allowed in a namespace?
    answer: "Namespaces may contain alphanumeric characters (a–z, A–Z, 0–9), hyphens (-), and underscores (_). They must be between 1 and 64 characters long."

  - question: What happens if I GET a counter that has never been incremented?
    answer: The endpoint returns value 0. No error is returned for non-existent counters.

  - question: How quickly are increments persisted to the database?
    answer: Increments are written to Redis atomically in real-time. A background worker syncs all counter values to PostgreSQL every 60 seconds, so the database may be up to 60 seconds behind the live Redis value.

  - question: Are counters isolated between namespaces?
    answer: Yes. Each namespace is a fully independent counter. Incrementing "page-views" has no effect on "user-signups" or any other namespace.
