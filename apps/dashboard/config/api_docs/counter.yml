# Counter API Documentation

api_id: counter
api_name: Counter
description: A high-performance, namespace-isolated hit counter. Increments are atomic and non-blocking — writes go to Redis instantly and are durably persisted to PostgreSQL in the background.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Page view tracking
    - Feature flag hit counting
    - Event counting (signups, purchases, clicks)
    - Usage metering
    - A/B test impression tracking

  features:
    - Atomic O(1) increments via Redis INCR
    - Namespace isolation (one counter per unique name)
    - Durable PostgreSQL persistence (background sync every 60s)
    - Simple REST API with no request body required

endpoints:
  - name: Increment Counter
    method: POST
    path: /v1/misc/counter/{namespace}
    description: Atomically increment a counter by 1 and return the updated value. No request body required.

    parameters:
      - name: namespace
        type: string
        required: true
        location: path
        description: "Counter name. Must be 1–64 characters: alphanumeric, hyphens (-), or underscores (_)."
        example: page-views

    response_example: |
      {
        "namespace": "page-views",
        "value": 42
      }

    response_fields:
      - name: namespace
        type: string
        description: The counter namespace that was incremented
      - name: value
        type: integer
        description: The updated counter value after incrementing

    errors:
      - code: 400
        message: "namespace must be 1–64 chars: alphanumeric, hyphen or underscore only"
        description: The namespace contains invalid characters or exceeds 64 characters

    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/misc/counter/page-views \
          -H "Authorization: Bearer YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/misc/counter/page-views"
        headers = {"Authorization": "Bearer YOUR_API_KEY"}

        response = requests.post(url, headers=headers)
        print(response.json())
        # {"namespace": "page-views", "value": 42}

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/misc/counter/page-views',
          {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer YOUR_API_KEY'
            }
          }
        );

        const data = await response.json();
        console.log(data.value); // 42

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/misc/counter/page-views')
        request = Net::HTTP::Post.new(uri)
        request['Authorization'] = 'Bearer YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['value'] # 42

  - name: Get Counter Value
    method: GET
    path: /v1/misc/counter/{namespace}
    description: Retrieve the current value of a counter. Reads from Redis; falls back to PostgreSQL on a cache miss and re-hydrates the cache automatically.

    parameters:
      - name: namespace
        type: string
        required: true
        location: path
        description: "Counter name. Must be 1–64 characters: alphanumeric, hyphens (-), or underscores (_)."
        example: page-views

    response_example: |
      {
        "namespace": "page-views",
        "value": 42
      }

    response_fields:
      - name: namespace
        type: string
        description: The counter namespace that was queried
      - name: value
        type: integer
        description: The current counter value (0 if the counter has never been incremented)

    errors:
      - code: 400
        message: "namespace must be 1–64 chars: alphanumeric, hyphen or underscore only"
        description: The namespace contains invalid characters or exceeds 64 characters

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/misc/counter/page-views \
          -H "Authorization: Bearer YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/misc/counter/page-views"
        headers = {"Authorization": "Bearer YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        print(response.json())
        # {"namespace": "page-views", "value": 42}

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/misc/counter/page-views',
          {
            headers: {
              'Authorization': 'Bearer YOUR_API_KEY'
            }
          }
        );

        const data = await response.json();
        console.log(data.value); // 42

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/misc/counter/page-views')
        request = Net::HTTP::Get.new(uri)
        request['Authorization'] = 'Bearer YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['value'] # 42

