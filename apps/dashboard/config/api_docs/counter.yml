# Counter API Documentation

api_id: counter
api_name: Counter
description: Atomic, namespace-isolated hit counter. Perfect for tracking page views, downloads, or any event that needs counting.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Track page views and visits
    - Count downloads or clicks
    - Monitor API endpoint usage
    - Track user actions and events
    - Analytics and metrics collection

  features:
    - Namespace isolation for multiple counters
    - Atomic increments (no race conditions)
    - Redis-backed for speed
    - PostgreSQL persistence for durability
    - RESTful API design

endpoints:
  - name: Increment Counter
    method: POST
    path: /v1/technology/counter/{namespace}
    description: Atomically increment a counter in the specified namespace and return the new value

    parameters:
      - name: namespace
        type: string
        required: true
        location: path
        description: "Counter namespace (1-64 chars: alphanumeric, hyphen, underscore)"
        example: page-views

    response_example: |
      {
        "data": {
          "namespace": "page-views",
          "value": 42
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: namespace
        type: string
        description: The counter namespace
      - name: value
        type: integer
        description: The new counter value after increment

    errors:
      - code: 400
        message: bad_request
        description: "Invalid namespace: must be 1–64 chars, alphanumeric, hyphen or underscore only"
      - code: 500
        message: internal_error
        description: Internal server error

    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/technology/counter/page-views \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/technology/counter/page-views"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.post(url, headers=headers)
        data = response.json()['data']
        print(f"Counter '{data['namespace']}' is now at {data['value']}")

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/technology/counter/page-views',
          {
            method: 'POST',
            headers: {
              'requiems-api-key': 'YOUR_API_KEY'
            }
          }
        );

        const { data } = await response.json();
        console.log(`Counter '${data.namespace}' is now at ${data.value}`);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/technology/counter/page-views')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "Counter '#{data['namespace']}' is now at #{data['value']}"

  - name: Get Counter Value
    method: GET
    path: /v1/technology/counter/{namespace}
    description: Get the current value of a counter without incrementing it

    parameters:
      - name: namespace
        type: string
        required: true
        location: path
        description: "Counter namespace (1-64 chars: alphanumeric, hyphen, underscore)"
        example: page-views

    response_example: |
      {
        "data": {
          "namespace": "page-views",
          "value": 42
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: namespace
        type: string
        description: The counter namespace
      - name: value
        type: integer
        description: The current counter value (returns 0 if counter doesn't exist)

    errors:
      - code: 400
        message: bad_request
        description: "Invalid namespace: must be 1–64 chars, alphanumeric, hyphen or underscore only"
      - code: 500
        message: internal_error
        description: Internal server error

    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/technology/counter/page-views \
          -H "requiems-api-key: YOUR_API_KEY"

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/technology/counter/page-views"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        data = response.json()['data']
        print(f"Counter '{data['namespace']}' is at {data['value']}")

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/technology/counter/page-views',
          {
            headers: {
              'requiems-api-key': 'YOUR_API_KEY'
            }
          }
        );

        const { data } = await response.json();
        console.log(`Counter '${data.namespace}' is at ${data.value}`);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/technology/counter/page-views')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)['data']
        puts "Counter '#{data['namespace']}' is at #{data['value']}"

faq:
  - question: What happens if I use a namespace that doesn't exist?
    answer: If you GET a namespace that doesn't exist, it returns 0. If you POST (increment) a non-existent namespace, it creates it with value 1.

  - question: Can multiple users increment the same counter simultaneously?
    answer: Yes! The counter uses atomic operations backed by Redis, so concurrent increments are safe and won't lose counts due to race conditions.

  - question: What characters are allowed in namespace names?
    answer: Namespaces must be 1-64 characters long and can only contain letters (a-z, A-Z), numbers (0-9), hyphens (-), and underscores (_).

  - question: Is the data persistent?
    answer: Yes. Counters are stored in Redis for fast access and periodically synced to PostgreSQL for durability. Even if Redis restarts, your counts are safe.

  - question: Can I reset a counter to zero?
    answer: Currently, counters can only be incremented and read. To reset a counter, you would need to create a new namespace or contact support.
