api_id: profanity
api_name: Profanity Filter
description: Detect and censor profanity in text. Returns a censored copy of the input and the list of flagged words found.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - User-generated content moderation
    - Chat and comment filtering
    - Forum and community platforms
    - Child-safe application layers

  features:
    - Case-insensitive detection
    - Censors flagged words with asterisks
    - Returns deduplicated list of flagged words
    - Preserves surrounding punctuation and whitespace

endpoints:
  - name: Check Profanity
    method: POST
    path: /v1/text/profanity
    description: Checks text for profanity, returning a censored version and the list of flagged words.

    parameters:
      - name: text
        type: string
        required: true
        location: body
        description: The text to check for profanity.
        example: What the heck is going on

    request_example: |
      {
        "text": "Some text to check"
      }

    response_example: |
      {
        "data": {
          "has_profanity": false,
          "censored": "Some text to check",
          "flagged_words": []
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: has_profanity
        type: boolean
        description: Whether any profanity was detected in the text
      - name: censored
        type: string
        description: The input text with profane words replaced by asterisks
      - name: flagged_words
        type: array of strings
        description: Deduplicated list of profane words found (lowercase)

    errors:
      - code: validation_failed
        status: 422
        description: The text field is missing or empty.
      - code: bad_request
        status: 400
        description: The request body is missing or malformed.
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/text/profanity \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"text": "Some text to check"}'

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/text/profanity"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        payload = {"text": "Some text to check"}

        response = requests.post(url, headers=headers, json=payload)
        print(response.json())

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/text/profanity', {
          method: 'POST',
          headers: {
            'requiems-api-key': 'YOUR_API_KEY',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ text: 'Some text to check' })
        });

        const data = await response.json();
        console.log(data.data.has_profanity);
        console.log(data.data.censored);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/text/profanity')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        request['Content-Type'] = 'application/json'
        request.body = { text: 'Some text to check' }.to_json

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['has_profanity']
        puts data['data']['censored']

faq:
  - question: How does censoring work?
    answer: Each character of a flagged word is replaced with an asterisk (*), preserving the word length. Surrounding punctuation and whitespace are kept intact.

  - question: Is detection case-sensitive?
    answer: No. Detection is case-insensitive, so "BULLSHIT", "Bullshit", and "bullshit" are all detected. The censored output replaces the original casing with asterisks.

  - question: Are flagged words duplicated in the response?
    answer: No. The flaggedWords array contains each detected word only once, regardless of how many times it appears in the input.
