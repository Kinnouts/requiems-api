api_id: email-normalize
api_name: Email Normalizer
description: Normalize email addresses to their canonical form. Strips plus tags, removes provider-specific dots, lowercases, trims whitespace, and resolves alias domains (e.g. googlemail.com → gmail.com). Returns the normalized address, its parts, and a list of every change applied.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - De-duplicate user accounts that share the same canonical mailbox
    - Store a consistent canonical address alongside the original
    - Detect plus-tag abuse during registration
    - Normalize emails before look-up queries or comparisons

  features:
    - Lowercases the full address
    - Trims leading and trailing whitespace
    - Removes dots from Gmail local parts (te.st → test)
    - Strips plus tags for supported providers (user+tag → user)
    - Resolves alias domains to canonical form (googlemail.com → gmail.com)
    - Returns a structured list of every change applied
    - Splits normalized address into local part and domain

endpoints:
  - name: Normalize Email
    method: POST
    path: /v1/text/normalize
    description: Normalizes a single email address and returns the canonical form together with a breakdown of all transformations applied.

    parameters:
      - name: email
        type: string
        required: true
        location: body
        description: The email address to normalize. Must be a syntactically valid address.
        example: Te.st.User+spam@Googlemail.com

    request_example: |
      {
        "email": "Te.st.User+spam@Googlemail.com"
      }

    response_example: |
      {
        "data": {
          "original": "Te.st.User+spam@Googlemail.com",
          "normalized": "testuser@gmail.com",
          "local": "testuser",
          "domain": "gmail.com",
          "changes": [
            "lowercased",
            "removed_dots",
            "removed_plus_tag",
            "canonicalised_domain"
          ]
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: original
        type: string
        description: The email address exactly as supplied in the request body
      - name: normalized
        type: string
        description: The canonical form of the address after all transformations
      - name: local
        type: string
        description: The local part (before @) of the normalized address
      - name: domain
        type: string
        description: The domain part (after @) of the normalized address
      - name: changes
        type: array
        description: "Ordered list of transformations applied. Possible values: lowercased, trimmed_whitespace, removed_dots, removed_plus_tag, canonicalised_domain. Empty array when no changes were needed."

    errors:
      - code: validation_failed
        status: 422
        description: The email field is missing or not a valid email address format.
      - code: bad_request
        status: 400
        description: The request body is missing, not valid JSON, or contains unknown fields.
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/text/normalize \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"email": "Te.st.User+spam@Googlemail.com"}'

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/text/normalize"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        payload = {"email": "Te.st.User+spam@Googlemail.com"}

        response = requests.post(url, headers=headers, json=payload)
        data = response.json()
        print(data["data"]["normalized"])  # testuser@gmail.com

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/text/normalize', {
          method: 'POST',
          headers: {
            'requiems-api-key': 'YOUR_API_KEY',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: 'Te.st.User+spam@Googlemail.com' })
        });

        const { data } = await response.json();
        console.log(data.normalized); // testuser@gmail.com
        console.log(data.changes);    // ["lowercased", "removed_dots", ...]

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/text/normalize')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        request['Content-Type'] = 'application/json'
        request.body = { email: 'Te.st.User+spam@Googlemail.com' }.to_json

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['normalized'] # testuser@gmail.com

faq:
  - question: Which email providers have provider-specific normalization?
    answer: Gmail and Googlemail have dots removed from the local part and plus tags stripped. Googlemail.com is also resolved to its canonical gmail.com domain. Other providers receive only the universal normalizations (lowercase, whitespace trimming).

  - question: Does a normalized address always differ from the original?
    answer: No. If the input is already in canonical form (e.g. user@example.com), the normalized field equals the original and the changes array is empty.

  - question: Can I use this to detect duplicate accounts?
    answer: Yes. Store both the original address the user typed and the normalized form. Compare normalized values to identify accounts that map to the same mailbox.

  - question: Does this validate whether the mailbox exists?
    answer: No. This endpoint only applies deterministic text transformations. It does not perform DNS lookups or mailbox-existence checks. Use the Disposable Email API to check whether a domain is temporary.
