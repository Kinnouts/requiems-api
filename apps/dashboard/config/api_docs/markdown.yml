api_id: markdown
api_name: Markdown to HTML
description: Convert Markdown text to HTML in a single API call. Optionally sanitize the output to strip unsafe tags and prevent XSS.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Rendering user-generated Markdown content safely in web apps
    - Converting README files or documentation to HTML
    - Building rich-text editors with Markdown input and HTML preview
    - Preprocessing Markdown before storing rendered HTML

  features:
    - Full CommonMark Markdown support
    - Optional HTML sanitization to strip unsafe tags and attributes
    - Returns ready-to-render HTML string

endpoints:
  - name: Convert Markdown to HTML
    method: POST
    path: /v1/convert/markdown
    description: Converts a Markdown string to HTML. Pass sanitize true to strip potentially unsafe tags like script and iframe from the output.

    parameters:
      - name: markdown
        type: string
        required: true
        location: body
        description: The Markdown text to convert.
        example: "# Hello\n\nThis is **bold** and _italic_ text."
      - name: sanitize
        type: boolean
        required: false
        location: body
        description: When true, sanitizes the HTML output to remove unsafe tags and attributes.
        default: false

    request_example: |
      {
        "markdown": "# Hello\n\nThis is **bold** and _italic_ text.",
        "sanitize": true
      }

    response_example: |
      {
        "data": {
          "html": "<h1>Hello</h1>\n<p>This is <strong>bold</strong> and <em>italic</em> text.</p>\n"
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: html
        type: string
        description: The rendered HTML output

    errors:
      - code: 422
        message: unprocessable_entity

    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/convert/markdown \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"markdown": "# Hello\n\nThis is **bold** text.", "sanitize": true}'

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/convert/markdown"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        payload = {
            "markdown": "# Hello\n\nThis is **bold** text.",
            "sanitize": True
        }

        response = requests.post(url, json=payload, headers=headers)
        print(response.json()['data']['html'])

      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/convert/markdown',
          {
            method: 'POST',
            headers: {
              'requiems-api-key': 'YOUR_API_KEY',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              markdown: '# Hello\n\nThis is **bold** text.',
              sanitize: true
            })
          }
        );
        const { data } = await response.json();
        console.log(data.html);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/convert/markdown')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        request['Content-Type'] = 'application/json'
        request.body = {
          markdown: "# Hello\n\nThis is **bold** text.",
          sanitize: true
        }.to_json

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        puts JSON.parse(response.body)['data']['html']

faq:
  - question: What Markdown spec does this follow?
    answer: The converter follows CommonMark — the standardized Markdown specification used by GitHub, GitLab, and most modern platforms.

  - question: When should I use sanitize?
    answer: Enable sanitize whenever the Markdown input comes from untrusted sources (user input, third-party content). It strips tags like script, iframe, and on* event attributes to prevent XSS attacks.

  - question: Does sanitize affect standard Markdown output?
    answer: No. Standard Markdown output (headings, paragraphs, bold, links, code blocks, etc.) is not affected by sanitization. Only raw HTML embedded in the Markdown is filtered.
