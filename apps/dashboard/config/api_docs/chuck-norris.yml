api_id: chuck-norris
api_name: Chuck Norris Facts
description: >-
  Get a random Chuck Norris fact from a curated built-in database. Every call returns a different fact selected with a
  cryptographically secure random number generator.
base_url: https://api.requiems.xyz
overview:
  use_cases:
    - Entertainment widgets and fun sidebars
    - Office joke-of-the-day bots
    - Onboarding or loading screen humor
    - Developer easter eggs
  features:
    - Random fact on every request
    - Unique stable IDs per fact (cn_<index>)
    - No parameters required
endpoints:
  - name: Get Random Chuck Norris Fact
    method: GET
    path: /v1/entertainment/chuck-norris
    description: Returns a randomly selected Chuck Norris fact from the built-in database.
    response_example: |
      {
        "data": {
          "id": "cn_0",
          "fact": "Chuck Norris can divide by zero."
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }
    response_fields:
      - name: id
        type: string
        description: Unique fact identifier in the format cn_<index> (e.g. cn_0, cn_7)
      - name: fact
        type: string
        description: The Chuck Norris fact text
    code_examples:
      curl: |
        curl https://api.requiems.xyz/v1/entertainment/chuck-norris \
          -H "requiems-api-key: YOUR_API_KEY"
      python: |
        import requests

        url = "https://api.requiems.xyz/v1/entertainment/chuck-norris"
        headers = {"requiems-api-key": "YOUR_API_KEY"}

        response = requests.get(url, headers=headers)
        result = response.json()['data']
        print(f"[{result['id']}] {result['fact']}")
      javascript: |
        const response = await fetch(
          'https://api.requiems.xyz/v1/entertainment/chuck-norris',
          { headers: { 'requiems-api-key': 'YOUR_API_KEY' } }
        );
        const { data } = await response.json();
        console.log(`[${data.id}] ${data.fact}`);
      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/entertainment/chuck-norris')
        request = Net::HTTP::Get.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        result = JSON.parse(response.body)['data']
        puts "[#{result['id']}] #{result['fact']}"
faq:
  - question: Is the fact truly random on every request?
    answer: Yes. Each request uses a cryptographically secure random number generator so you get a different fact each time.
  - question: What does the id field look like?
    answer: >-
      IDs follow the format cn_<index> where index is a zero-based integer referencing the fact's position in the
      database (e.g. cn_0, cn_7, cn_29).
  - question: Are new facts added over time?
    answer: >-
      The fact database is built into the API and may be expanded in future releases. The IDs of existing facts remain
      stable.
performance:
  p50_ms: 876
  p95_ms: 988
  p99_ms: 1033
  avg_ms: 1009
  samples: 49
  measured_at: "2026-04-16"
