api_id: detect-language
api_name: Language Detection
description: Detect the language of any text and receive the language name, ISO 639-1 code, and a confidence score.
base_url: https://api.requiems.xyz

overview:
  use_cases:
    - Routing user messages to the correct language support team
    - Auto-translating user-generated content
    - Filtering content by language in multilingual platforms
    - Preprocessing text for NLP pipelines

  features:
    - Supports 75 languages
    - Returns ISO 639-1 language code
    - Provides a confidence score between 0.0 and 1.0
    - Works on short phrases and full sentences

endpoints:
  - name: Detect Language
    method: POST
    path: /v1/ai/detect-language
    description: Identifies the language of the provided text and returns the language name, ISO 639-1 code, and confidence score.

    parameters:
      - name: text
        type: string
        required: true
        location: body
        description: The text whose language should be detected.
        example: "Bonjour, comment ça va?"

    request_example: |
      {
        "text": "Bonjour, comment ça va?"
      }

    response_example: |
      {
        "data": {
          "language": "French",
          "code": "fr",
          "confidence": 0.98
        },
        "metadata": {
          "timestamp": "2026-01-01T00:00:00Z"
        }
      }

    response_fields:
      - name: language
        type: string
        description: Full name of the detected language (e.g. French, English, Spanish)
      - name: code
        type: string
        description: "ISO 639-1 two-letter language code (e.g. fr, en, es). Empty string when detection is unreliable."
      - name: confidence
        type: float
        description: "Confidence score between 0.0 and 1.0. 0.0 is returned when the language cannot be reliably detected."

    errors:
      - code: validation_failed
        status: 422
        description: The text field is missing or empty.
      - code: bad_request
        status: 400
        description: The request body is missing or malformed.
      - code: internal_error
        status: 500
        description: Unexpected server error.

    code_examples:
      curl: |
        curl -X POST https://api.requiems.xyz/v1/ai/detect-language \
          -H "requiems-api-key: YOUR_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"text": "Bonjour, comment ça va?"}'

      python: |
        import requests

        url = "https://api.requiems.xyz/v1/ai/detect-language"
        headers = {
            "requiems-api-key": "YOUR_API_KEY",
            "Content-Type": "application/json"
        }
        payload = {"text": "Bonjour, comment ça va?"}

        response = requests.post(url, headers=headers, json=payload)
        print(response.json())

      javascript: |
        const response = await fetch('https://api.requiems.xyz/v1/ai/detect-language', {
          method: 'POST',
          headers: {
            'requiems-api-key': 'YOUR_API_KEY',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ text: 'Bonjour, comment ça va?' })
        });

        const data = await response.json();
        console.log(data.data.language);
        console.log(data.data.code);
        console.log(data.data.confidence);

      ruby: |
        require 'net/http'
        require 'json'

        uri = URI('https://api.requiems.xyz/v1/ai/detect-language')
        request = Net::HTTP::Post.new(uri)
        request['requiems-api-key'] = 'YOUR_API_KEY'
        request['Content-Type'] = 'application/json'
        request.body = { text: 'Bonjour, comment ça va?' }.to_json

        response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
          http.request(request)
        end

        data = JSON.parse(response.body)
        puts data['data']['language']
        puts data['data']['code']
        puts data['data']['confidence']

faq:
  - question: What languages are supported?
    answer: The endpoint supports 75 languages including English, French, Spanish, German, Italian, Portuguese, Dutch, Russian, Chinese, Japanese, Arabic, and many more.

  - question: What does a confidence score of 0.0 mean?
    answer: A confidence of 0.0 means the language could not be reliably detected. This can happen with very short or ambiguous input such as a single common word that exists in multiple languages.

  - question: What is the ISO 639-1 code?
    answer: It is a standardised two-letter code identifying a language (e.g. "en" for English, "fr" for French, "es" for Spanish). An empty string is returned when detection is unreliable.
