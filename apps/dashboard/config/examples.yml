# Example Projects and Tutorials

examples:
  - id: email-validator-web-app
    title: Email Validator Web App
    category: Web Apps
    description: Build a simple web application that validates email addresses and detects disposable emails using the Disposable Email Checker API.
    difficulty: Beginner
    duration: 30 min
    technologies:
      - HTML
      - JavaScript
      - Tailwind CSS
    apis_used:
      - Disposable Email Checker
    github_url: https://github.com/bobadilla-tech/requiems-examples/tree/main/email-validator
    demo_url: https://email-validator-demo.requiems.xyz
    thumbnail: /images/examples/email-validator.png

  - id: random-quote-generator
    title: Random Quote Generator
    category: Web Apps
    description: Create an inspiring quote generator web app with social sharing capabilities using the Random Quotes API.
    difficulty: Beginner
    duration: 20 min
    technologies:
      - HTML
      - JavaScript
      - CSS
    apis_used:
      - Random Quotes
    github_url: https://github.com/bobadilla-tech/requiems-examples/tree/main/quote-generator
    demo_url: https://quotes-demo.requiems.xyz
    thumbnail: /images/examples/quote-generator.png

  - id: lorem-ipsum-generator
