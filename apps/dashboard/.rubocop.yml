# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# ── SQL safety ────────────────────────────────────────────────────────────────

# Warn on column names that conflict with ActiveRecord internals
Rails/DangerousColumnNames:
  Enabled: true

# Enforce squished heredocs for multiline SQL strings
Rails/SquishedSQLHeredocs:
  Enabled: true

# ── Query hygiene ─────────────────────────────────────────────────────────────

# Prefer where.missing(:assoc) over LEFT JOIN + WHERE IS NULL
Rails/WhereMissing:
  Enabled: true

# Disallow .where("col = ?", val) when .where(col: val) works
Rails/WhereEquals:
  Enabled: true

# Prefer .exists? over .where(...).exists?
Rails/WhereExists:
  Enabled: true

# Disallow .where.not(a: x, b: y) — ambiguous AND/OR semantics
Rails/WhereNotWithMultipleConditions:
  Enabled: true

# Prefer find_by over where(...).first
Rails/FindBy:
  Enabled: true

# Prefer find(id) over find_by(id: id)
Rails/FindById:
  Enabled: true

# Require .uniq before .pluck to avoid loading duplicates
Rails/UniqBeforePluck:
  Enabled: true

# ── Scopes ────────────────────────────────────────────────────────────────────

# Scopes must use a lambda/proc so they are lazily evaluated
Rails/ScopeArgs:
  Enabled: true

# Disallow default_scope — hard to override and causes subtle bugs
Rails/DefaultScope:
  Enabled: true

# ── Validations & callbacks ───────────────────────────────────────────────────

# Disallow methods that skip validations (update_column, toggle!, etc.)
# Bulk ops (upsert_all, insert_all, update_all) and update_columns are explicitly
# allowed where performance requires bypassing AR callbacks (sync jobs, bulk revokes).
# Tests excluded — update_column is used to set up state without triggering callbacks.
Rails/SkipsModelValidations:
  Enabled: true
  AllowedMethods:
    - touch
    - upsert_all
    - insert_all
    - update_all
    - update_columns
  Exclude:
    - "test/**/*"

# Warn on redundant presence: true on belongs_to (already required by default)
Rails/RedundantPresenceValidationOnBelongsTo:
  Enabled: true

# ── Misc strictness ───────────────────────────────────────────────────────────

# Prefer save!/update!/destroy! so failures raise instead of silently returning false.
# Excluded from tests (setup state doesn't need bang) and BCrypt (not an AR method).
Rails/SaveBang:
  Enabled: true
  Exclude:
    - "test/**/*"
    - "app/services/api_key_generator.rb"

# Prefer assert_not over assert !, assert_nil over assert_equal nil
Rails/AssertNot:
  Enabled: true

Rails/RefuteMethods:
  Enabled: true

# Require eager_load: true on associations that are always used
Rails/EagerEvaluationLogMessage:
  Enabled: true
