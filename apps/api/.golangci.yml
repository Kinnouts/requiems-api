# golangci-lint configuration for Requiems API Go backend
# Philosophy: Non-blocking quality checks to help engineers improve code

run:
  timeout: 5m
  go: "1.23"
  modules-download-mode: readonly

linters-settings:
  # Error handling
  errcheck:
    check-blank: false
    check-type-assertions: true
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close

  # Code complexity
  gocyclo:
    min-complexity: 15  # Reasonable threshold

  # Unused code
  unused:
    check-exported: false  # Don't warn on unused exported items

  # Naming conventions
  revive:
    rules:
      - name: var-naming
        severity: warning
      - name: package-comments
        severity: warning
      - name: exported
        severity: warning
        disabled: false
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

  # Line length
  lll:
    line-length: 120
    tab-width: 4

  # Imports
  goimports:
    local-prefixes: requiems-api

  # Style
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - hugeParam  # Allow large structs by value if needed

linters:
  enable:
    # Essential linters (errors that should be caught)
    - errcheck      # Unchecked errors
    - gosimple      # Simplify code
    - govet         # Go vet
    - ineffassign   # Unused assignments
    - staticcheck   # Static analysis
    - typecheck     # Type checking
    - unused        # Unused code

    # Style linters (warnings to help improve)
    - gofmt         # Formatting
    - goimports     # Import formatting
    - revive        # Linting replacement for golint
    - misspell      # Spelling
    - unconvert     # Unnecessary conversions
    - unparam       # Unused params

    # Code quality (non-blocking)
    - gocyclo       # Cyclomatic complexity
    - gocritic      # Code criticism
    - gosec         # Security issues
    - dupl          # Code duplication

  disable:
    - goconst       # Too noisy for constants
    - funlen        # Function length is subjective
    - gocognit      # Similar to gocyclo
    - nestif        # Too restrictive

issues:
  # Maximum issues count per linter
  max-issues-per-linter: 0
  max-same-issues: 0

  # Exclude some default checks
  exclude-rules:
    # Allow underscore imports for side effects
    - path: _test\.go
      linters:
        - errcheck
        - dupl
        - gosec

    # Allow longer lines in comments
    - linters:
        - lll
      source: "^//.*$"

  # Don't hide multiple issues on the same line
  new: false

  # Fix issues automatically where possible
  fix: false  # Set to true locally, false in CI

output:
  formats:
    - format: github-actions  # GitHub Actions format for annotations
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
