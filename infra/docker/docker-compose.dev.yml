name: requiem-dev

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env.example
      - path: .env.local
        required: false
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requiem"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/api.dev.Dockerfile
    working_dir: /app
    env_file:
      - .env.example
      - path: .env.local
        required: false
    volumes:
      - ../../apps/api:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: ../../infra/docker/dashboard.dev.Dockerfile
    working_dir: /app
    command: >
      sh -c "
        bundle exec rails db:create db:migrate db:seed &&
        bundle exec rails tailwindcss:build &&
        rm -f tmp/pids/server.pid &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "
    env_file:
      - .env.example
      - path: .env.local
        required: false
    volumes:
      - ../../apps/dashboard:/app
      - ../../apps/workers/shared:/workers/shared
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      api-management:
        condition: service_started
    stdin_open: true
    tty: true

  auth-gateway:
    build:
      context: ../../apps/workers/auth-gateway
      dockerfile: ../../../infra/docker/auth-gateway.dev.Dockerfile
    working_dir: /workers/auth-gateway
    command: >
      sh -c "
        pnpm install --frozen-lockfile &&
        echo BACKEND_URL=$$BACKEND_URL > .dev.vars &&
        echo BACKEND_SECRET=$$BACKEND_SECRET >> .dev.vars &&
        node ./scripts/seed-dev.ts &&
        pnpm exec wrangler dev --ip 0.0.0.0 --port 4455 --persist-to=$$WRANGLER_PERSIST_TO
      "
    environment:
      - WRANGLER_PERSIST_TO=/workers/.wrangler/state
    env_file:
      - .env.example
      - path: .env.local
        required: false
    volumes:
      - ../../apps/workers/auth-gateway:/workers/auth-gateway
      - ../../apps/workers/shared:/workers/shared
      - auth_gateway_modules:/workers/auth-gateway/node_modules
      - wrangler_state:/workers/.wrangler
    ports:
      - "4455:4455"
    depends_on:
      api:
        condition: service_started

  api-management:
    build:
      context: ../../apps/workers/api-management
      dockerfile: ../../../infra/docker/api-management.dev.Dockerfile
    working_dir: /workers/api-management
    command: >
      sh -c "
        pnpm install --frozen-lockfile &&
        pnpm install --frozen-lockfile --dir /workers/shared &&
        pnpm exec wrangler d1 execute requiem-usage --local --yes --file=../auth-gateway/schema.sql --persist-to=$$WRANGLER_PERSIST_TO &&
        echo API_MANAGEMENT_API_KEY=$$API_MANAGEMENT_API_KEY > .dev.vars &&
        echo SWAGGER_USERNAME=$$SWAGGER_USERNAME >> .dev.vars &&
        echo SWAGGER_PASSWORD=$$SWAGGER_PASSWORD >> .dev.vars &&
        pnpm exec wrangler dev --ip 0.0.0.0 --port 5544 --persist-to=$$WRANGLER_PERSIST_TO
      "
    environment:
      - WRANGLER_PERSIST_TO=/workers/.wrangler/state
    env_file:
      - .env.example
      - path: .env.local
        required: false
    volumes:
      - ../../apps/workers/api-management:/workers/api-management
      - ../../apps/workers/shared:/workers/shared
      - api_management_modules:/workers/api-management/node_modules
      - shared_modules:/workers/shared/node_modules
      - wrangler_state:/workers/.wrangler
    ports:
      - "5544:5544"
    depends_on:
      auth-gateway:
        condition: service_started

  # Sidekiq for background jobs
  sidekiq:
    build:
      context: ../../apps/dashboard
      dockerfile: ../../infra/docker/dashboard.dev.Dockerfile
    working_dir: /app
    command: >
      sh -c "
        bundle exec sidekiq
      "
    env_file:
      - .env.example
      - path: .env.local
        required: false
    volumes:
      - ../../apps/dashboard:/app
    depends_on:
      - db
      - redis
      - dashboard
      - api-management

volumes:
  db_data:
  redis_data:
  auth_gateway_modules:
  api_management_modules:
  shared_modules:
  wrangler_state:
