name: requiem-dev

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=requiem
      - POSTGRES_PASSWORD=requiem
      - POSTGRES_DB=requiem
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requiem"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Go API with hot reloading using Air
  api:
    image: golang:1.26-alpine
    working_dir: /app
    command: >
      sh -c "
        apk update &&
        apk add --no-cache git &&
        go install github.com/cosmtrek/air@v1.52.0 &&
        air
      "
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://requiem:requiem@db:5432/requiem?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - BACKEND_SECRET=${BACKEND_SECRET:-dev_secret_min_32_chars_long_for_development_only}
    volumes:
      - ../../apps/api:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Rails Dashboard with hot reloading
  dashboard:
    image: ruby:3.4-alpine
    working_dir: /app
    command: >
      sh -c "
        apk update &&
        apk add --no-cache build-base postgresql-dev nodejs npm tzdata git yaml-dev &&
        bundle install &&
        bundle exec rails db:create db:migrate &&
        bundle exec rails tailwindcss:build &&
        rm -f tmp/pids/server.pid &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgres://requiem:requiem@db:5432/requiem?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY_BASE=development_secret_key_base_change_in_production
      # Internal API (direct Go backend — used for docs playground proxy)
      - INTERNAL_API_URL=http://api:8080
      - BACKEND_SECRET=${BACKEND_SECRET:-dev_secret_min_32_chars_long_for_development_only}
      # API Management Configuration
      - API_MANAGEMENT_API_KEY=${API_MANAGEMENT_API_KEY:-dev_api_mgmt_key_for_local_dev_only}
      - API_MANAGEMENT_URL=${API_MANAGEMENT_URL:-http://api-management:6001}
      # LemonSqueezy Configuration
      - LEMONSQUEEZY_STORE_SLUG=${LEMONSQUEEZY_STORE_SLUG}
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID}
      - LEMONSQUEEZY_API_KEY=${LEMONSQUEEZY_API_KEY}
      - LEMONSQUEEZY_SIGNING_SECRET=${LEMONSQUEEZY_SIGNING_SECRET}
      - LEMONSQUEEZY_DEVELOPER_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_DEVELOPER_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_DEVELOPER_YEARLY_VARIANT_ID=${LEMONSQUEEZY_DEVELOPER_YEARLY_VARIANT_ID}
      - LEMONSQUEEZY_BUSINESS_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_BUSINESS_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_BUSINESS_YEARLY_VARIANT_ID=${LEMONSQUEEZY_BUSINESS_YEARLY_VARIANT_ID}
      - LEMONSQUEEZY_PROFESSIONAL_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_PROFESSIONAL_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_PROFESSIONAL_YEARLY_VARIANT_ID=${LEMONSQUEEZY_PROFESSIONAL_YEARLY_VARIANT_ID}
      # SMTP Configuration
      - SMTP_ADDRESS=${SMTP_ADDRESS}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_DOMAIN=${SMTP_DOMAIN}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - MAILER_HOST=${MAILER_HOST}
      # Form Notifications
      - OBSERVER_EMAILS=${OBSERVER_EMAILS:-eliaz@bobadilla.tech}
      - MAILER_FROM=${MAILER_FROM:-noreply@requiems.xyz}
    volumes:
      - ../../apps/dashboard:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      api-management:
        condition: service_started
    stdin_open: true
    tty: true

  auth-gateway:
    image: oven/bun:1-alpine
    working_dir: /workers/auth-gateway
    command: >
      sh -c "
        bun install --frozen-lockfile &&
        echo BACKEND_URL=http://api:8080 > .dev.vars &&
        echo BACKEND_SECRET=$$BACKEND_SECRET >> .dev.vars &&
        bun /scripts/seed-workers.ts &&
        bunx wrangler dev --ip 0.0.0.0 --port 6000
      "
    environment:
      - BACKEND_SECRET=${BACKEND_SECRET:-dev_secret_min_32_chars_long_for_development_only}
      - WRANGLER_SEND_METRICS=false
    volumes:
      - ../../apps/workers/auth-gateway:/workers/auth-gateway
      - ../../apps/workers/shared:/workers/shared
      - ./scripts:/scripts
      - auth_gateway_modules:/workers/auth-gateway/node_modules
      - wrangler_state:/workers/auth-gateway/.wrangler
    ports:
      - "6000:6000"
    depends_on:
      api:
        condition: service_started

  api-management:
    image: oven/bun:1-alpine
    working_dir: /workers/api-management
    command: >
      sh -c "
        bun install --frozen-lockfile &&
        echo API_MANAGEMENT_API_KEY=$$API_MANAGEMENT_API_KEY > .dev.vars &&
        bunx wrangler dev --ip 0.0.0.0 --port 6001
      "
    environment:
      - API_MANAGEMENT_API_KEY=${API_MANAGEMENT_API_KEY:-dev_api_mgmt_key_for_local_dev_only}
      - WRANGLER_SEND_METRICS=false
    volumes:
      - ../../apps/workers/api-management:/workers/api-management
      - ../../apps/workers/shared:/workers/shared
      - api_management_modules:/workers/api-management/node_modules
      - wrangler_state:/workers/api-management/.wrangler
    ports:
      - "6001:6001"
    depends_on:
      auth-gateway:
        condition: service_started

  # Sidekiq for background jobs
  sidekiq:
    image: ruby:3.4-alpine
    working_dir: /app
    command: >
      sh -c "
        apk update &&
        apk add --no-cache build-base postgresql-dev tzdata yaml-dev &&
        bundle install &&
        bundle exec sidekiq
      "
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgres://requiem:requiem@db:5432/requiem?sslmode=disable
      - REDIS_URL=redis://redis:6379
      # API Management Configuration
      - API_MANAGEMENT_API_KEY=${API_MANAGEMENT_API_KEY:-dev_api_mgmt_key_for_local_dev_only}
      - API_MANAGEMENT_URL=${API_MANAGEMENT_URL:-http://api-management:6001}
    volumes:
      - ../../apps/dashboard:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
      - redis
      - dashboard
      - api-management

volumes:
  db_data:
  redis_data:
  bundle_cache:
  auth_gateway_modules:
  api_management_modules:
  wrangler_state:
