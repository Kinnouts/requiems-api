name: requiem-backend

services:
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/api.Dockerfile
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - BACKEND_SECRET=${BACKEND_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-requiem}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-requiem}
      - POSTGRES_DB=${POSTGRES_DB:-requiem}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-requiem}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: ../../infra/docker/dashboard.Dockerfile
    environment:
      - RAILS_ENV=production
      - RAILS_LOG_LEVEL=warn
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-changeme}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - BACKEND_SECRET=${BACKEND_SECRET}
      # Internal API (direct Go backend — used for docs playground proxy)
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:8080}
      - API_MANAGEMENT_API_KEY=${API_MANAGEMENT_API_KEY}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - CLOUDFLARE_KV_NAMESPACE_ID=${CLOUDFLARE_KV_NAMESPACE_ID}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - LEMONSQUEEZY_STORE_SLUG=${LEMONSQUEEZY_STORE_SLUG}
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID}
      - LEMONSQUEEZY_API_KEY=${LEMONSQUEEZY_API_KEY}
      - LEMONSQUEEZY_SIGNING_SECRET=${LEMONSQUEEZY_SIGNING_SECRET}
      - LEMONSQUEEZY_DEVELOPER_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_DEVELOPER_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_DEVELOPER_YEARLY_VARIANT_ID=${LEMONSQUEEZY_DEVELOPER_YEARLY_VARIANT_ID}
      - LEMONSQUEEZY_BUSINESS_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_BUSINESS_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_BUSINESS_YEARLY_VARIANT_ID=${LEMONSQUEEZY_BUSINESS_YEARLY_VARIANT_ID}
      - LEMONSQUEEZY_PROFESSIONAL_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_PROFESSIONAL_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_PROFESSIONAL_YEARLY_VARIANT_ID=${LEMONSQUEEZY_PROFESSIONAL_YEARLY_VARIANT_ID}
      - SMTP_ADDRESS=${SMTP_ADDRESS}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_DOMAIN=${SMTP_DOMAIN}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - MAILER_HOST=${MAILER_HOST}
      - OBSERVER_EMAILS=${OBSERVER_EMAILS:-eliaz@bobadilla.tech}
      - MAILER_FROM=${MAILER_FROM:-noreply@requiems.xyz}
    ports:
      - "3000:80"
    depends_on:
      - db
      - redis
    command: >
      sh -c "./bin/rails db:prepare &&
             ./bin/thrust ./bin/rails server"

  sidekiq:
    build:
      context: ../../apps/dashboard
      dockerfile: ../../infra/docker/dashboard.Dockerfile
    environment:
      - RAILS_ENV=production
      - RAILS_LOG_LEVEL=warn
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-changeme}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - BACKEND_SECRET=${BACKEND_SECRET}
      - API_MANAGEMENT_API_KEY=${API_MANAGEMENT_API_KEY}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - CLOUDFLARE_KV_NAMESPACE_ID=${CLOUDFLARE_KV_NAMESPACE_ID}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - LEMONSQUEEZY_STORE_SLUG=${LEMONSQUEEZY_STORE_SLUG}
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID}
      - LEMONSQUEEZY_API_KEY=${LEMONSQUEEZY_API_KEY}
      - LEMONSQUEEZY_SIGNING_SECRET=${LEMONSQUEEZY_SIGNING_SECRET}
      - LEMONSQUEEZY_DEVELOPER_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_DEVELOPER_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_DEVELOPER_YEARLY_VARIANT_ID=${LEMONSQUEEZY_DEVELOPER_YEARLY_VARIANT_ID}
      - LEMONSQUEEZY_BUSINESS_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_BUSINESS_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_BUSINESS_YEARLY_VARIANT_ID=${LEMONSQUEEZY_BUSINESS_YEARLY_VARIANT_ID}
      - LEMONSQUEEZY_PROFESSIONAL_MONTHLY_VARIANT_ID=${LEMONSQUEEZY_PROFESSIONAL_MONTHLY_VARIANT_ID}
      - LEMONSQUEEZY_PROFESSIONAL_YEARLY_VARIANT_ID=${LEMONSQUEEZY_PROFESSIONAL_YEARLY_VARIANT_ID}
      - SMTP_ADDRESS=${SMTP_ADDRESS}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_DOMAIN=${SMTP_DOMAIN}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - MAILER_HOST=${MAILER_HOST}
      - OBSERVER_EMAILS=${OBSERVER_EMAILS:-eliaz@bobadilla.tech}
      - MAILER_FROM=${MAILER_FROM:-noreply@requiems.xyz}
    depends_on:
      - db
      - redis
    command: bundle exec sidekiq

  caddy:
    image: caddy:2-alpine
    environment:
      - BACKEND_SECRET=${BACKEND_SECRET}
    depends_on:
      - api
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data: {}
  redis_data: {}
  caddy_data: {}
  caddy_config: {}
