version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://requiem:requiem@db:5432/requiem?sslmode=disable
      - REDIS_URL=redis://redis:6379
    ports:
      - "6969:8080"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=requiem
      - POSTGRES_PASSWORD=requiem
      - POSTGRES_DB=requiem
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    profiles:
      - prod
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data: {}
  redis_data: {}
  caddy_data: {}
  caddy_config: {}
