version: 2

updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # ── Go (apps/api) ─────────────────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/apps/api"
    schedule:
      interval: "weekly"

  # ── Ruby / Rails (apps/dashboard) ─────────────────────────────────────────
  - package-ecosystem: "bundler"
    directory: "/apps/dashboard"
    schedule:
      interval: "weekly"

  # ── Node / Cloudflare Workers ─────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/workers/shared"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/apps/workers/auth-gateway"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/apps/workers/api-management"
    schedule:
      interval: "weekly"
