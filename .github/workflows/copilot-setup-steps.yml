name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: requiem
          POSTGRES_PASSWORD: requiem
          POSTGRES_DB: requiem_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Load env defaults
        run: grep -v '^#' infra/docker/.env.example | grep -v '^$' | grep -v '=\s*$' >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum

      - name: Download Go dependencies
        working-directory: apps/api
        run: go mod download

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
          bundler-cache: true
          working-directory: apps/dashboard

      - name: Setup Rails test database
        working-directory: apps/dashboard
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://requiem:requiem@localhost:5432/requiem_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          BACKEND_SECRET: test_secret_min_32_chars_long_for_testing_only
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install shared worker dependencies
        working-directory: apps/workers/shared
        run: pnpm install --frozen-lockfile

      - name: Install auth-gateway dependencies
        working-directory: apps/workers/auth-gateway
        run: pnpm install --frozen-lockfile

      - name: Install api-management dependencies
        working-directory: apps/workers/api-management
        run: pnpm install --frozen-lockfile
