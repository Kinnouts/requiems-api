name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      auth-gateway: ${{ steps.filter.outputs.auth-gateway }}
      api-management: ${{ steps.filter.outputs.api-management }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'
            dashboard:
              - 'apps/dashboard/**'
              - '.github/workflows/ci.yml'
            auth-gateway:
              - 'apps/workers/auth-gateway/**'
              - 'apps/workers/shared/**'
              - '.github/workflows/ci.yml'
            api-management:
              - 'apps/workers/api-management/**'
              - 'apps/workers/shared/**'
              - '.github/workflows/ci.yml'

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: requiem
          POSTGRES_PASSWORD: requiem
          POSTGRES_DB: requiem_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum

      - name: Load env defaults
        run: grep -v '^#' infra/docker/.env.example | grep -v '^$' | grep -v '=\s*$' >> $GITHUB_ENV

      - name: Download dependencies
        working-directory: apps/api
        run: go mod download

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://requiem:requiem@localhost:5432/requiem_test?sslmode=disable
          BACKEND_SECRET: test_secret_min_32_chars_long_for_testing_only
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage.out
          flags: go

  go-lint:
    name: Go Lint (Advisory)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    continue-on-error: true # Non-blocking

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        working-directory: apps/api
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          working-directory: apps/api

  rails-test:
    name: Rails Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: requiem
          POSTGRES_PASSWORD: requiem
          POSTGRES_DB: requiem_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
          bundler-cache: true
          working-directory: apps/dashboard

      - name: Load env defaults
        run: grep -v '^#' infra/docker/.env.example | grep -v '^$' | grep -v '=\s*$' >> $GITHUB_ENV

      - name: Setup test database
        working-directory: apps/dashboard
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://requiem:requiem@localhost:5432/requiem_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Run tests
        working-directory: apps/dashboard
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://requiem:requiem@localhost:5432/requiem_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          BACKEND_SECRET: test_secret_min_32_chars_long_for_testing_only
        run: bin/rails test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/dashboard/coverage/lcov/dashboard.lcov
          flags: rails

  rails-security:
    name: Rails Security Scans
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
          bundler-cache: true
          working-directory: apps/dashboard

      - name: Brakeman security scan
        working-directory: apps/dashboard
        run: bundle exec brakeman --no-pager --format json --output brakeman.json || true

      - name: Upload Brakeman results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: brakeman-results
          path: apps/dashboard/brakeman.json

      - name: Bundler audit
        working-directory: apps/dashboard
        run: bundle exec bundler-audit

      - name: Importmap audit
        working-directory: apps/dashboard
        run: bin/importmap audit

  rails-lint:
    name: Rails Lint (Advisory)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    continue-on-error: true # Non-blocking

    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
          bundler-cache: true
          working-directory: apps/dashboard

      - name: Cache RuboCop
        uses: actions/cache@v5
        with:
          path: apps/dashboard/tmp/rubocop
          key: rubocop-${{ runner.os }}-${{ hashFiles('apps/dashboard/.rubocop.yml', 'apps/dashboard/Gemfile.lock') }}
          restore-keys: |
            rubocop-${{ runner.os }}-

      - name: RuboCop
        working-directory: apps/dashboard
        run: bundle exec rubocop

  worker-typecheck:
    name: Worker TypeScript Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-gateway == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: apps/workers/auth-gateway/pnpm-lock.yaml

      - name: Install shared dependencies
        working-directory: apps/workers/shared
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        working-directory: apps/workers/auth-gateway
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: apps/workers/auth-gateway
        run: pnpm run typecheck

  worker-test:
    name: Worker Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-gateway == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: apps/workers/auth-gateway/pnpm-lock.yaml

      - name: Install shared dependencies
        working-directory: apps/workers/shared
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        working-directory: apps/workers/auth-gateway
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        working-directory: apps/workers/auth-gateway
        run: pnpm exec vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/workers/auth-gateway/coverage/lcov.info
          flags: auth-gateway

      - name: Upload shared coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/workers/auth-gateway/coverage/lcov.info
          flags: shared

  worker-lint:
    name: Worker Lint (Advisory)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-gateway == 'true'
    continue-on-error: true # Non-blocking

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: apps/workers/auth-gateway/pnpm-lock.yaml

      - name: Install shared dependencies
        working-directory: apps/workers/shared
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        working-directory: apps/workers/auth-gateway
        run: pnpm install --frozen-lockfile

      - name: Biome lint
        working-directory: apps/workers/auth-gateway
        run: pnpm run lint

      - name: Biome format check
        working-directory: apps/workers/auth-gateway
        run: pnpm run format:check

  api-management-typecheck:
    name: API Management TypeScript Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api-management == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: apps/workers/api-management/pnpm-lock.yaml

      - name: Install shared dependencies
        working-directory: apps/workers/shared
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        working-directory: apps/workers/api-management
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: apps/workers/api-management
        run: pnpm run typecheck

  api-management-test:
    name: API Management Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api-management == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: apps/workers/api-management/pnpm-lock.yaml

      - name: Install shared dependencies
        working-directory: apps/workers/shared
        run: pnpm install --frozen-lockfile

      - name: Install dependencies
        working-directory: apps/workers/api-management
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        working-directory: apps/workers/api-management
        run: pnpm exec vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/workers/api-management/coverage/lcov.info
          flags: api-management

      - name: Upload shared coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/workers/api-management/coverage/lcov.info
          flags: shared

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - go-test
      - rails-test
      - rails-security
      - worker-typecheck
      - worker-test
      - api-management-typecheck
      - api-management-test
    if: always()

    steps:
      - name: Check all required jobs
        run: |
          if [[ "${{ needs.go-test.result }}" == "failure" ]]; then
            echo "❌ Go tests failed"
            exit 1
          fi

          if [[ "${{ needs.rails-test.result }}" == "failure" ]]; then
            echo "❌ Rails tests failed"
            exit 1
          fi

          if [[ "${{ needs.rails-security.result }}" == "failure" ]]; then
            echo "❌ Rails security scans failed"
            exit 1
          fi

          if [[ "${{ needs.worker-typecheck.result }}" == "failure" ]]; then
            echo "❌ Worker TypeScript check failed"
            exit 1
          fi

          if [[ "${{ needs.worker-test.result }}" == "failure" ]]; then
            echo "❌ Worker tests failed"
            exit 1
          fi

          if [[ "${{ needs.api-management-typecheck.result }}" == "failure" ]]; then
            echo "❌ API Management TypeScript check failed"
            exit 1
          fi

          if [[ "${{ needs.api-management-test.result }}" == "failure" ]]; then
            echo "❌ API Management tests failed"
            exit 1
          fi

          echo "✅ All required checks passed!"
