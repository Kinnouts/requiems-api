name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
    paths:
      - "apps/**"
      - ".github/workflows/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "go.mod"
      - "go.sum"
      - "**/Gemfile"
      - "**/Gemfile.lock"
      - "**/go.mod"
      - "**/go.sum"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/tsconfig.json"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/**"
      - ".github/workflows/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "go.mod"
      - "go.sum"
      - "**/Gemfile"
      - "**/Gemfile.lock"
      - "**/go.mod"
      - "**/go.sum"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/tsconfig.json"
  schedule:
    - cron: "36 18 * * 3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
          - language: ruby
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
